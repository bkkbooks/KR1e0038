body:
  text: 春秋後傳惟王者改元諸侯改元自汾王以前未有也晉竹書曲沃莊伯十一年十一月則用夏正為歲首而秦譜至宣公初志閏月不惟改二又改曆矣夫子修春秋每孟月書時以見魯史每正月書王以存周正月令之書雖起秦世然先王之制存焉漢興頗用其略如春行寬大之令夏布封賞之恩以至秋冬理獄十月而後不復論囚皆本之月令自高帝有分舉四時之制魏相為宣帝言之李尋告哀帝謂朝廷忽於時月之令諸侍中尚書近臣宜令通知月令之意陳寵魯恭亦皆言之三代雖不改時與月而春秋紀春無冰為異則固以周正紀事也左傳記祭足取麥榖鄧來朝三事經傳所記有例差兩月者是經用周正傳取國史有自用夏正者失於更改也詩多用夏正書金縢秋大熟亦是夏時此不改時月之驗但孟子謂七八月乃五六月謂十一十二月乃九十月此當闕之天人之道雖殊象類之理則一聖人將有為有行也仰觀日月星辰霜露之變俯察蟲魚草木鳥獸之化不先時而起不後時而縮以之授民事而無不順以之因物性而無不適此堯典若昊天以授時周官正歲年而序事並玉海秦穆公將兄三人囚於內宮趙襄子遊於圃中至於梁馬郤不肯進青笄為驂乘襄子曰進視梁下前類有人青笄進視梁下豫讓郤寢佯為死人青笄云長有大事並初孚記吳越合魏武侯厲衆五年秦人興師而臨西河魏士聞之甲胄不待令而奮擊殺秦人者萬數梁以張儀為齊相楚怒約而攻梁雍睢曰請令解攻雍睢謂齊楚之王曰王亦聞張儀之約秦王乎曰王老相儀於梁齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得梁矣若不勝梁必事秦以持其國必割地以賂王王若欲復攻其弊不足以應秦此儀之所以與秦王陰相約也齊楚之王曰善乃遽解兵並御覽周赧王四年濟東有二石高三尺有餘相從而行入海數百步書鈔赧王二十八年秦始作浮橋於河初學記魯仲連曰齊閔王將之魯夷維子為執馬而從之魏加問春申君聞欲將臨武君有之乎曰有矣加曰臣少之時好射臣願以射譬可乎春申君曰可加曰吏嬴與魏王處廩下吏嬴謂魏王曰臣能為王虛發而下鳥有聞鴈來吏嬴虛發而鳥下魏王曰然則射可至此乎吏嬴曰此孽也王曰何以知之對曰其飛徐而鳴悲飛徐者故創痛也鳴悲者久失群也今臨武君嘗為秦孽不可為距秦之將也聶政拔劍至韓韓相方坐府上持兵戟而衛侍者甚衆聶政且入上陛刺殺俠纍唐睢對秦王曰專諸之刺王僚彗星籠月色並御覽使暑鄭容入柏谷關至平舒置見華山有素車白馬者問鄭容安之答曰之咸陽曰吾華山君使願託書致鄗池君子之咸陽道過鄗池見大梓下有文石取以款扣梓當有應者即以書與之勿妄發致之得所欲鄭容行至鄗池見一梓下果有文石取以款梓應曰諾鄭容如睡覺而見宮闕若王者之居焉謁者出受書入又有頃聞語聲言祖龍死神道茫昧理難辨測故無以精其幽致矣水經注阿房宮未成成之更欲擇令名名之作宮阿旁故天下謂之阿房宮御覽田午弒田侯及其孺子喜而兼齊是為桓侯田齊世家索隱嗣君衛世家惠王燕世家王鼫與越世家王之侯同上
