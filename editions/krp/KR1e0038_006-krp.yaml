body:
  text: 春秋後傳卷六宋陳傅良撰文公元年春王正月公即位二月癸亥日有食之天王使叔服來㑹葬夏四月丁巳葬我君僖公天王使毛伯來錫公命自隱至文六君惟桓文書即位而後書錫命以其自即位也晉侯伐衞於是晉告於諸侯而伐衞先且居曰效尤禍也請君朝王臣從師晉侯朝王於温先且居胥臣伐衞則其但書君何春秋罪戎首苟其君意雖卿帥不書是故伐衞書晉侯不書先且居伐秦書晉侯不書欒書事在成十三年滅偪陽書晉侯不書荀偃士匄襄十年伐晉書衞侯不書孔圉哀元年所謂春秋深探其本也春秋雖罪戎首而宥不得已是故小國役大國往往不書伐齊之役邾郯不書事在哀十年滅陳書楚不書宋戴惡也叔孫得臣如京師衞人伐晉此衞孔達也其稱人何大夫将猶稱人也秋公孫敖㑹晉侯于戚冬十月丁未楚世子商臣弑其君頵楚卒未志據傳楚武王卒于荘四年文王卒于十九年其志頵何世子弑君不可以楚不志也公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績此孟明視也其稱師何秦未有大夫也丁丑作僖公主有傳凡例說在章指三月乙巳及晉處父盟有傳公羊榖梁同朝而遂盟之於是始傳曰適晉不書諱之也凡諱國惡耻在公則但書其事不書公者恒辭也諱在其事則但書公不書其事公㑹晉侯于黒壤為公不與盟故不書盟宣七年有傳公如晉為止公送葬故不書葬成十年皆有傳甚諱之也㑹晉師于上鄍削而不書諱不足以盡之矣是故諱有愛君之誼焉必譏不及君而後諱舍是無諱道矣故曰諱莫如深也夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴有傳榖梁内大夫可以㑹外諸侯非是晉遂以大夫盟諸侯也大夫而與諸侯敵於是始故書大夫專盟自士穀也士縠非卿也特書之見晉之卑諸侯也然則士縠主是盟也則曷為序士縠於諸侯之下春秋不以大夫主盟也是故訖于宋不以大夫主盟翟泉貶此何以不貶貶不於其甚則於事端餘實錄而已矣是故書士縠自書士縠而后凡役書大夫桓文之伯也㑹盟有大夫則但稱人據僖元年㑹檉邾人二十八年會温秦人之類必世子也則得次小國之君自垂隴主士縠新城主趙盾而后大夫與諸侯序於是戚之盟書齊國佐成十五年沙隨之㑹書宋華元成十六年甚者無伯而君與大夫並列於㑹矣定十年齊侯衞侯鄭游速㑹于安甫自十有二月不雨至于秋七月八月丁卯大事于太廟躋僖公三傳同大事從公榖傳冬晉人宋人陳人鄭人伐秦傳言尊秦非經意嘗書大夫矣此晉先且居宋公子成陳轅濤塗鄭公子歸生也曷為不序大夫將猶稱人也自士縠專盟書大夫自陽處父專將書大夫是故春秋之始大夫將恒稱人由救鄭之後大夫始貶稱人矣公子遂如齊納幣公羊有傳左氏凡例不取杜說尤悖三年春王正月叔孫得臣㑹晉人宋人陳人衞人鄭人伐沈沈潰傳例說在章指夏五月王子虎卒說在荘二十二年公榖以為叔服非是秦人伐晉此秦伯也曷為貶稱人殽之誓孔子有取焉而秦穆之連兵無虚歲君子以為秦之未離乎西戎也是故自韓原秦不以爵見於經至康公而遂外之終南蒹葭之作秦非無人也而秦不用誠未離乎西戎也秋楚人圍江雨螽于宋冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚以救江晉大夫書帥師於是始大夫强也處父盟魯侯以王叔桓公伐楚蒐於董易中軍是故雖荀息里克不言帥師僖二年必若處父而后言帥師自是恒書大夫貶而后人之書救何江卒滅於楚也向也曰晉處父今曰晉陽處父命大夫也是故自郳黎來為小邾子無未命諸侯潞子戎蠻子皆有君矣自晉處父為陽處父無未命大夫曹公子首邾庶其皆有大夫矣文宣之後大夫舎宋山無去其氏諸侯舎把子無黜其爵者皆春秋之變文也四年春公至自晉夏逆婦姜于齊有傳榖梁成禮於齊非是狄侵齊秋楚人滅江滅不言圍此其書圍何以病晉也陽處父伐楚以救江而江卒滅於楚言圍見其久也久之所以病晉也僖之三十二年楚鬭章請平于晉晉陽處父報之晉楚始通文公為之也晉侯伐秦衞侯使寗俞來聘冬十有一月壬寅夫人風氏薨夫人某氏薨嫡稱也此莊公之妾也則曷為以嫡稱稱之喪之以夫人之禮也隱公之喪桓母猶有疑焉是故别廟也祔姑稱諡伉然如夫人則自文公之喪成風始也五年春王正月王使榮叔歸含且賵以成風之喪赴京師也賵常事不書唯賵仲子成風特書之則遂命為夫人也春秋之初猶以是為非常事也宣之敬嬴襄之定姒昭之齊歸雖命之為夫人不復書矣孟子卒則不赴於京師孔子曰夫人之不命於天子自魯昭公始也三月辛亥葬我小君成風王使召伯來㑹葬王不稱天於追錫桓公見之至是再見其再見何以夫人之禮喪成風也莊僖之際天下知有盟主而已而襄王之季年更有事於諸侯於是叔服㑹葬毛伯錫命尤汲汲於魯也尤汲汲於魯而何為乎成風一人賵含之一人葬之以是懷諸侯吾見周之益陵夷也宰咺嘗以賵妾母貶則召伯何以不貶王公一體也宰書名則王不待貶而自見王不稱天則召伯不待貶而自見也文武之教著於南雅莫急於君夫人也桓以少簒長成風以庶亂嫡王道熄矣而莊襄不能正又從而襃賞之是以天命施之天討也是故皆不稱天夏公孫敖如晉秦人入鄀秋楚人滅六冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉八月乙亥晉侯驩卒冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父有傳說在章指晉狐射姑出奔狄兩下相殺不道於是狐射姑使續鞠居殺陽處父則其書國殺何春秋之法苟有賊而不知則其君之罪也晉蒐于夷使狐射姑将中軍陽處父改蒐于董易中軍襄公無討焉於是使續鞠居殺陽處父是故晉胥童殺三郤欒書中行偃殺胥童齊崔杼殺髙厚鄭子展子西殺公子嘉皆稱國而已矣閏月不告月猶朝于廟七年春公伐邾三月甲戌取須句遂城郚夏四月宋公王臣卒宋人殺其大夫有傳榖梁誅有罪也非是此公孫固也則其不名何昭公之大夫也昭公新立曷為於此焉不名其大夫是春秋之大變也自隱而下春秋治在諸侯天子無道則不徒罪諸侯也於是有宰書名王子書名甚者王不書天自文而下春秋治在大夫諸侯無道則不徒罪大夫也於是有弑君稱人甚者稱國弑君天下之元惡也舎賊而稱人自宋昭公始是春秋之大變也是故終昭公之世不名其大夫春秋有天下之辭焉有一國之辭焉有一人之辭焉於晉靈公凡㑹盟皆不序諸侯是天下之辭也於魯荘公凡㑹齊襄皆書人是一國之辭也於魯桓公凡大夫將皆不言大夫於宋昭公凡大夫皆不名是一人之辭也戊子晉人及秦人戰于令狐晉將嘗書大夫此趙盾及秦伯也曷為貶稱人秦晉之交兵於是再世自令狐之後連兵不悉書矣於八年秦伐晉取武城不書于十年晉伐秦取少梁不書晉襄公卒欲立長君逆公子雍于秦秦康公以兵送之晉禦秦師則康公何貶焉春秋貴誼不貴惠尚治不尚功托人之孤至於交戰是亦伐喪而已矣是故宋襄公立齊孝公戰于甗貶人之秦康公送晉公子雍戰于令狐貶人之晉先蔑奔秦不言出從公穀狄侵我西鄙秋八月公㑹諸侯晉大夫盟于扈傳例說在章指垂隴嘗書士縠而序諸侯此公㑹齊侯宋公衞侯陳侯鄭伯許男曹伯晉趙盾也則何以不序晉始失伯也凡稱諸侯必先目而後凡也前有王人後無王人書曰諸侯盟于某則王人嘗不與也據首止王世子葵丘宰周公前無吾君後有吾君書曰公㑹諸侯盟于某則吾君嘗不與也據僖二十一年盟薄二十七年盟宋未始有不與者也而但曰諸侯一從而再有事也僖二十八年圍許襄十八年盟祝柯二十五年盟重丘非一役而再有事則非凡辭也非凡辭者散辭也冬徐伐莒公孫敖如莒涖盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴有傳公孫敖如京師不至而復丙戌奔莒螽宋人殺其大夫司馬有傳此公子卭也則其不名何昭公之大夫也於是襄夫人因戴武之族以殺大司馬公子卭則何以稱人稱人殺有罪之辭也六卿和公室樂豫舍司馬以讓公子卭則曷為例之以有罪不名所以别其非有罪也不名所以别其非有罪則稱人衆辭也宋司城來奔有傳大夫奔恒名之此蕩意諸也則其不名何昭公之大夫也凡奔非其罪不書苟接我也不可以不書則不以同盟之例書之是故未有書官者於是官從其官司馬司城是也未有書字者於是字從其字據宋子哀九年春毛伯來求金有傳公羊傳自是魯雖不修貢周無求矣周室益衰而頃王之崩葬不見於經夫人姜氏如齊二月叔孫得臣如京師辛丑葬襄王王喪卿共喪事不書此何以書夷周於晉也前年公子遂葬襄公今年叔孫得臣葬襄王是夷周于晉也是故苟常事雖季孫行父請命不書苟非常也雖叔孫得臣㑹葬書晉人殺其大夫先都三月夫人姜氏至自齊晉人殺其大夫士縠及箕鄭父楚人伐鄭公子遂㑹晉人宋人衞人許人救鄭兵將嘗書大夫此晉趙盾宋華耦衞孔達也曷為貶稱人晉遂不競而楚荘伯也傳曰卿不書緩也以懲不恪是故凡救不書必救而無功然後書救非善辭也自是而救不勝譏矣夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘有公羊傳自盂之㑹楚復稱人此其稱楚子何以其能聘也秦人來歸僖公成風之禭成風祔姑稱諡伉然如夫人矣其曰僖公成風修春秋之辭也夫人風氏薨葬我小君成風未修春秋之辭也由成風而下宣母敬嬴襄母定姒皆從舊史之文實錄而已葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉外秦也歸成風之禭使術來聘秦習於禮矣則其狄之何楚之伯秦之力也自滅庸以後秦為楚役自晉主諸夏之盟舍秦無加兵於晉者也㑹于夷儀之歲秦晉成而不結又明年盟于宋而南北之勢成楚子曰釋齊秦他國請相見也是戰國之萌也於次國風退秦於魏唐之後於序書系秦于周末於作春秋由韓原之後秦帥無君大夫皆夫子所以深致意於秦也於詩存秦風於書存秦誓皆兵事於是外秦兵加於盟主秦人為之也又三十年而外鄭又五十年而外晉外鄭猶可也外晉甚矣楚殺其大夫宜申討亂不書於是鬭宜申謀弑穆王則何以書宜申之罪為欲弑商臣也宜申之罪為欲弑商臣若此而同之他亂臣之列則溢罰矣是故蔓成然事在昭十四年弑者之黨也殺之不書宜申弑者之讎也殺之書臣子可以知勸懲矣自正月不雨至于秋七月及蘇子盟于女栗冬狄侵宋楚子蔡侯次于厥貉外㑹未有言次者據襄元年晉侯衞侯次于戚之類此其言次何以楚之欲圖伯而未集也晉雖不競君大夫數㑹而不序春秋重絶晉也㑹于息宋陳鄭嘗從楚矣已而為新城之盟則楚子猶未得志于宋陳鄭也於是息㑹不書書及蔡次厥貉用見楚之未得志于諸侯也十有一年春楚子伐麇楚初書君將也自是楚師必圍滅也而後貶人之夏叔仲彭生㑹晉郤缺于承筐秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹内大夫将言帥師其不言帥師何危之也凡君将不言帥師重在君也言師不言君者危師之辭也據莊八年師及齊師圍郕大夫將言帥師重在師也言将不言師者危将之辭也十有二年春王正月郕伯來奔有傳此郕太子朱儒也則其曰郕伯何逆之以諸侯之禮也春秋之法苟非諸侯雖嘗當國不成君也是故有衞侯朔則黔牟八年不成君有鄭伯突則子儀十四年不成君雖衞叔武列於㑹矣猶曰衞子爾此郕太子也魯逆以諸侯之禮吾從而志之無改焉何也唯其如二君也廢立之際足以亂名實則春秋不可以弗辨苟無亂於名實則春秋不辨也春秋之作别嫌明微而已有不待辨而自見春秋何治焉郕太子朱儒魯謂之郕伯晉太子州蒲晉謂之晉侯從而志之徒見其悖禮焉爾雖然凡諸侯奔則書復奔不書復者遂失國也失國恒名之據莊二十四年曹羈昭二十二年蔡侯朱二十三年莒子庚輿此其不名何以為郕伯未修春秋之辭也苟以為郕伯朱儒則是修春秋之辭矣故凡從主人則徒修春秋之辭也把伯來朝二月庚子子叔姬卒有傳女未嫁不卒此何以卒許嫁而絶則喪以夫人之禮也以子叔姬見僖之喪伯姬也傳言把桓公來朝請絶叔姬而無絶婚則是叔姬先絶復求其次杜說非夏楚人圍巢秋滕子來朝秦伯使術來聘自韓原之戰秦恒稱人此其稱秦伯何以其能聘也冬十有二月戊午晉人秦人戰于河曲此秦伯晉趙盾也曷為貶稱人亟戰也本榖梁於是范山言於楚子曰晉君少不在諸侯北方可圖也而秦晉亟戰秦晉亟戰而楚君将稱君矣是故戰必言及而不言及不以秦晉主此戰也不以秦晉主此戰猶曰夫人戰焉耳略之也秦人白狄伐晉首從之辭也晉人及姜戎敗秦師于殽敵辭也晉人秦人戰于河曲略之之辭也季孫行父帥師城諸及鄆十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月太室屋壞三傳同冬公如晉衞侯㑹公于沓狄侵衞十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐十有四年春王正月公至自晉邾人伐我南鄙叔仲彭生帥師伐邾夏五月乙亥齊侯潘卒六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城向也扈之盟不序諸侯此其復序何諸夏之志也晉救江無功救鄭無功與秦亟戰而楚浸強交聘於中國得蔡次厥貉矣而晉遂不競於是公朝晉衞侯來㑹公還自晉鄭伯來㑹諸夏之懼甚矣汲汲於晉而為此盟如之何勿序也以諸夏之汲汲於晉也而徒以趙盾主是盟書曰同盟同衆辭也自幽以來未之有也則不予晉以主是盟之辭也秋七月有星孛入于北斗公至自㑹晉人納捷菑于邾弗克納此晉趙盾以諸侯之師曷為貶稱人以晉為不競也楚方交聘于上國得蔡次厥貉矣而晉區區納亡公子於邾又以少陵長見辭於邾人自敗秦于令狐盟于扈救鄭戰河曲趙盾皆不書由是訖靈公之篇兵車之㑹自參以上貶人之十七年伐宋宣二年侵鄭趙盾為之也九月甲申公孫敖卒于齊有榖梁傳齊公子商人弑其君舍未踰年之君卒不書據衞戴公奔則但書名據鄭忽舍未逾年何以得稱君本榖梁傳以弑罪罪商人也是故陳佗齊無知莒展輿逾年矣而不成君舍未逾年也而成君苟弑其君世子雖成君不君之苟見弑于其臣子雖未成君君之春秋之大義也宋子哀來奔有傳奔大夫恒名之此其不名何昭公之大夫也冬單伯如齊齊人執單伯春秋書周大夫如吾大夫然内之也伯者作天下不知有王久矣於是魯之請昭姬晉之命隨㑹猶假寵於王室而文宣之際王卿士數有事於四方救江之役黒壤之盟王叔桓公在焉蓋汲汲於晉葬僖公錫文公命賵含成風王季子來聘尤汲汲於魯也而齊人執單伯以天子之使而見執於齊商人諸侯莫為之變焉則王室益不競矣以天子之使而見執春秋所甚懼也王叔陳生嘗相周矣晉悼公執之則何以不書傳曰士魴如京師言王叔之貳於戎也則是為京師執之也為京師執之而與執單伯同罪則溢罰矣齊人執子叔姬十有五年春季孫行父如晉三月宋司馬華孫來盟有傳此華耦也則其不名何昭公之大夫也夏曹伯來朝齊人歸公孫敖之喪六月卒丑朔日有食之鼓用牲于社單伯至自齊有傳吾大夫不至必見執而後至春秋書周大夫如吾大夫然故至單伯也晉郤缺帥師伐蔡戊申入蔡傳例說在章指入不言伐言伐甚伐者也入未有書大夫者於是書郤缺始自是訖春秋入稱人者邾也稱國者吳越也邾吳越無大夫也是故自伐書陽處父入書郤缺侵書趙穿宣元年由是凡役書大夫雖大夫自為戰書大夫宣二年宋鄭甚者大夫與君戰亦書大夫宣十二年邲之戰成二年鞌之戰是經之變文也秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈傳例說在章指向也扈之盟趙盾為之則其不序諸侯猶曰大夫主是盟也此晉侯宋公衞侯蔡侯陳侯鄭伯許男曹伯也則曷為不序散辭也新城之盟不可以不序徒以諸夏之志焉耳而晉侯不出於是楚伯成而頃王崩葬不見於春秋諸侯無統紀甚矣故終靈公之篇凡合諸侯皆散辭傳曰無能為也十有二月齊人來歸子叔姬内女來歸凡三見於經此其言齊人來歸子叔姬何非其罪也叔姬配昭公生舍昭公卒舍即位商人弑之於是執叔姬齊侯侵我西鄙遂伐曹入其郛一役而再有事不悉書也苟悉書也則以遂言之兵事言遂必天下之大故也此其言遂何齊始敗夏盟也晉文公卒襄公能合諸侯靈雖不競而新城之盟諸夏汲汲焉固結之則猶有屬也而齊獨為亂階執天子之使加兵於魯於是伐曹晉遂不競而諸侯貳故悉書之也傳曰謂諸侯不能也是故入郛皆不書據隱五年邾鄭伐宋入郛之類於齊特書之侵我皆書人於是書齊侯異其文者異其事也十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟榖梁有傳夏五月公四不視朔榖梁有傳六月戊辰公子遂及齊侯盟于郪丘秋八月辛未夫人姜氏薨毁泉臺楚人秦人巴人滅庸此楚子也滅猶未書君將也冬十有一月宋人弑其君杵臼有傳弑未有稱人者其稱人何猶曰衆人殺之焉耳孔父死於殤仇牧死於閔蕩意諸死於昭宋為有臣子矣宋非無臣子則弑其君罪不在其臣子矣是故大夫未有書官者終昭公之篇大夫特書官而意諸不言及大夫而不書官則臣子何罪意諸而言及則昭公疑於殤閔然則宋公孰弑襄夫人也賊由夫人使之若衆人然以是為君不君也是故立公子鮑而鮑免於首惡之名春秋無譏焉爾於是司城須奉昭公子以為亂而鮑殺之須母弟也殺母弟不書以是為鮑宜立者也十有七年春晉人衞人陳人鄭人伐宋有傳此晉荀林父衞孔達陳公孫寧鄭石楚也曷為貶稱人不予以討賊之義也宋賊無主名宜若勿討則其責諸侯以討之何子弑父凡在宫者殺無赦臣弑君凡在官者殺無赦衆人弑其君亦勿罪臣子而已矣賊奈何勿討也賊可以勿討則昭公書葬矣賊可以勿討而書葬其惟魯初葬靈乎二君之禍非其國臣子為之也夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于榖諸侯㑹于扈有傳秋公至自榖冬公子遂如齊十有八年春王二月丁丑公薨于臺下秦伯罃卒夏五月戊戌齊人弑其君商人商人之罪嘗著於春秋曷為書弑如他君久矣其為君也春秋位號從主人不以正不正未嘗有國雖鄭忽不可不謂之世子嘗有國雖商人不可不謂之君然則商人無罪歟以蔡般之見殺宜不名而名之則商人罪不容誅矣然則齊侯孰弑閻職邴歜也閻職邴歜微不稱盜而稱齊人所以罪商人也君商人人閻職邴歜其實各得其天矣六月癸酉葬我君文公秋公子遂叔孫得臣如齊冬十月子卒有傳惡位未定則其稱子卒何成之為在喪之君也凡君在喪恒稱子猶未葬也則稱子某莊公子般襄公子野於是公子遂殺惡而立宣公故成之為在喪之君以弑罪罪宣公也夫人姜氏歸于齊季孫行父如齊莒弑其君庶其弑未有書國者其稱國何猶曰國其國也而以自弑焉爾稱人罪不在臣子稱國罪不在衆人矣然則莒子孰弑太子僕也莒子生太子僕又生季佗愛季佗而黜僕而以自禍衆人何罪焉故凡稱國必易樹子殺大臣者也樹子吾貳也大臣吾股肱也親莫親於斯貴莫貴於斯賊由斯人是自賊也陳氏春秋後傳
