body:
  text: 春秋後傳卷三宋陳傅良撰莊公元年春王正月三月夫人孫于齊有傳此文姜也曷不稱姜氏絶之也吾君父不良死於齊而文姜猶孫於齊莊公不可以言人子矣絶文姜所以惡莊也夏單伯送王姬單伯者何天子之大夫也曷為書之如吾大夫唯王人則以内辭書之書會書如書至書卒十四年單伯會伐宋文十四年單伯如齊十五年單伯至自齊文二年王子虎卒定四年劉卷卒一如吾大夫内之也外送女不書據傳昭五年晉侯送女此何以書吾主之也齊襄弑魯桓天子不能正而使魯主王姬以嫁齊則魯豈無辭乎然則單伯何以無譏譏不及單伯也秋築王姬之舘于外有榖梁傳冬十月乙亥陳侯林卒王使榮叔來錫桓公命王命諸侯不書據魯頌僖公使季孫行父請命于周他如莊十六年王命曲沃伯為晉侯莊二十七年召伯廖賜齊侯命之類此何以書追命之也桓在位久曷為於是焉追命之桓弑其君兄而自立比其死也而後王賜之也桓公簒立周人以為罪矣而不能正宰渠伯糾來仍叔之子又來將以懷柔魯也而終桓之身不請命蓋魯無王厯者十有五年而家父之後王聘亦不及魯於是末如之何矣而追錫命是故王不書天本何休貶必於其重者莫重於追錫命故於是焉貶也本薛氏昭七年傳衞齊惡告喪于周且請命王使成簡公如衞弔且追命襄公桓王未葬則榮叔何以言使據武氏子毛伯不言使不可以三年無君王姬歸于齊王姬不書據傳文公八年宋襄夫人唯莊公之篇再書之曷為再書以莊公之於齊不可與相為禮也天子嫁女於諸侯使同姓諸侯主之則魯有主王姬者矣莫悖於與齊婚是故特譏之春秋之書外女未有詳於此者也書送女書築王姬之館書歸書卒皆以病莊公也齊師遷紀郱鄑郚二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘秋七月齊王姬卒外夫人卒不書本公穀例雖王后亦不書據昭十五年穆后此何以書以吾嘗為之服也然則禮與記曰齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服或之者疑之則禮未之有也禮未之有而以意起之施諸不共戴天之讎莊公不可以為人子矣冬十有二月夫人姜氏㑹齊侯于禚有傳并穀梁傳乙酉宋公馮卒三年春王正月溺㑹齊師伐衞有傳并榖梁傳溺者何隱桓莊之世吾大夫㑹伐恒名之自公孫兹不貶矣事在僖四年夏四月葬宋莊公五月葬桓王㑹葬不書其人必有故也而後書其人文公使公子遂葬晉侯六年叔孫得臣葬襄王九年是均周晉也昭公使叔弓葬宋公十一年滕侯三年叔鞍葬景王二十二年是均周宋滕也均猶可也晉景公卒成公弔喪據傳十年晉侯卒公如晉晉人止公使送葬諸侯莫在魯人辱之故不書諱之也而定王不書葬定王崩在五年楚康王卒襄公送葬而靈王不書葬據傳二十八年十一月天王崩十二月公及諸侯如楚及漢康王卒二十九年四月葬楚康王公及諸侯送葬五月公至自楚葬靈王鄭上卿有事子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎遂使印段如周杜氏葬靈王不書㑹不書不臣於周而詘於晉楚春秋諱之是故春秋不徒志葬也秋紀季以酅入于齊紀侯在而季以酅入齊若以邑叛然則其稱字何紀侯意也春秋之初齊襄小伯自桓之始年挾鄭以圖紀黄之㑹魯為之求成不得免焉遷郱鄑郚紀之不絶也如綫季以酅入齊紀於是乎始判是分國以與之也齊人之所欲者吾土地分國以與之苟可以免紀者無不為也是紀侯意也是故季稱字本公羊不稱字則疑於宗魚石邾庶其冬公次于滑公行不言次必久而無名也而後言次吾君嘗久外矣閔元年召季友于陳公次于郎不書而莊公特書次以莊之不競於齊也君父死焉不能討且㑹伐衞於是將謀紀難而齊卒滅紀斯可以言次矣是故魯十有二公惟莊昭書次舍是無書次者矣外書次必伯者之所以興衰也四年春王二月夫人姜氏享齊侯于祝丘三月紀伯姬卒内女為夫人書卒不書葬本公羊榖梁外夫人不書葬其不書卒者必有故也是故齊子叔姬不卒郯伯姬不卒以是為嘗失位也非有故也而不卒者則不赴也紀伯姬夏齊侯陳侯鄭伯遇于垂自參以上非邦交之舊矣紀侯大去其國有榖梁傳諸侯去國恒書奔此其不書奔何不以奔罪加紀侯也其不以奔罪加紀侯何罪齊也黄之㑹魯為之求成不得免焉遷郱鄑郚紀之不絶如綫也紀季以酅入於齊猶不得免焉則有去而已矣去國如紀侯庶幾有辭焉故不以奔罪加紀侯也然則何以罪齊書曰紀侯大去其國未知紀之自亡與人之亡之與曰齊侯葬紀伯姬則齊亡之也六月乙丑齊侯葬紀伯姬内女不葬必有故也而後書葬紀伯姬在殯齊人取其國而葬伯姬於是特書葬不以往㑹也是故苟宜書葬雖不往㑹書之陳哀公在殯楚師滅陳輿嬖袁克葬之書曰葬陳哀公苟不宜書雖徃㑹不書楚葬康王襄公及陳侯鄭伯許男送葬至於西門之外不書也逹例永足以觀春秋矣秋七月冬公及齊人狩于禚有公羊傳五年春王正月夏夫人姜氏如齊師秋郳犂來來朝傳曰未王命也冬公㑹齊人宋人陳人蔡人伐衞此納衞侯朔也則其不言納何據昭十二北燕伯以朔入為重也入不書納是故伐鄭納突伐衞納朔書入而已矣凡㑹伐有諸侯在焉則其大夫稱人有諸侯在焉而大夫不稱人自齊國佐始六年春王正月王人子突救衞自伐鄭以來王師不書其書救衞何救衞無功也救衞無功而後王命益不行於天下是故子突貴者也而繫諸人人子突所以微王室也本公羊救不書必救而無功然後書而書救自子突始隠桓之諸侯㑹盟侵伐徒以定簒弑也衛州吁之亂㑹者五國宋督之亂㑹者四國袲之㑹伐鄭以立突於是伐衞以立朔也以王子將而救衞救衞而克則是天子猶足廢置諸侯矣昔者王嘗以一軍命曲沃伯為晉侯詩人美之而經不書以為天子宜廢置諸侯也天子而猶得廢置諸侯春秋可以無作而朔終以自立故曰救衞無功而後王命益不行於天下夏六月衞侯朔入于衞歸君未有不言復者據僖二十八年衞侯鄭曹伯襄襄二十六年衞侯衎歸不言復者未得國也是故鄭伯入於櫟不言復衞侯入於夷儀不言復罪未得國也而不言復則非奔君也據蔡侯廬陳侯吳朔奔君也其不言復何朔害伋壽而後立衞人為之賦二子乘舟孔子取焉則其罪宜廢又拒天子之師故入不言復與齊小白陽生同文公羊氏曰簒辭也秋公至自伐衞螟冬齊人來歸衞俘七年春夫人姜氏㑹齊侯于防夏四月辛卯夜恒星不見夜中星隕如雨秋大水無麥苗有公羊傳冬夫人姜氏㑹齊侯于榖八年春王正月師次于郎以俟陳人蔡人此吾君將也據傳公子慶父請公伐齊何以稱師莊之㑹齊皆譏也莫甚於及圍郕是故一貶之師行不言次成十六年我師次於督揚不書必久而無功也而後言次吾師嘗久外矣而莊公特書次以莊之不競於齊也俟陳蔡不至及齊圍郕郕降於齊師以正月甲午治兵及秋而還斯可以言次矣甲午治兵夏師及齊師圍郕郕降于齊師秋師還内書師未有詳於此者書次書俟書治兵書還皆特筆也師還不書書還危不得還也杜還師還與言至之義同冬十有一月癸未齊無知弑其君諸兒此公孫無知也其曰無知何隱桓莊之春秋凡賊皆名之弑君者連稱管至父則其專罪無知何君弑而無知受之則賊不在二子矣春秋誅利心是故連稱管至父實弑齊襄無知與聞故者也而無知受之則無知為逆首公子棄疾實弑楚靈比與聞故者也而比受之則比為逆首苟以為利則萬乘之國弑其君者必千乘之國千乘之國弑其君者必百乘之家此孟子所以深探其本而遏亂原也九年春齊人殺無知無知嘗踰年則其曰齊人殺無知何是不成君之辭也向也州吁之弑衞人為之變不踰年卒討之今也無知之弑齊人亦為之變踰年卒討之是故無知不成君而雍廩得書人是國有臣子也春秋之初王道猶未墜人心猶止於禮義也衛詩為州吁作者七鄭詩為叔段作者三為忽作者五齊詩為襄公作者六晉刺獻公陳刺陳佗大抵隠桓莊之際皆有合於春秋以此攷見諸侯放恣而學士大夫清議之公廩廩然也以齊襄之不道詩人屢致意焉兾幸一悟而長惡不已至於遇弑然不忘討賊之義故曰國猶有臣子也公及齊大夫盟于蔇傳曰齊無君也夏公伐齊納子糾稱子何成糾之為子也未踰年之君稱子襄公弑國人討無知糾自魯入小白自莒入未知其誰立也成糾之為子則糾宜立者也糾宜立則夫子何以不予召忽予管仲成糾之為子可也成管仲之為臣則不可也然則魯宜納與凡納所宜納皆不書據宋納齊孝公秦納晉文公之類必不宜納也而後書襄公吾讎也而納其亡公子以為德是納不宜納也齊小白入于齊秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績榖梁有傳内不言敗績本公羊傳諱也此其書敗績何以為不足諱也狐駘之敗魯於是乎始髽不書為襄公諱也曷為為襄公諱以魯之救鄫之力索矣覿世子巫於晉猶無益於鄫而莒卒滅鄫於魯何譏焉故諱之也於升陘書戰不書敗猶為僖公諱也曷為為僖公諱邾人滅須句為之伐邾取須句焉而反其君邾人來戰是忿兵而已矣齊襄吾讎也而納其亡公子以為德於是敗焉是納不宜納也為公諱也是故戰不言伐戰而言伐敗之若齊有辭焉則甚伐者也九月齊人取子糾殺之魯殺糾也則其曰齊人取子糾殺之何罪小白也宋公使邾子用鄫子春秋舍宋而書邾以為皆國君也可以不受命矣而稟命於宋則邾為戎首本杜預魯受命於齊而殺糾則其罪小白何春秋之法兩下相殺不書雖世子也苟未嗣位殺之亦不書襄公弑國人討無知糾自魯入小白自莒入未知其誰立也小白得國而使鮑叔帥師臨魯以殺糾則是以千乘之國殺其兄焉耳譏不在魯也冬浚洙十年春王正月公敗齊師于長勺二月公侵宋三月宋人遷宿夏六月齊師宋師次于郎其言次何以桓公之圖伯而未集也外師未有書次者據僖二十五年晉次陽樊宣十五年秦次輔氏之類桓公所甚汲汲者魯也苟不得魯不可以合諸侯宿師於郎將以詘魯爾而北杏之㑹不至鄄㑹不至則猶未得志於魯也於是書次用見桓之未得志於諸侯也是故書齊師宋師次于郎以志齊伯之難書楚子蔡侯次於厥貉以志楚伯之難於此焉可以知人心矣不苟於從齊是人心猶有周也不苟於從楚是人心猶有晉也有王者作天下歸往之矣齊一變至於魯魯一變至於道孔子所以有志於魯也公敗宋師于乘丘秋九月荆敗蔡師于莘以蔡侯獻舞歸外域交相敗不書據襄十三年楚敗吳師十四年吳敗楚師之類中國敗外域不書據僖二年虢公敗戎于桑田僖八年晉敗狄于采桑之類必敗中國也而後書春秋為内外而作也荆敗蔡師於莘是内侵之始也吳敗頓胡沈蔡陳許之師于雞父則諸夏之不亡者寡矣是故書荆自此始而春秋以吳終焉聖人之所甚懼也稱荆本其舊號也小雅蠻荆商頌荆楚齊桓公伯而敢於伐鄭於是始書楚自㑹于鄧諸侯懼楚矣而敗鄧不書敗隨不書敗鄖不書雖滅申滅鄧滅息亦不書也敗蔡師以蔡侯獻舞歸於是始書之是荆楚之日熾也春秋之法執君言以歸滅國之君言以歸徒敗焉耳而言以歸則是蔡服楚也是中夏之日衰也冬十月齊師滅譚譚子奔莒書滅始於此紀侯大去其國宋人遷宿未可以言滅必若齊桓而後可以言滅矣然則滅國自齊桓乎前乎此矣前乎此則曷為以首滅罪齊微桓公則滅國之禍不接迹於天下春秋之際滅國三十六五伯為之也諸侯失國恒名之則譚子何以不名凡奔非其罪不書奔非其罪莫甚於被兵者也是故齊魯鄭入許許男奔衞不書隱十年必國滅而後書國滅而後書奔者以不死社稷也奔非其罪莫甚於被兵者也雖不死社稷猶不名之也十有一年春王正月夏五月戊寅公敗宋師于鄑傳例說在章指秋宋大水冬王姬歸于齊十有二年春王三月紀叔姬歸于酅紀亡矣曷為謂之紀叔姬存紀也國滅而復見者善辭也據昭八年楚滅陳十一年滅蔡十三年蔡侯廬陳侯吳歸陳蔡未始復也而再見春秋所以録滅國也是故紀亡矣書紀叔姬陳亡矣書陳災夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧此南宫萬也其曰宋萬何隱桓莊之春秋凡賊皆名之死君事必大臣然後書於是大宰督死焉則何以不書督弑君之賊也然則蕩意諸死於昭公何以亦不書昭稱人以弑則是君無道也已為大臣而君無道徒死焉耳不足録也冬十月宋萬出奔陳向也合四國之君而後華督免於討今萬得奔陳自是無討賊者矣雖然猶有仇牧也十有三年春齊侯宋人陳人蔡人邾人㑹于北杏榖梁有傳春秋非主兵皆序爵也據宋齊衛盟瓦屋宋陳蔡盟折之類於是序齊於宋之上而獨爵齊將予齊以伯也晉文公之簡曰晉侯齊師宋師秦師據傳宋公在師皆始伯之辭也自是無特相㑹者矣夏六月齊人滅遂秋七月冬公㑹齊侯盟于柯十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋此齊桓公以王師伐宋則其曰單伯㑹伐宋何於是諸侯初用王師也春秋不以諸侯用王師故書曰齊人陳人曹人伐宋單伯㑹伐宋則不以諸侯用王師之辭也春秋之初王室猶甚威重也衞之定州吁也陳之妻鄭忽也紀之求成於齊也皆欲假寵於王齊桓之興亦必請王師而後專伐自伯者之令行天下諸侯不知有王矣秋七月荆入蔡冬單伯㑹齊侯宋公衛侯鄭伯于鄄十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄夏夫人姜氏如齊秋宋人齊人邾人伐郳宋主兵也鄭人侵宋冬十月十有六年春王正月夏宋人齊人衞人伐鄭宋主兵也秋荆伐鄭說在十年荆敗蔡師冬十有二月㑹齊侯宋公陳侯衞侯鄭伯許男滑伯滕子同盟于幽諸侯初主盟也自是無特相盟者矣盟未有言同者於是言同盟以齊桓之初主盟也夫主盟者舉天下而聽於一邦也王者不作舉天下而聽於一邦古未之有也於是始書曰同盟同衆辭也猶未予以專主是盟也再盟于幽之後天下知有齊桓而已矣内不言公諱之也邾子克卒向也曰邾儀父今也曰邾子已賜之爵也春秋之初諸侯猶禀命於天子大夫猶禀命於諸侯故滕侯稱子薛侯稱伯訖春秋不復焉而曲沃伯之為晉侯詩人為之賦無衣據傳王立晉哀侯立晉鄂侯又命曲沃伯為晉侯則天子猶有黜陟也挾無駭終不書族則諸侯猶有予奪也春秋褒貶天下之君大夫而托魯以寓王法莫備于隠桓莊之世是故於諸侯有絀其爵者據把伯卒稱子有雖爵而名之者據鄧穀有字之者據邾儀父甚貶之者稱人據邾人葛人於大夫有絀其族者據華督南宫萬有雖族但名之者據翬溺有字之者據宋孔父陳女叔甚予之者稱子據季子髙子齊晉伯而襃貶在桓文矣或曰夫子何以進退天下之君大夫襃貶非春秋意也且書杞伯屢矣獨來盟稱杞子書公子友屢矣獨來歸書季子一人之身而進退稱焉以是為非春秋之意則春秋徒異同而已矣十有七年春齊人執鄭詹夏齊人殱于遂榖梁有傳於是遂因氏頷氏工婁氏須遂氏饗齊戍而殺之則其但曰齊人殱於遂何不以咎遂人也桓公伯諸侯而喪師於亡國之餘自取之也秋鄭詹自齊逃來外逃不書據宣十七年髙固逃歸襄十六年髙厚逃歸逃來則書之書逃來譏與之接也苟不接雖莒僕來奔宣公命與之邑季文子使司寇出諸竟則不書苟接之矣介葛盧來僖公在㑹饋之芻米則書冬多麋十有八年春王三月日有食之夏公追戎于濟西有傳不言其來舉重也舉重之文約是故書公追戎於濟西則戎來侵可知己書公㑹晉師於瓦則晉來救可知己事在定八年春秋無費辭費辭者必言故也公子結媵陳人之婦于鄄為盟齊宋書有事于太廟為卒仲遂書雖常事以其故不可不志也秋有􅈮冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟有公榖傳夫人姜氏如莒冬齊人宋人陳人伐我西鄙二十年春王二月夫人姜氏如莒夏齊大災秋七月冬齊人伐戎二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚癸丑葬我小君文姜陳人殺其公子御寇傳言夫子作經改定殺非大夫公子皆不書據傳晉殺丕鄭及七輿大天楚殺鬭宜申及仲歸之類公子為大夫則書曰大夫公子某非大夫也則書曰公子某雖大夫公子也以討亂殺之則不書據宋殺公子遂鄭殺公子闞楚殺越椒之類甚者殺世子母弟亦不書據鄭殺世子華宋殺母弟司城須必殺之非其罪也而後書本榖梁例稱國以殺大夫殺無罪也苟殺有罪則稱人以殺榖梁稱人以殺殺有罪也稱人者討辭也是故晉先都士縠箕鄭父嘗殺先克則稱人陳公子過嘗殺偃師則稱人非殺有罪也而亦稱人猶曰衆之殺之焉耳夏五月秋七月丙申及齊髙傒盟于防公羊有傳冬公如齊納幣公羊榖梁有傳二十有三年春公至自齊祭叔來聘聘未有不稱使者其不稱使何私相為好也自桓之伯也王室無聘魯者於是祭叔私相為好也自桓之中年則王室曷為無聘魯者王命不行於天下莊僖崩葬蓋不見於經矣是故春秋之初亟書王人書來求則猶有治不修貢之事焉書來錫命則猶有治不禀命之事焉於是祭公私相為好君子蓋有感於此而非徒以為譏也莊僖之際諸侯來聘乎盟主矣夏公如齊觀社公至自齊諸侯非享覲不踰境如齊觀社非禮也荆人來聘聘未有書人者其稱人何荆未有大夫也聘未有不稱使者其不稱使何荆未有君也荆未有君大夫也而稱人於是始蓋進之也公羊始能聘也隱桓之春秋舍王室若姻鄰無聘魯者矣經止書天王齊舍王室若姻鄰未有聘魯者而荆人先諸夏修聘於上國進之也進之也者憂之也公及齊侯遇于榖蕭叔朝公榖梁有傳秋丹桓宫楹冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈二十有四年春王三月刻桓宫桷榖梁有傳葬曹莊公夏公如齊逆女榖梁有傳親逆女不書據莊十一年傳齊侯來逆共姬唯莊公特書之則以娶齊女也於是莊公生三十七年而在位二紀矣制於其母必齊女也而後娶齊人重要之為之親納幣而觀社遇於榖盟於扈一歲而三見于齊丹桓宫楹刻其桷以飾夫人夫人猶踰時然後入大夫宗婦以幣覿此何禮也是故書逆書至而後書入夫人未有言入者入難辭也書逆以病莊公也書入以惡哀姜也亦以譏齊桓也春秋之書夫人未有詳於此者也秋公至自齊親逆女不書惟莊公特書之則以娶齊女也八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣大水冬戎侵曹曹羈出奔陳赤歸于曹凡君在喪恒稱子其曰曹羈何不能為子也侵淺事也以千乘之國不能守不可以言子矣雖然奔君未有言故者言故猶愈於自奔也郭公二十有五年春陳侯使女叔來聘有傳諸侯初交聘也前乎此非王室若姻鄰無聘者矣案是交聘齊桓公為之也自女叔之後諸侯之㑹數而朝聘皆之乎盟主矣是故吾君大夫如齊自僖之初年始春秋之初吾君大夫適他邦必有故也據公如齊觀社公如齊納幣公如齊逆女公子翬如齊逆女公子友如陳葬原仲公子結媵陳人之婦于鄄皆非朝聘有故而後行猶私相為好而非定制也王室衰諸侯私相為好而無定制是謂亂初生也由僖而下朝聘皆之乎盟主天王狩於河陽公朝於王所天王使宰周公來聘公子遂如京師遂如晉吾未知其所終矣春秋所以作也夏五月癸丑衞侯朔卒六月辛未朔日有食之鼓用牲于社伯姬歸于杞秋大水鼓用牲于社于門冬公子友如陳二十有六年春公伐戎夏公至自伐戎曹殺其大夫凡殺大夫恒名之此其不名何惡君也莊公卒有戎難羈出奔陳赤於是簒曹簒而殺其大夫則必不義其君者也宋杵臼之弑也始不書賊而曰宋人以是為君無道也無道而殺大夫則亦不義其君者也是故曹僖公之大夫不名宋昭公之大夫不名僖二十五年宋成公殺其大夫無傳秋公㑹宋人齊人伐徐公㑹伐書人義同五年冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮有傳夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽齊初主盟於是書公矣秋公子友如陳葬原仲冬杞伯姬來傳例非是說在章指此吾女也則其書來何非歸寧也凡吾之女稱伯叔季時君之女加子以是知非歸寧也内女為夫人凡八見於經未有書公㑹者而㑹自伯姬始由是來朝其子由是來求婦伯姬之為皆未之前聞也是故終伯姬之出但書來苟無辭以為稱雖吾女亦以是書莒慶來逆叔姬外逆女不書據宋蕩伯姬此何以書公自主之也榖梁接内是諸侯嫁女乎大夫必使大夫同姓者主之曷為公親焉則莒慶伉也莒無大夫於是書莒慶隱桓莊之際莒嘗為强國入向取杞牟婁納公子慶父吾君特㑹外大夫自浮來之盟始以是知慶之敢伉也公羊氏傳曰大夫越竟逆女非禮也則蕩氏宜書今不取杞伯來朝公㑹齊侯于城濮二十有八年春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績此齊侯也則其稱人何貶之也於是王使召伯廖錫齊侯命且請伐衞以其立子頽也齊敗衞師數之以王命取賂而還隱桓之春秋凡以王命討諸侯皆不書至是始書之桓公不以王命討衞也桓公不以王命討衞而後王師不出向也王室有四方之事雖伐鄭不服救衞無功而執芮伯立晉侯於是猶討樊仲皮也自討樊皮而王命不見於傳記桓公為之也凡戰不言伐戰而言伐有不與戰者也未始有不戰者而亦言伐則甚伐者也曰衞人敗績不甚敗之辭也夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭齊桓也救必無功也而後書此其為無功何失鄭也首止之㑹鄭伯逃歸為之圍新城盟世子華而鄭少師桓公卒鄭遂朝楚諸夏之變於夷鄭為亂階也冬築郿傳例說在章指大無麥禾臧孫辰告糴于齊穀梁有傳二十有九年春新延廄夏鄭人侵許秋有蜚傳例說在章指隱元年冬十有二月紀叔姬卒城諸及防有傳例三十年春王正月夏次于成秋七月齊人降鄣次於滑也書公於郎貶師之此其但書次何以是為不足書也本榖梁甚矣莊之不競於齊也君父死焉不能討謀紀而齊滅紀及齊圍郕而郕降于齊于是次成齊人降鄣榖梁鄣紀之遺邑是左傳有紀鄣雖罪齊桓也訖莊公之身不可以不貶也八月癸亥葬紀叔姬公羊有傳九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊人伐山戎榖梁有傳三十有一年春築臺于郎夏四月薛伯卒築臺于薛六月齊侯來獻戎捷秋築臺于秦冬不雨三十有二年春城小榖夏宋公齊侯遇于梁丘秋七月癸巳公子牙卒有公羊傳季友以君命酖牙也則其書卒何喪以大夫之禮也牙將與慶父夫人為亂雖酖之而立叔孫氏使若死於位然是喪以大夫之禮也春秋之法苟有誅意於其臣雖自殺也亦書殺此殺也吾從而卒之則何以傳信於萬世不卒之則無以察魯人之心也縁君臣之誼不得私其親縁親親之恩不與國人慮兄弟也立叔孫氏使之若死於位然則淫人何懼焉史著其迹春秋察其心後世有懼焉者矣八月癸亥公薨于路寢冬十月己未子般卒有傳君在喪恒稱子僖九年宋子定四年陳子之類卒亦稱子文十八年子卒若未葬也則卒稱子某子般襄三十一年子野王在喪稱王某卒稱王子某王猛王子猛非君在喪而稱子者必當國者也於是書衛子非王在喪而卒稱王子某者亦必當國者也於是書王子虎榖梁或云以其嘗執重以守也公子慶父如齊狄伐邢春秋後傳卷三
