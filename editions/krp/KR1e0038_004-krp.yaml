body:
  text: 春秋後傳卷四宋陳傅良撰閔公元年春王正月齊人救邢書救邢潰而遷夷儀也夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑季子來歸有傳此公子友也其稱季子何賢之斯不名之不名之斯以美稱稱之也季友酖牙以立般也而慶父卒賊般於是奔陳閔公立尚幼盟齊侯於落姑請復季友未知孰為之也慶父為之則閔公不弑以閔之見弑則非慶父之意而國人為之也國人之欲歸季子以已亂也而季子雖歸慶父夫人亂未已俄而弑閔公於是以僖公適邾則國人何賢乎季子微季子則慶父之簒成而莊公之統絶慶父之簒不成莊公之統不絶者季子在也是故奔陳不書如邾不書全季子也冬齊仲孫來有傳書來譏也仲孫湫則齊之命大夫也其書來何是覘魯也莊公薨子般弑而閔公幼落姑之盟嘗以請於齊矣僅能復季子而已而慶父夫人之志未可知也桓公不能正憪然使人以覘魯曰是可取乎桓公伯諸侯將因人之難以為利書來不書聘所以病齊桓也趙子云病桓公而嘉仲孫二年春王正月齊人遷陽夏五月乙酉吉禘于莊公有傳禘者何王者享其祖之所自出而以其祖配之也雍之頌曰禘太祖也周有二祖太祖文王也始祖稷也太祖始祖文見儀禮祖之所自出者嚳也文王配帝於明堂稷配天於郊而嚳禘於太廟東遷之後諸侯祖天子矣於是始有太廟則亦有禘據傳吳子夀夢卒臨於周廟謂文王也衞蒯瞆之禱曰皇祖文王烈祖康叔文祖襄公是謂三祖晉亳城北之盟亦曰先王先公則魯衞晉皆祖文武鄭祖厲王矣魯之郊禘惠公請之本劉恕外紀東周之僣禮也孔子曰魯之郊禘非禮也周公其衰矣又曰禘自既灌而往者吾不欲觀之矣入太廟每事問蓋傷之也然則春秋何以始見於閔公閔公未除喪而亟行於莊公自是用之羣公之廟據傳昭二十五年禘于襄公定八年禘于僖公之類是故特書之以其不勝譏譏其甚者耳餘具郊語中秋八月辛丑公薨魯之春秋固書曰公子慶父弑公于武闈聖人修之曰公薨諱之也遇弑君父之大哀也則何忍言之是故書薨而不地且不葬薨十二公所同也不地不葬隱閔所獨也然則雖諱而亂臣賊子之獄具矣九月夫人姜氏孫于邾文姜孫於齊絶不稱姜氏此其稱姜氏何文姜無妻道哀姜無母道是故文姜一見貶絶之哀姜再見而後貶絶也貶不於事端則必於其重者莫重於致廟則孫邾猶可言也公子慶父出奔莒閔薨不地且不葬亂臣賊子之獄具矣則曷為書慶父如他國慶父賊子般而弑閔魯臣子無討焉則書慶父固如他臣也季友於賊般也奔陳於弑閔也適邾須慶父奔而後入立僖魯之存僅焉耳是故宋萬奔陳雖殺之不書慶父奔莒雖殺之不書春秋所以嚴佚賊之責也季子奔陳不書適邾不書全之也則其嚴佚賊之責何若季子可與言事存矣事亡則未也有季友在慶父將不免於為戮則曷為謂之無討均之為佚賊也冬齊髙子來盟榖梁有傳來盟言使據桓十四年鄭語此其不言使何貴之也凡外大夫不言使舍武氏子毛伯王喪未命皆私交也據隱元年祭伯莊二十三年祭叔二十七年莒慶宣五年齊髙固之類非私交也而不言使則未始有大夫者書大夫楚屈瑕苟大夫也則不名皆貴之也貴之也者所以别私交也貴之則曷為不言使其誼有君命之所不及也十有二月狄入衛於是衞及狄人戰于熒澤衞師敗績遂滅衞則其但書入何不以累桓公也凡滅國有存之者則不言滅歸徳於存之者也有乘而取之者亦不言滅歸罪於取之者也是故衞不言滅須句不言滅事在僖二十一年鄭棄其師公羊有傳於是髙克奔陳不書不足書也是故以鄭伯克段于鄢為義則太叔不書奔以天王出居於鄭為義則王子帶不書奔春秋後傳卷四
