body:
  text: 春秋後傳卷二宋陳傅良撰桓公元年春王正月公即位自隠至文六君則曷為再書即位君薨既殯嗣子即位於柩前雖踰年恒稱子必類見焉而後列於諸侯東遷之諸侯既踰年而即位改元視天子非周制也啖說非是自隠至文六君唯桓文書即位則亦唯桓文書錫命是不特類見之禮廢雖請命亦廢矣成公以後皆書即位而無錫命王室區區所以感諷諸侯之意不復講也三月公㑹鄭伯于垂鄭伯以璧假許田取許田則曷為謂之以璧假鄭伯之辭也公羊氏曰為恭也春秋之初諸侯之為惡必有辭焉以自文鄭伯以璧假許田齊侯鄭伯如紀單伯送王姬築王姬之館于外皆善辭也夫子傷周之敝曰利而巧文而不慙於春秋著其事所以見王化衰風俗日趨於變且以𤼵明鄭莊之欺也愛段之辭立許叔之辭勞王問左右之辭足以禍五世矣夏四月丁未公及鄭伯盟于越秋大水冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父有傳并公羊傳華督則曷為但稱督隠桓莊之春秋凡賊皆名之及其大夫孔父言不殺孔父則不能弑其君也牧息書及以尊及卑也督先殺孔父而後弑君書及則并也左氏得之死節人臣之極致也春秋貴死節雖太子不書據傳衛寗喜殺太子角楚比殺太子禄必大臣也然後書大臣誼與其君存亡者也雖大臣也苟不能與其君存亡則亦不書是故晉欒書中行偃先殺胥童而後弑君不言及楚商人先殺鬭勃子上而後弑君不言及死節人臣之極致春秋重以予人也孔父嘉不名命大夫也滕子来朝三月公㑹齊侯陳侯鄭伯于稷以成宋亂㑹未有言其所為者其曰成宋亂弑君之禍接迹於天下於是焉始也向也合五國之君大夫以定州吁而州吁訖於討今也合四國之君以立華督督遂相宋莊弑君之禍接迹於天下四君為之也春秋之褒貶至於變文嚴矣向也五國之君大夫書之復書之終春秋僅一再見焉以變文為猶未也而直言其所為舍此無復見者矣雖然有孔父焉則東遷之初國猶有臣子也是故華督但名之夏四月取郜大鼎于宋戊申納于太廟於是宋以郜鼎賂公齊陳鄭皆有賂則其書取何蔽罪於魯也春秋嚴義利之辨苟以為利一以取書之是故郜鼎賂魯也濟西田賂齊也書取而已矣齊侯連五國之師抗王子突而納衛朔則書曰来歸衛俘非取之者之罪矣秋七月把侯来朝蔡侯鄭伯㑹于鄧傳曰始懼楚也九月入把内恒言大夫帥師但曰入把何唯桓師非君將皆不言大夫桓師非君將則曷為皆不言大夫桓以大夫弑隠而後立故桓師非君將則其大夫專也杜諤削公以著貶公及戎盟于唐冬公至自唐有傳始至盟也說在十六年至伐鄭例説在章指三年春正月公㑹齊侯于嬴夏齊侯衛侯胥命于蒲胥命者交相命也相命也者相推長也諸侯不稟於天子而私相命於是始子頽之亂虢公鄭伯胥命於弭不書以其謀王室也非王事也而胥命是相推長而已矣於是齊僖稱小伯黎之臣子亦以方伯責衛宣桓文之事其所由来者漸矣本薛氏六月公㑹把侯于郕秋七月壬辰朔日有食之既公子翬如齊逆女有傳翬何以得稱公子大夫有好事於諸侯則各從其稱無譏焉爾是故譏但稱翬無譏則從其恒稱為公子翬譏但稱忽無譏則從其恒稱為世子忽隠薨不地亂臣賊子之獄具矣則曷為書翬如他大夫翬弑隠而相桓魯臣子無討焉則固書翬如他大夫也桓立尚童年也於是長矣而相翬如故是徳翬也徳翬則是桓弑隠桓罪著矣名宰渠伯名鄧榖之君春秋有以斷斯獄矣九月齊侯送姜氏于讙有穀梁傳公㑹齊侯于讙夫人姜氏至自齊冬齊侯使其弟年来聘有年四年春正月公狩于郎夏天王使宰渠伯糾来聘有傳說在章指周大夫不名名宰渠伯聘桓也王人未有書官者於是特書宰有聘桓者矣據家父齊弟年必宰自為使而後貶貶其甚者也五年春正月甲戌己丑陳侯鮑卒有榖梁傳夏齊侯鄭伯如紀天王使仍叔之子来聘公羊榖梁有傳曰仍叔之子非見大夫也㣲者雖王人不書此何以書桓罪著矣再聘不可以不錄也𦵏陳桓公城祝丘秋蔡人衛人陳人從王伐鄭王師不書書伐鄭伐鄭不服也伐鄭不服而後王命不行於天下嘗戰矣而不言戰嘗敗績矣而不言敗績諱之也春秋之初王室多諱辭其曰蔡人衛人陳人從王伐鄭尊王也春秋之法有天子在則其諸侯稱人有諸侯在則其大夫稱人據隠四年蔡衛僖十八年衛邾之類東周之不競鄭莊公為之也荘公相平王王貳于虢至于交惡平王崩四年而鄭始朝桓於是鄭虢相桓為左右以王命討宋不庭而合齊魯之師于中丘入宋又入許魯翬之相桓也宋督之相荘也鄭有力焉王奪其政而遂不朝王固有以失鄭矣自將以討鄭討鄭而克是仲康之師也春秋可以無作而戰焉王卒大敗故曰伐鄭不服而後王命不行於天下大雩螽冬州公如曹有傳六年春正月寔来有傳以為来朝則非朝也来奔則非奔也但曰州公来則疑於祭伯故書曰州公如曹春正月寔来是不復其國之辭也春秋之修辭謹矣古者君去其國大宰取羣廟之主以從而託於諸侯曰寓公先王所以通不得已也州公如曹寔来紀侯大去其國不書奔通不得已也夏四月公㑹紀侯于成秋八月壬午大閱蔡人殺陳佗曰蔡人殺陳佗是討賊之辭也佗之罪不著於春秋曷為以討辭書之佗殺太子免而自立者也然則佗之罪曷不著於春秋陳侯鮑卒公子與太子爭立猶兩下相殺而已矣兩下相殺不道本榖梁例兩下相殺不道則其討之何以庶孽亂正統如定何勿討也書殺免則疑於齊荼不書殺佗則疑於晉重耳春秋之修辭謹矣是故佗嘗逾年矣不成君而蔡人雖微得書人九月丁卯子同生生子不書據子般子惡此何以書志莊公之不能為子也桓公不良死於齊而不怨文姜之淫詩人所為賦敝笱載馳猗嗟也而不恥生十有三年而立三十有五年而文姜薨制於其母必齊女也然後娶而不悔莊公不足以為人子矣故其年不可以不志也冬紀侯来朝七年春二月己亥焚咸丘夏榖伯綏来朝鄧侯吾離来朝有傳諸侯不名爵從其爵未爵稱字據邾儀父簡叔必微不能自通者也而後名之據郳黎来介葛盧未成君名之據鄭忽曹羈卒名之失國名之據鄭伯突衛侯朔之類嘗失國矣雖復入歸亦名之據衛侯鄭曹伯襄舎是無名道矣而名之者貶也名鄧榖之君朝桓也古者鄰國世相朝魯在泰山之下鄧榖在方城之外兩君之好不相及人而亟朝桓有朝桓者矣據把侯紀侯必若鄧榖而後貶貶其甚者也公羊失地之君榖梁失國也皆非案左氏傳桓九年巴子告于楚請與鄧為好莊六年楚子伐申過鄧析侯享之十六年滅鄧不見失國事迹失地之君不曰来朝苟有出者如衛侯朔奔齊譚子奔莒是也苟有来者如郕伯来奔州公寔来是也八年春正月己夘烝天王使家父来聘夏五月丁丑烝有公羊傳秋伐邾但曰伐邾何桓師非君將皆不言大夫冬十月雨雪祭公来遂逆王后于紀逆后六書非公卿也而後書是故原荘公逆恵后于陳不書事在前十八年召桓公逆定后于齊不書宣六年則祭公何以書后妃母儀天下而以遂専之也祭公不稱使則王者有成命也王者有成命而以遂專之是故書遂始於此凡遂譏也莫甚於逆后罪祭公且罪魯也九年春紀季姜歸于京師后歸不書據傳荘十八年陳媯傳例非是説在章指此何以書詳紀事也后妃母儀天下以為天地社稷宗廟之主俄而宗國亡焉是不可不詳也諸侯逆稱女至稱夫人尊夫人也天子稱逆后歸稱季姜尊王也夏四月秋七月冬曹伯使其世子射姑来朝有榖梁傳十年春王正月庚申曹伯終生卒夏五月𦵏曹桓公秋公㑹衛侯于桃丘弗遇冬十有二月丙午齊侯衛侯鄭伯来戰于郎有傳魯自中丘之盟於齊鄭未有異也於是齊鄭謀紀㑹于成紀来謀齊難也而㑹衛弗週其曰来戰于郎薄魯之罪也十有一年春正月齊人衛人鄭人盟于惡曹此郎之諸侯也曷為戰稱君盟稱人凡一役而再見者但人之畧之也猶曰上無天子下無方伯莫適為主則人自為盟而已矣鄭敗王師齊滅后之母家而衛亦抗子突以自立其無王甚矣自有參盟莫甚於惡曹略之也夏五月癸未鄭伯寤生卒秋七月𦵏鄭荘公春秋之初罪莫甚於鄭荘宋魯齊衛次之而父子兄弟之禍亦莫甚於此五國者荘公卒髙渠彌殺世子忽齊人殺子亹傅瑕殺子儀國亂者二十年魯隠公弑宋殤閔相繼弑衛桓公弑宣殺伋夀而立朔國人黜朔而立黔牟齊襄公弑雍廪殺公孫無知小白殺子糾是可為不臣者之戒矣九月宋人執鄭祭仲祭仲足何以不名命大夫也祭仲以大夫専廢置君者也以大夫専廢置君則曷為從其恒稱而不名春秋之襃貶名號不足以盡意則見于辭書曰宋人執鄭祭仲突歸于鄭鄭忽出奔衛斯其為辭也詳矣則從其恒稱不名可也突歸于鄭出非其罪歸罪也則但書歸凡歸皆譏也凡歸譏也莫甚於突故弗繫之鄭歸未有不繫國者突荘公子也而弗繫之鄭以為是簒鄭也據小白陽生稱齊去疾展與稱莒皆争國也唯突弗繫之鄭赤弗繫之曹則簒辭也鄭忽出奔衛有榖梁傳鄭忽何不能為子也身為冡嗣而廢立自權臣不可以言子矣是故書奔始於此州公如曹紀侯大去其國未可以言奔必若忽而後可以言奔爾雖然奔君未有言故者於是特言故猶愈於自取也柔㑹宋公陳侯蔡叔盟于折柔者何以大夫㑹諸侯盟於是始也故貶之内大夫可以㑹外諸侯榖梁例不侔至公子結不貶矣事在荘十九年公㑹宋公于夫鍾冬十有二月公㑹宋公于闞十有二年春正月夏六月壬寅公㑹把侯莒子盟于曲池秋七月丁亥公㑹宋公燕人盟于榖丘八月壬辰陳侯躍卒公㑹宋公于虚冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒再書日日衛晉之卒也於以見春秋之有日例也春秋之日例莫謹於崩卒以徃日赴則書徃日以来日赴則書来日再赴則亦再日之舎卒而稱日皆大事也是故非日辭必戰也弑君也滅國而執殺其君世子大夫也則日之㑹不日㑹有盟焉則日盟有滅焉則日滅侵伐不日入之則日入潰之則日潰圍不日滅之則日滅宜日而不日者不得日也凡日必甚之也是故公即位不日日定公夫人至不日日哀姜諸侯奔不日日衛侯衎入不日亦日衛侯衎執不日日鄫子外災不日日宋衛陳鄭外敗不日日頓胡沈蔡陳許皆甚之也非甚之也者而稱日則天變也郊薦之事也十有二月及鄭師伐宋丁未戰于宋此公及鄭伯也曷為前稱君後稱師本杜諤略之也一後而再見者但人之用衆焉稱師於是欲平宋鄭期嵗之閒㑹于折于夫鍾于闞于榖丘于虚于龜而宋辭平遂舍宋而㑹鄭師以伐宋戰焉戰不言伐公羊氏例戰而言伐有不與戰者也據僖十八年宋曹衛邾伐齊宋及齊戰而曹衛邾不書哀十一年公會吴伐齊齊及吳戰而魯不書未始有不與戰者而亦言伐則甚伐者也曰戰于宋薄宋之罪也十有三年春二月公㑹紀侯鄭伯已巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績有傳三月𦵏衛宣公凡君在喪恒稱子據僖九年宋子二十五年衛子定四年陳子衛宣公未𦵏則其稱衛侯何不以居喪之禮出也衛朔宋固成三年陳溺襄五年猶踰年也鄭費成三年未踰年亦曰鄭伯甚矣春秋之法苟在喪也未踰年不成君是故衛戴公不書卒鄭忽曹羈之奔也但書名此亦未踰年也而自稱衛侯吾從而志之無改焉何也以其不成君則春秋不可以弗辨苟繼世矣則春秋弗辨也從而志之徒見其悖禮焉耳故凡春秋辭從主人皆實錄而已非修春秋之辭也夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹無氷夏五榖梁有傳鄭伯使其弟語來盟秋八月壬申御廪災乙亥嘗公羊榖梁有傳冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭伐未有言以者則其言以何用諸侯之師於是始也東遷之後諸侯雖㑹伐非一國之志也非一國之志也則㑹者序爵而已矣據隐四年伐鄭十年伐戴桓十五年十六年伐鄭十七年伐邾皆先宋雖主兵也而小國序大國之上據隐五年邾鄭伐宋荘五年齊宋伐衛亦非一國之志也以一國而用諸侯之師於是始上無天子下無方伯有以一國而用諸侯之師者矣書以此伯之所由興也伯者之令行於天下自是無書以者書以者必中國用外域者也據僖二十六年公以楚師定四年蔡侯以吴子十有五年春二月天王使家父来求車有傳説在章指三月乙未天王崩夏四月己巳𦵏齊僖公五月鄭伯突出奔蔡奔君未有無故者鄭忽嘗言故矣於是祭仲專鄭厲公與雍糾圖之祭仲殺雍糾而後奔則其但言奔何以是為自失國也春秋之法苟其道足以失國雖有權臣亦以自致之文書之是故鄭祭仲殺雍糾而突出衛孫林父殺子蟜子伯子皮而衎出燕大夫殺外嬖而款出書奔而已矣鄭世子忽復歸于鄭忽嘗不稱世子此其加世子何從其恒稱也以其失國也不稱子以其歸國也稱世子春秋無加損焉正其名實而已矣不稱鄭伯以是為終失國也春秋無二尊苟失國雖見殺不書是故鄭無昭公晉無懐公稱世子以正忽之反正以反突之不正許叔入于許出罪也入亦罪也則悉書之據鄭良霄宋魚石晉欒盈之類出非其罪入罪也則但書入據齊小白陽生莒去疾之類凡入皆譏也凡入譏也則其曰許叔何以是為宜入也昔者齊鄭魯三師入許許荘公奔衛鄭人以許東偏奉許叔而使其大夫獲處許西偏許無君者十有五年忽突之亂於是叔始得許若許叔可謂能復荘公之宇矣是故入未有書字者雖公子也弗謂公子此其曰許叔所以别有罪也叔不書字則疑於齊小白陽生莒去疾公㑹齊侯于艾邾人牟人葛人来朝朝未有書人者旅見非邦交之舊自參以上甚矣凡朝不勝譏莫甚於自參以上是故貶人之秋九月鄭伯突入于櫟冬十有一月公㑹宋公衛侯陳侯于袲伐鄭納厲公也㑹伐㑹盟㑹救㑹侵皆前定之辭也未前定則書㑹于某而後伐宣元年棐林定四年召陵同㑹于某而後盟重丘㑹于某而後救牡丘㑹于某而後侵前定同欲也未前定繼事也榖梁地而後伐疑辭也十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衛侯陳侯蔡侯伐鄭秋七月公至自伐鄭始至伐也凡至危之也隐行不至桓至盟戎而已荘之適齊皆至之桓文有諸侯之事苟不得意則書至桓至牡丘文至圍許訖於斷道而後不至者鮮矣成之瑣澤襄之鄬之戲之役僅不至焉耳昭定之世無不至者哀或不至至㑹吴伐齊至黄池之㑹皆危之也是故夫人不至至出姜大夫不至至季孫意如叔孫婼冬城向十有一月衛侯朔出奔齊此衛人立公子黔牟而後奔則其但書奔何以為自失國也春秋之法苟其道足以失國雖有簒公子亦以自致之文書之是故衛人立黔牟而朔出蔡人立東國而朱出郕人立君而朱儒出書奔而已矣春秋之初人猶有讓心也魯隠之奉其弟軌也宋穆之舎其子馮也衛伋夀之不愛其死以立朔也則皆讓千乗之國者也俄而魯宋弑禍起衛亦廢置君焉而諸侯相與成三國之亂於是翬相魯桓督相宋荘衛朔拒天子之師而自立春秋於是為亂臣賊子作也十有七年春正月丙辰公㑹齊侯紀侯盟于黄二月丙午公㑹邾儀父盟于趡夏五月丙午及齊師戰于奚六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡出罪也歸亦罪也則悉書之據陳黄楚比之類出非其罪歸罪也則但書歸據鄭突曹赤之類凡歸皆譏也凡歸皆譏則其曰蔡季何以是為宜歸也蔡桓侯卒無子蔡人召季於陳而立之是故歸未有稱字者雖公子也弗謂公子此其曰蔡季所以别有罪也季不稱字則疑於鄭突曹赤癸巳𦵏蔡桓侯及宋人衛人伐邾冬十月朔日有食之有傳自文以上日食有不書日者自文而下皆書日是故曰桓荘之世多闕文十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊夏四月丙子公薨于齊内諱弑書薨不地其曰公薨于齊所以别弑也是故弑賊不討不書𦵏見殺于他邦雖讐不復書𦵏本榖梁可以攷春秋責臣子之𦵏矣丁酉公之喪至自齊秋七月冬十有二月己丑𦵏我君桓公見殺於他邦雖讎不復書𦵏春秋後傳卷二
