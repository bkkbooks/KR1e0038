body:
  text: 春秋後傳卷九宋陳傅良撰襄公元年春王正月公即位仲孫蔑㑹晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城有傳并公羊榖梁傳夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人把人次于鄫㑹伐未有言次者據成十六年晉伐鄭諸侯之師次于鄭西我師次于督揚此其言次何從晉而未決也悼承厲公之烈盟虚朾遂合諸侯討宋魚石爭彭城于楚天下知鄉方矣而五國之大夫猶未以其衆㑹韓厥之師是有待也亦以見再伯之難也秋楚公子壬夫帥師侵宋九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人姜氏薨六月庚辰鄭伯㫻卒晉師宋師衛甯殖侵鄭秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊姜叔孫豹如宋冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢楚殺其大夫公子申三年春楚公子嬰齊帥師伐吴於是楚伐吴吴人伐楚取駕則其但書伐吴何春秋於晉楚之際嚴矣於吴楚未嘗無差等也是故楚伐吴悉書之吴伐楚必若遏也門于巢卒而後書公如晉夏四月壬戌公及晉侯盟于長樗公至自晉六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟以大夫盟袁僑晉侯不欲袁僑詘諸侯也雖然有諸侯在而大夫盟於是始晉悼公為之也諸侯在焉而大夫自為盟而後大夫専盟矣大夫專盟自宋始餘從榖梁秋公至自㑹冬晉荀罃帥師伐許四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨葬陳成公八月辛亥葬我小君定姒冬公如晉陳人圍頓五年春公至自晉夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉有傳仲孫蔑衛孫林父㑹吴于善道秋大雩楚殺其大夫公子壬夫傳曰君子謂楚共王於是不刑莊王卒以大夫盟諸侯納宋魚石殺公子側公子申公子壬夫楚遂不競而晉復霸是故晉悼公之春秋楚有諸侯之事亦不悉書也於襄三年公子何忌侵陳不書四年彭名侵陳不書公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吴人鄫人于戚於是盟于戚吴初與諸侯盟也不書盟為晉諱也吴晉之盟春秋終諱之見哀十三年蒲之役將始㑹吴吴不至事在成九年傳雞澤之役又逆吴子吴子不至吴固不敢自列於諸夏也而晉求之急吴始稱人序于鄫人之上於是至柤十年又殊㑹之晉厲公以殊㑹㑹吴未足為中國患也悼公復以殊㑹㑹吴吴於是滅州來敗頓胡沈蔡陳許之師滅巢入郢矣公至自㑹冬戍陳戍不書桓六年戍齊宣十年戍鄭之類晉悼公之戍陳鄭也特書之君子以悼公之伯業桓文之所不屑為也桓公不戰而屈楚文公戰而屈楚自悼公而通吴以制楚矣㑹于戚于向于柤皆東竟也而又戍陳鄭以守之楚誠強而晉亦誠下䇿也楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳書救陳何陳不服也陳自辰陵不與諸夏之㑹三十年矣悼公伯而雞澤之盟袁僑至戚之㑹陳侯至諸侯為之戍陳而楚有公子貞之師于是救陳又明年㑹于鄬陳侯逃歸自是凡㑹同無陳矣十有二月公至自救陳辛未季孫行父卒六年春王三月壬午把伯姑容卒有傳説在章指夏宋華弱來奔秋葬把桓公滕子來朝莒人滅鄫冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳楚雖圍國嘗書君將矣於是書大夫楚強甚矣十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄭伯髠頑如㑹未見諸侯丙戌卒于鄵此公子騑弑其君也則其書卒何以君薨赴也本杜預君弑矣晏然訃於他國但如恒喪自鄭騑始甚矣無人紀也而鄭之臣子聽焉自有討賊至于不討自不討矣至於赴告如恒䘮春秋之所甚懼也是故書卒所以誅鄭之臣子聽賊之所為也夫春秋之法苟有逆意于其君雖自殺也據楚頵䖍亦書弑此弑也吾從而卒之則何以傳信于萬世不卒之無以著鄭人之心也崔杼弑其君齊太史書之杼殺之其弟嗣書之南史執簡以往陳恒弑其君孔子沐浴而朝告於哀公曰請討之弑君天下之大變也名在諸侯之䇿誰能沒之史見其事春秋著其心則後世有考焉矣陳侯逃歸八年春王正月公如晉夏葬鄭僖公鄭人侵蔡獲蔡公子燮有榖梁傳此鄭公子發也貶人之季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢邱有傳此齊髙厚宋向戍衛甯殖也其稱人何不以大夫敵盟主也不以大夫敵盟主桓文之盛也自同盟于戚而大夫與諸侯序矣於是再見其再見何復予晉以伯也傳曰大夫不書尊晉侯也公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士匄來聘九年春宋災夏季孫宿如晉五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戱楚子伐鄭十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹吴于柤夏五月甲午遂滅偪陽傳曰言自㑹也滅貶人之此其不申言晉人何楚滅嘗稱君矣自楚滅稱君事在宣十二年苟君將也則皆書君是故滅萊書齊侯滅偪陽書晉侯自楚滅稱大夫事在二十五年苟大夫將也則皆書大夫是故滅陸渾之戎書晉荀吴滅沈書蔡公孫姓滅許書鄭游速自是終春秋滅不書君大夫者吴也是經之變文也於是以偪陽子歸不書宥偪陽子也悼公合十三國之衆為衣裳之㑹而遂滅偪陽於偪陽子何譏焉夫子之删詩也存弼鄘於國風之首而繫檜曹于末録小國也春秋元録小國也是故滅君有奔不言奔以歸不言以歸者以是為非其罪也據昭十七年陸渾子奔楚不書奔公至自㑹楚公子貞鄭公孫輒帥師伐宋凡専將言帥師苟二國㑹則先序主兵者而不言帥師言帥師是國自為帥也國自為帥自楚公子貞鄭公孫輒始自是雖圍滅亦並稱帥師矣事在定十四年哀三年晉師伐秦此荀罃也曷為貶書師秦晉之師非㑹伐皆不書大夫秋莒人伐我東鄙公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭冬盜殺鄭公子騑公子發公孫輒有傳盜賤者也以賤者而一日殺三卿鄭之失政甚矣書盜自此始傳曰言無大夫焉春秋之季小臣圗柄其甚者陪臣執國命矣是故衛周冶殺元咺宋穆襄之族帥國人殺公孫固公孫鄭雖賤者也猶未書盜必若鄭五子而後書盜諸侯貶書人聽諸侯之辭也大夫貶書人聽大夫之辭也書盜則聽不止大夫矣春秋所甚不得已也戍鄭虎牢有傳向也曰虎牢今也曰鄭虎牢何不繫之鄭者為天下城之也繫之鄭者為鄭戍之也是故楚邱不繫之衛縁陵不繫之把梁山沙鹿不繫之晉皆非一國之辭也郱鄑郚繫之紀彭城繫之宋皆一國之辭也楚公子貞帥師救鄭楚數救鄭矣不書見傳宣元年蒍賈二年鬬椒成九年子重十六年楚子十七年子重公子申之類於是始書以為晉悼復伯楚欲救而不能也是故書救陳見晉之終失陳書救鄭見楚之終失鄭云爾公至自伐鄭十有一年春王正月作三軍有傳於是季武子作三軍非公命也向也新作南門非公命不書此何以書作南門常事作三軍非常也是故必常事譏不及公則不書苟非常則謹書之書作三軍志三家之分公室也立武宫立煬宫雖非公命皆非常也夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭隱桓之諸侯皆序爵也伯者作而後小國或序大國之上有以子男長於伯者矣於是以世子長於小國之君則悼公為之也十年伐鄭長於滕至是長於莒秋七月己未同盟于亳城北公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭㑹于蕭魚公榖有傳有地㑹而後伐者矣據㑹于袲伐鄭㑹于召陵伐楚未有伐而後地㑹者也地㑹而後伐未集事之辭也伐而後地㑹集事之辭也伐鄭㑹于蕭魚序績也公至自㑹楚人執鄭行人良霄冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆公榖有傳夏晉侯使士魴來聘秋九月吴子乗卒冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿凡例辨在纂例秋九月庚辰楚子審卒冬城防十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹吴于向此齊崔杼宋華閲衛北宫括也其特書人何傳曰惰也則不親事于㑹也向之㑹悼徳衰矣數吴之不徳以退吴人而卒㑹吴執莒公子務婁以其通楚使也而卒㑹莒諸侯之大夫從晉侯伐秦而悼不自將諸侯之師及涇不濟荀偃欒黶一帥爭而大衆還晉人謂之遷延之役是故伐秦之役不書晉侯志晉侯之怠也則諸侯之大夫有不親事於㑹者矣有伯者之令而大夫不親事於是始悼公為之也自是㑹于澶淵晉趙武宋向戌不書書鄭良霄於城把鄭游吉不書書公孫段則君令多不行於大夫矣三月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦荀偃嘗弑君矣偃書㑹伐如他大夫無貶焉然則偃無罪歟以陳佗之罪不著于春秋有殺之者則予之以討賊之辭則偃罪不容誅矣其再見猶趙盾焉爾己未衛侯出奔齊莒人侵我東鄙秋楚公子貞帥師伐吴冬季孫宿㑹晉士匄宋華閲衛孫林父鄭公孫蠆莒人邾人于戚襄昭之際大夫無君之禍晉為之也悼公之徳衰矣十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊單靖公不行也夏齊侯伐我北鄙圍成公救成至遇公羊有傳自宣之季年内不言君將於是書救成而不敢進無惑乎三家之専魯也季孫宿叔孫豹帥師城成郛秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟公羊有傳凡伯在焉而但曰諸侯者無伯也文十五年盟扈十七年㑹扈君在焉而但曰大夫者無君也是故自文而下則有斥言諸侯而不序自襄而下則有斥言大夫而不序晉人執莒子邾子以歸齊侯伐我北鄙夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衛甯殖宋人伐許有傳鄭非主兵也則曷為㑹鄭伯春秋不以大夫主諸侯則推而屬之鄭也春秋之大義夷夏之辨君臣之分而已是故陳非主盟也不以夷狄主中國則書㑹陳事在僖十九年鄭非主兵也不以大夫主諸侯則書㑹鄭秋齊侯伐我北鄙圍成大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒宋人伐陳莊朝宋微者也曷為得書人微者唯討賊得書人大夫交征于中國而後微者書人是故鄭皇武書成十八年宋莊朝書甚者秦庶長鮑越常壽過書夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來夏晉人執衛行人石買秋齊師伐我北鄙冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊同圍齊不但晉志也自圍齊之後晉師無君將雖大夫之師出無與於諸夏之義矣曹伯負芻卒于師楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯㑹無王卿士其亦申言諸侯何間有事也晉人執邾子公至自伐齊取邾田自漷水季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士匄帥師侵齊至榖聞齊侯卒乃還有公羊傳八月丙辰仲孫蔑卒齊殺其大夫髙厚有傳鄭殺其大夫公子嘉有傳冬葬齊靈公城西郛叔孫豹㑹晉士匄于柯城武城二十年春王正月辛亥仲孫速㑹莒人盟于向夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵秋公至自㑹仲孫速帥師伐邾蔡殺其大夫公子燮有傳蔡公子履出奔楚陳侯之弟黄出奔楚傳非是叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭邱來奔有傳於是公猶在晉季孫宿内之也向者莒太子僕弑其君以其寳玉來奔納諸宣公矣季文子使司寇出諸竟則不書公猶在晉而季孫宿納庶其則何以書春秋誅叛人君臣之責也是故苟不納之雖有公命不書苟納之雖無公命必謹而書之夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任左曰錮欒氏也二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨左曰復錮欒氏也公至自㑹楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月己巳把伯匄卒夏邾畀我來奔葬把孝公陳殺其大夫慶虎及慶寅於是陳侯如楚公子黄愬二慶於楚楚人召之慶氏以陳叛屈建從陳侯圍陳遂殺慶虎慶寅故春秋未書叛而稱國以殺猶是殺大夫焉爾叛必不能殺者也陳侯之弟黄自楚歸于陳晉欒盈復入于晉入于曲沃秋齊侯伐衛遂伐晉此其書遂何齊始伐盟主也自袁婁以來齊世從晉於是始叛則晉伯之衰而諸侯貳矣晉之衰諸夏之憂也八月叔孫豹帥師救晉次于雍榆次而救匿其救之形也救而次宣其救之聲也書救晉何晉遂失伯也以區區之魯何救於晉則晉遂失伯非魯故也書救晉則天下益多故矣盟于宋而南北之勢成㑹于申而淮夷至戰于雞父而吴之敗者六國於越入吴春秋終焉葢於是焉始故謹而書之也是故自救盟主他救皆不書據傳昭二十一年晉以諸侯之師救宋三十年楚沈尹戌救徐之類己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈有傳公羊同討亂不書殺欒盈何以書討亂常事殺欒盈非常也欒盈亡大夫爾則曷為謂之非常晉為盟主而再合諸侯于商任于沙隨以錮欒氏則是非常也盈之入也晉人大懼奉君以走固宫而盈以曲沃之甲乗公門矢及君屋葢僅焉克之而已書殺欒盈猶州吁無知是非常之辭也雖然欒盈復不言自錮亂臣也則以討賊之辭書之鄭良霄言自曷為書之如欒盈良霄雖亡大夫爾鄭伯為之盟大夫盟國人良霄自墓門之瀆入因馬師頡介于襄庫以伐舊北門書殺良霄如書殺欒盈亦非常之辭也甚矣文公而下諸侯無政大夫強也齊侯襲莒二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹陳鍼宜咎出奔楚叔孫豹如京師大饑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光宋萬魯慶父奔而後得誅之則不書殺以是為佚賊也齊滅崔氏而尸杼於市則何以亦不書殺均之為佚賊也崔杼弑君偃然猶在位也而以家禍亡其宗如是而得書則臣子之不誠於君父者可以盜名矣是故鄭人斵公子歸生之棺而葬靈公齊人暴崔杼之尸而葬莊公春秋終不書葬則猶不葬也公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重邱㑹無王人亦申言諸侯義同祝柯公至自㑹衛侯入于夷儀奔君恒名之此其不名何伯逆之也故書曰晉侯㑹于夷儀衛侯入于夷儀衛侯失國矣而伯納之則異於他入者矣不名之非失國之辭也是故奔稱衛侯衎有晉逆之則稱衛侯奔稱北燕伯欵有齊納之則稱北燕伯衛有二君俄而甯喜之弑械成則晉人為之也何謂二君衎入稱侯剽弑稱君是二君也國無二尊春秋之法也是故鄭厲公入則忽雖嘗謂之昭公晉文公入則圉雖嘗謂之懐公皆不書殺以是為失國之君爾而書殺是有二尊也今夫衎列於諸侯之㑹十有三而後出其入也將焉名之剽列於諸侯之㑹七而後弑其弑也又將焉名之削一而存一是有予奪矣春秋不没其實而正不正不與存焉故必若鄭忽晉圉則春秋所得而廢苟若剽衎則春秋所不得而廢杜氏蘇氏以鄭伯遇于垂為鄭子儀非是當從胡氏楚屈建帥師滅舒鳩楚雖滅國嘗稱君將矣於是書大夫楚強也自是滅國晉書荀吳蔡書公孫姓鄭書游速滅不稱人矣滅不書大夫者吳也吳無大夫也冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒自入州來至是而書伐楚略之也於是吳子親門于巢巢牛臣隱於短垣以射之則其但書門于巢卒何不以咎巢人也諸樊始通于上國爭長于楚而喪身于匹夫是自取之也本何休二十有六年春王二月辛卯衛甯喜弑其君剽有傳道喜弑者公子鱄也則其専罪喜何喜為正卿喜不有無君之心則鱄為僇矣衛孫林父入于戚以叛有傳宋魚石入于彭城晉欒盈入于曲沃未可以書叛必若衛孫林父而後可以書叛書叛必不能討者也據二十九年季札遇衛將宿于戚聞鐘聲焉春秋之季家有藏甲邑有百雉之城矣故書叛始于此凡叛賤者不書必卿佐而後書據傳成十七年齊髙無咎之子弱以盧叛襄二十九年齊髙止之子堅以盧叛之類甲午衛侯衎復歸于衛有傳鄭伯雖在櫟嘗與諸侯㑹于垂則君國矣是故殺忽不書殺子亹不書殺子儀不書以三子之不書殺知鄭伯之已定也以剽之書弑知衛侯之猶未定也是故衎再見而後名之鄭伯突入于櫟不曰鄭伯突復歸于鄭此其書復歸何弑剽而後得國也夏晉侯使荀吴來聘公㑹晉人鄭良霄宋人曹人于澶淵左曰尊公非是秋宋公殺其世子痤晉人執衛甯喜凡執他國之臣必命大夫而後書據執甯喜北宫遺但書甯喜十八年執石買孫蒯但書石買之類於是執甯喜以歸衛侯如晉復執之則其但書甯喜何是之謂筆削也宋人執祭仲亦執厲公但書祭仲晉人執甯喜亦執獻公但書甯喜苟書執鄭突是不以逐君之罪罪宋也書執衛侯衎是以討賊之義予晉也不以逐君之罪罪宋以討賊之義予晉則放乎利而盜名者得志矣八月壬午許男甯卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋晉楚初同主諸夏盟也晉楚嘗盟矣㑹于𤨏澤之歲宋華元克合晉楚之成士燮㑹公子罷盟于宋西門之外不書猶曰特相盟也兩君之好而非天下之大變也以諸侯分為晉楚之從而交相見也於是始則是南北二伯也天下之大變也於溴梁而無君臣之分於宋而無内外之辨昭定哀之春秋將以終于吳越焉爾矣衛殺其大夫甯喜甯喜猶晉里克也是故衛剽亦不書葬衛侯之弟鱄出奔晉秋七月辛巳豹及諸侯之大夫盟于宋有傳於是晉楚争先乃先楚人則其書先晉何春秋不以荆蠻先中國也自宋以來晉不専主盟矣虢之盟讀舊書加於牲上而已至鄟陵則齊主諸侯至臯鼬則魯及諸侯晉之不足以主夏盟自宋始宋之盟趙孟之偷也孔子曰庭燎之百由齊桓公始也大夫之奏肆夏由趙文子始也是王霸之所以興衰也豹云者䝉上文也僑如以夫人至自齊婼至自晉皆䝉上文也冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚於是公及宋公陳侯鄭伯許男如楚諸夏之君旅見於楚始於此舉魯以見其餘也外相如不志有異焉則志之是故書齊侯鄭伯如紀可以書齊侯鄭伯如紀曷為不書公及宋公陳侯鄭伯許男如楚凡舉魯以見其餘者則天下之辭也公朝于王所公如楚於以見王伯之盛衰故曰此天下之辭也十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚榖梁有傳吾君嘗以正月在齊晉矣據莊二十二年公如齊二十三年春至自齊文三年公如晉四年春至自晉之類不書書在楚危在楚也本何休夏五月公至自楚庚午衛侯衎卒閽弑吴子餘祭凡稱國以弑者必其臣子也稱人者非但其臣子也猶曰衆人弑之焉爾以為臣子則賤者也以為衆人則匹夫也於是有稱閽者焉稱盜者焉閽所狎也盜所疏也閽身受其咎盜有受其咎者矣仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人邾人滕人薛人小邾人城把㑹盟必有故也春秋書㑹盟而不言故屬辭比事而功過分矣於是書城把是合十二國諸侯之大夫為悼夫人也於澶淵書宋災是合十三國諸侯之大夫為共姬也衛甯喜弑其君孫林父以邑叛蔡世子般弑其父吴楚之大夫交聘於中國天下亦多故矣晉為盟主而區區於宋把是晉之已細也晉之已細然後有執齊慶封放陳招殺蔡侯般假討賊之義以盟諸夏者如楚靈王者矣晉侯使士鞅來聘把子來盟傳曰書曰子賤之也凡來盟皆大夫也把伯親之故賤之也把雖稱子矣僖二十三年前乎此夷儀之㑹稱伯後乎此卒復稱伯來盟特稱子見春秋之貶諸侯也春秋之褒貶君大夫莫備於隱桓莊之世寓王法也成襄而下舍把子無削其爵者舍楚子䖍無生名之者經之變文也吴子使札來聘荆人来聘楚子使椒來聘秦人來歸僖公成風之襚秦伯使術來聘春秋葢累而後進之也吴始通於上國則曷為書是大夫吴驟強也然則非賢札歟書札猶楚椒秦術則皆非命大夫之辭也必若屈完而後特書氏春秋公萬世之是非不以私一人也秋九月葬衛獻公齊髙止出奔北燕於是公孫蠆公孫竈放髙止於北燕左曰書曰出奔罪髙止也春秋之法苟不足以免於罪雖放逐也以自奔書之是故魯出叔孫僑如齊逐髙無咎放髙止但書奔而已矣冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弑其君固五月甲午宋災宋伯姬卒天王殺其弟佞夫凡王殺不書本何休據傳莊王殺周公黒肩敬王殺召伯盈尹固之類雖王子不書據惠王殺子頺甚者母弟亦不書據襄王殺母弟帶必殺無罪也而後書於是靈王崩景王立儋括欲立王子佞夫佞夫弗知也尹氏劉氏殺佞夫括奔晉傳曰天王殺其弟佞夫罪在王也王子瑕奔晉王子奔不書據桓十八年王子克僖十二年王子帶之類必嘗叛者也為天子諱叛也子瑕欲廢景王者之黨也則曷為不諱於是書天王殺其弟佞夫奔不足諱也秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故有傳諸侯之大夫不序自蜀盟以來未有也於是叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫佗鄭罕虎則其復不序何晉不足以為盟主也晉之不足以主盟自宋始必再言故而後貶重絶晉也凡諸侯不序吾君在焉而書吾君大夫不序吾大夫在焉而書吾大夫與有譏也據文七年公㑹諸侯晉大夫盟于扈九年公子遂㑹晉人宋人衛人許人救鄭不在魯矣則不書吾君大夫傳曰不書魯大夫諱之也三十有一年春王正月夏六月辛巳公薨于楚宫秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來㑹葬諸侯來㑹葬於是始改葬惠公也衛侯來會葬隱公不見春秋之初魯猶秉禮也晉景公之䘮成公弔焉亦已卑矣晉于是止公使送葬諸侯莫在魯人辱之雖伯主未有君㑹葬者也葬楚康王也公及陳侯鄭伯許男送於西門之外則天下諸侯有㑹葬於楚者矣於是滕㑹葬於魯是春秋之季也㑹葬猶可奔喪甚矣癸酉葬我君襄公十有一月莒人弑其君宻州莒子孰弑公子展輿也莒子既立展輿又廢之而以自禍衆人何罪焉是故稱國凡弑君稱人必衆者也稱國必大臣貴戚者也經衍一人字春秋後傳卷九
