  text: 欽定四庫全書經部五
  hash: sha256:02dd33ef1c70b837406ca8d729e4163b1ab6b8a43895174682c3937c960ea212
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0038_WYG_000-1a, image: WYG0151/WYG0151-0593a.png}
body:
  text: 春秋後傳春秋類提要臣等謹按春秋後傳十二卷宋陳傅良撰傅良字君舉案傅良或作傅良諸本誤有異同然其字曰君舉則為傅説舉於版祝之義故今定為傳字號止齋温州瑞安人乾道八年進士官至中書舎人寳謨閣待制諡文節事蹟具宋史本傳是編有其門人周勉跋稱傅良為此書將脱稿而病學者欲速得其書俾傭書傳冩其已削者或留其帖于編増入是正者或揭去弗存是今所傳已非傅良完本矣趙汸春秋集傳自序于宋人説春秋者最推傅良稱其以公榖之説參之左氏以其所不書實其所書以其所書推其所不書得學春秋之要在三傳後卓然名家而惜其悞以左氏所録為魯史舊文而不知䇿書有體夫子所據以加筆削者左氏亦未之見左氏書首所載不書之例皆史筆也非筆削之㫖公羊榖梁每難疑以不書𤼵義實與左氏異師陳氏合而求之殊失其本故于左氏所録而經不書者皆以為夫子所筆削則其不合于聖人者亦多云云考左氏為春秋作傳非為䇿書作傳其所云某故不書者不得經意或有之必以為别𤼵史例似非事寔况不修春秋二條公羊傳尚有傳聞不應左氏反不見均恐不足為傅良病惟以公榖合左氏為切中其失耳自王弼廢象數而談易者日増自啖助廢三傳而談春秋者日盛故解五經者惟易與春秋二家著録獨多空言易騁兹亦明效大騐矣傅良于臆説蠭起之日獨能根據舊文研求聖人之微㫖樓鑰序稱其于諸生中擇能熟誦三傳者三人曰蔡㓜學曰胡宗曰周勉遊宦必以一人自隨遇有所問其應如響其考究可謂至詳又其書雖多出新意而每傳之下必注曰此據某説此據某文其徵引可為至博以是立制世之枵腹而談褒貶者庶有豸乎傅良别有左氏章指三十卷樓鑰所序葢兼三書言之朱彛尊經義考注曰未見今永樂大典中尚存梗㮣然亦殘闕不能成帙故不復裒録焉乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋後傳左氏章指原序春秋後傳左氏章指二書故中書舎人止齋陳公傅良之所著也春秋之學不明久矣啖趙之後至於本朝而後有泰山孫先生復尊王之説彌彰公是劉先生敞權衡意林等書訂證尤詳伊川程先生頤雖無全書而一序所該聖人之大法備矣自王荆公安石之説盛行此道幾廢建炎紹興之初髙宗皇帝復振斯文胡文定公安國承伊洛之餘推明師道勸講經筵然後其學復傳學者以為標凖可謂大全矣東莱吕公祖謙又有集解行於世春秋之義殆無餘藴止齋生於東嘉天資絶人誦書屬文一旦迥出諸老先生上歛然布衣聲名四出六經之説流行萬里之外而其學尤深於春秋鑰非深於此者嘗涉獵諸公之書非不明白然亦不過隨文辨釋間有前後相為𤼵明者亦不見體統所在鑰自客授之初即從止齋游雖不得執經其門嘗深叩之同在西掖時始以隐公後傳數篇相示因為道春秋之所以作左氏之所以有功於經者其説卓然且曰自余之有得於此而欲著書於諸生中擇其能熟誦三傳者首得蔡君幼學蔡既壯又得二人焉曰胡宗曰周勉游宦必以一人自隨遇有所問其應如響而此書未易成也未幾去國而鑰亦歸雖若相忘於江湖而朋友之来必以此書為問雖親炙之者跪以請則曰此某身後之書也既不幸卒於嘉泰三年而此書始出於笥中其壻林子燕最得其傳又四年而後長子師轍與其徒汪龍友以二書来鑰老矣如獲希世之珍屏去他書窮晝夜讀之始盡得其大意嗚呼盛哉盖未有此書也先儒以例言春秋者切切然以為一言不差有不同者則曰變例竊以為未安公之書不然深究經㫖詳閲世變盖有所謂隐桓莊閔之春秋有所謂僖文宣成之春秋有所謂襄昭定哀之春秋始焉猶知有天子之命王室猶甚威重自霸者之令行諸侯不復知有王矣桓公之後齊不競而晉霸文公既亡晉不競而楚霸悼公再霸而又衰楚興而復㣲吳出而盟諸夏於越入吳而春秋終矣自杜征南以来謂平王東周之始王隐公遜國之賢君其説甚詳而公以為不為平王亦不為隐公而為桓王其説為有據依又其大節目如諸侯改元前所未有齊魯諸大國比數世間有世而無年至記厲王奔彘始有紀年古者諸侯無私史乗與檮杌春秋皆東遷之史也書齊鄭盟於石門以志諸侯之合書盟于鹹以志諸侯之散是春秋之終始也隐桓莊之際惟鄭多特筆襄昭定哀之際惟齊多特筆諸侯専征而後千乗之國有弑其君者矣大夫專將而後百乗之家有弑其君者矣宋魯衛陳蔡為一黨齊鄭為一黨公㑹齊鄭於中邱而後諸侯之師衡行于天下罪莫甚於鄭莊宋魯齊衛次之而父子兄弟之禍亦莫甚於五國是可為不臣者之戒矣齊桓公卒鄭遂朝楚諸侯從楚鄭為亂階侵蔡遂伐楚以志齊桓之霸侵陳遂侵宋以志楚莊之霸足以見中外之盛衰矣書公孫兹帥師書公孫敖帥師書公子季友卒習見三家之所從始首止之盟鄭伯逃歸不盟則書以其背夏盟也厲之役鄭伯逃歸不書盖逃楚也中外之辨嚴矣自隠而下春秋治在諸侯自文而下治在大夫有天下之辭有一國之辭有一人之辭於干戈無不貶於玉帛之使則從其爵勸懲著矣文十年而外秦又三十年而外鄭又五十餘年而外晉外鄭猶可也外晉甚矣貶不於甚則於事端餘實錄而已矣此皆先儒所未𤼵至僖之三十一年四卜郊不從乃免牲猶三望極言魯之用天子禮樂以明堂位之言為不然恵公始乞郊而不常用僖公始作頌所以郊為夸引祝鮀之言為證此尤為前所未聞也若左氏或以為非為經而作惟公以為著其不書以見春秋之所書者皆左氏之力章指一書首尾專𤼵此意昔人以杜征南為邱明忠臣然多曲從其説非忠也公之章指謂君子曰者盖博採善言禮也者盖據史舊聞非必皆合於春秋或曰後人增益之或曰後人依倣之或以凡例義淺而不取或以例非左氏之意盖愛而知其惡者廼所以為忠也又言莊公元年至七年及十九年以後訖終篇多無傳疑有佚墜公之求於傳者詳矣嗚呼與止齋游前後三十年不得卒業於其門既興殄瘁之悲而後得二書其間尚有欲質疑而不可得此所以撫卷三歎而不能自己也開禧三年冬至日四明樓鑰序先生為後傳將脱稾而病朞歳而病革學者有欲速得其書俾傭書傳寫其已削者或留其帖於編増入是正者或揭去弗存也勉宦江陵還始得朋友訂正之然已削者可刋帖於編而増入是正者不可復求矣惜哉勉從先生於桂陽於衡於潭日受經焉及後傳且就先生每語友朋將面授勉使盡質所疑而後出已而睽隔函文不果質今訂正猶先生之志云嘉定元年七月朔日門人周勉謹書
