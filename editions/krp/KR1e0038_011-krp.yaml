  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0038_WYG_011-1a, image: WYG0151/WYG0151-0710a.png}
body:
  text: 春秋後傳卷十一宋陳傅良撰定公元年春王三月晉人執宋仲幾于京師榖梁有傳夏六月癸亥公之喪至自乾侯戊辰公即位秋七月癸巳葬我君昭公胡氏從馮山以從祀先公為祔祭昭公據葬稱諡不應不祔廟今不取九月大雩立煬宫冬十月隕霜殺菽二年春王正月夏五月壬辰雉門及兩觀災秋楚人伐吳此囊瓦也貶人之冬十月新作雉門及兩觀三年春王正月公如晉至河乃復二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔四年春王二月癸巳陳侯吴卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚傳曰劉文公合諸侯于召陵謀伐楚也晉之合諸侯至平邱而止則是役劉子為之也劉子定内難復辟于周而楚納子朝於是合十八國之師伐楚雖五伯未有盛於此時者也以周之不競而能合諸侯盛於五伯俄而劉子卒君子葢深悲之也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之五月公及諸侯盟于臯鼬把伯成卒于㑹有晉侯在何以書公及諸侯盟非晉主盟也公㑹諸侯盟于薄公㑹諸侯盟于宋皆後至之文也非後至也而曰公及諸侯盟則以魯主之也是故書及劉卷卒諸侯無㑹同於是有特相盟者矣六月葬陳惠公許遷于容城秋七月公至自㑹劉卷卒王卿士不卒據成十三年成肅公昭十一年單成公有闗於天下之故則卒之於襄王之難有王子虎焉於敬王之難有劉子焉君子曰王室其庶幾乎而無救于周是故特卒之也司馬遷於諸國世家多缺卒而卒孔子葢知此者也葬把悼公楚人圍蔡晉士鞅衛孔圉帥師伐鮮虞葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于栢舉楚師敗績於是蔡侯如晉請伐楚晉辭蔡侯天下諸侯莫與憂蔡者而愬之吴吴子興師以伐楚是則吳知憂中國也是故吴始稱子書戰書敗績皆進吴也而楚囊瓦貶稱人楚囊瓦出奔鄭庚辰吴入郢公穀有傳入國不言邑入楚也而曰入郢非得國之辭也是役也鬬辛王孫由于王孫圉鍾建鬬巢申包胥王孫賈宋木鬬懐皆悉宣力焉秦師救楚楚子入于郢則楚為有人矣書入郢非得國之辭也前曰吴子今曰吴復從其舊號也舍黄池書吴而已五年春王三月辛亥朔日有食之夏歸粟于蔡於越入吴向曰越人今曰於越復從其舊號也越未有聞也昭定之春秋吴楚爭而後越入中國㑹于瑣也昭五年越常壽過始見於經而亟稱人後三十年而入吴不復稱人矣晉楚之初春秋未以敵言之戰于邲也則楚稱子矣吴楚之初春秋未以敵言之戰于栢舉也則吴稱子矣至於吴越終春秋不以敵言之也是故越入吴書吴入越不書哀元年六月丙申季孫意如卒秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸二月公侵鄭公至自侵鄭自宣之季年凡伐不言公魯無君將者八十年矣至是而書侵鄭則以公山不狃侯犯陽虎之専也故曰政逮於大夫四世矣故夫三桓之子孫㣲矣夏季孫斯仲孫何忌如晉秋晉人執宋行人樂祁犂冬城中城季孫斯仲孫何忌帥師圍鄆七年春王正月夏四月秋齊侯鄭伯盟于鹹此特相盟也特相盟自齊桓以來未之有也於是再見其再見何諸侯無主盟矣是故石門志諸侯之合也鹹志諸侯之判也齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙大雩齊國夏帥師伐我西鄙九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦不曰㑹士鞅曰㑹晉師重師也鞌之戰公㑹晉師于上鄍不書諱之也四卿並將而以禽鄭自師逆公三家之張成於此矣故諱之也於是齊師伐我晉士鞅趙鞅荀寅救我公㑹晉師于瓦勿諱可也秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛此其言遂何晉始伐與國也於襄之二十三年齊始叛晉取朝歌去年鄭始叛晉盟齊于鹹衛始叛晉盟于沙於是侵鄭衛又明年及齊平雖魯亦叛晉矣故悉書之也葬曹靖公九月葬陳懐公季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮從祀先公盜竊寳玉大弓於是禘于僖公不書書從祀先公非常也順祀則曷為謂之非常陽虎欲去三桓而為此也陽虎欲去三桓是以陪臣廢置大夫也虎陪臣也欲廢置三卿而追正宗廟之禮已而弗勝取周公之分器以出曽莫之禁者書曰從祀先公盜竊寳玉大弓魯無人之辭也是故陪臣叛皆不書據昭二十二年南蒯以費叛定十三年晉趙稷渉賔以邯鄲叛之類書陽虎為盜是治陪臣也君子之作春秋治至於陪臣斯極矣見公羊九年春王正月夏四月戊申鄭伯蠆卒得寳玉大弓六月葬鄭獻公秋齊侯衛侯次于五氏外㑹書次自厥貉以來未之有也於是再見其再見何中國無伯也齊衛伐盟主則其不書伐何春秋重絶晉也於襄之二十三年嘗書齊伐晉至是而不書何齊始叛晉諸侯猶有盟主也前年鄭叛晉盟齊于鹹衛叛晉盟齊于沙明年及齊平魯亦叛晉諸侯無盟主矣有盟主非美事也無盟主非細故也是故春秋重絶晉也秦伯卒冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷公至自夾谷晉趙鞅帥師圍衛齊人來歸鄆讙龜隂田叔孫州仇仲孫何忌帥師圍郈未有言來歸田者言來歸必自外至者也據鄭來歸祊及齊來歸衛寳之類鄆讙龜隂田言來歸以是為齊人之願也濟西言取讙闡言取鄆讙龜隂之田不言取以是為齊人之願則猶齊田也何休從外來常文與齊人來歸衛寳同齊強於天下伐盟主合諸侯于鄟陵矣於是願歸田則以孔子相夾谷之㑹也謂春秋之諸侯不足用為善者是不即人心者之論也故曰如有用我者期月而已可也秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹宋公子地出奔陳冬齊侯衛侯鄭游速㑹于安甫叔孫州仇如齊宋公之弟辰暨仲佗石彄出奔陳十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭冬及鄭平傳曰始叛晉也書輸平以志諸侯之合書及鄭平以志諸侯之散此春秋之所以終始也叔還如鄭涖盟十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈郈叔孫之邑也費季孫之邑也叔孫州仇墮郈季孫斯墮費以是為二家之願也三家専魯出昭公矣於是願墮其都則以孔子之相魯也謂春秋之大夫不足用為善者是不即人心者之論也故曰如有用我者朞月而已可也衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費秋大雩冬十月癸亥公㑹齊侯盟于黄十有一月丙寅朔日有食之公至自黄十有二月公圍成公至自圍成成孟孫之邑公行不越竟不書至至圍成危之也初作三軍也三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉三家之強孟氏為猶有君也莫難於墮郈費成墮易耳而公自將圍成弗克是不足與有為也齊人歸女樂三日不朝是以微罪行也十有三年春齊侯衛侯次于垂葭夏築蛇淵囿大蒐于比蒲衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛荀寅士吉射伐趙氏鞅奔晉陽韓魏伐范中行氏寅吉射奔朝歌鞅非始禍者也則曷為皆以叛書之春秋之季家有藏甲都邑皆百雉之城矣鞅必奔晉陽寅吉射必奔朝歌則是皆叛也晉趙鞅歸于晉歸不言自鞅無所自也歸易辭也欒盈魚石猶言入至鞅而後言歸則晉無人之辭也此韓趙魏分晉之本也叛臣至於書歸則佚賊不足錄矣此韓魏趙分晉之本也薛弑其君比十有四年春衛公叔戍來奔衛趙陽出奔宋二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸夏衛北宫結來奔五月於越敗吴于檇李吴子光卒光嘗弑君矣其君稱國以弑而光書卒何他君無貶焉然則光無罪歟以莒展輿之罪不著于春秋而逾年不成君則光罪不容誅矣公㑹齊侯衛侯于牽公至自㑹秋齊侯宋公㑹于洮天王使石尚來歸脤衛世子蒯瞶出奔宋衛公孟彄出奔鄭宋公之弟辰自蕭來奔大蒐于比蒲邾子來㑹公㑹公於比蒲也從榖梁范甯注自舍中軍公不與兵政者四十年矣於是蒐比蒲則以季孫斯叔孫州仇之墮費郈也故曰政逮于大夫四世矣故夫三桓之子孫微矣城莒父及霄十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊壬申公薨于髙寢鄭罕逹帥師伐宋齊侯衛侯次于渠蒢邾子來奔喪諸侯來奔喪於是始秋七月壬申姒氏卒左氏公羊有傳八月庚辰朔日有食之九月滕子來㑹葬丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒妾母也自成風訖於宣襄子苟為君則其母為夫人子嘗為君不敢以其母為夫人者隱公而已矣是故聲子不葬聲子不葬葬定姒則是哀公之以夫人喪其母猶宣襄也哀公之喪其母猶宣襄也則何以卒不稱夫人葬不稱小君徒以喪在殯不及尊其母焉耳冬城漆春秋後傳卷十一
