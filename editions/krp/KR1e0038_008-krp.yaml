body:
  text: 春秋後傳卷八宋陳傅良撰成公元年春至正月公即位二月辛酉葬我君宣公無冰三月作邱甲邱甲何邱自為甲也二十五人為兩四兩為卒卒出長轂一乗也於甸乎取之於是有甲士魏武帝孫子甲士三人歩卒七十二人炊子守裝子之類又二十五人是一乗也邱十六井也而自為甲是邱賦一乗也大司馬之制上地家可用三人中地二家五人下地家二人皆勝兵也必四邱之甸也而後備一卒出長轂一乗則是從征少而休多也作邱甲休少而從征多矣夏臧孫許及晉侯盟于赤棘秋王師敗績于茅戎戰然後言敗績此不戰何以書敗績言自敗也凡王有事譏不在諸侯出居於鄭之類諸侯有事譏不在臣子棄其師之類則以自致之文書之雖有敵國亦自致也梁亡齊人殱于遂王師敗績于茅戎無敵國之辭也昔者伐鄭桓王不言敗績諱之也則曷不為定王諱昔者討不庭則君子何忍言之於是晉人平戎既拜成矣劉康公徼戎遂伐之敗焉是故不諱書曰敗績于茅戎而劉康公但稱師冬十月二年春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績衛書大夫帥師於是始大夫強也良夫世為卿至林父出其君入于戚以叛是故雖孔逹不言帥師見文元年必若良夫而後言帥師六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績秋七月齊侯使國佐如師己酉及國佐盟于袁婁凡帥非卿不書據傳文三年晉救江書陽處父不書先僕襄十七年衛伐曹書石買不書孫蒯之類雖卿也非元帥亦不書據傳襄元年圍宋彭城書晉欒黶不書荀偃宣二年戰大棘書宋華元不書樂吕之類書四卿是各自帥也㑹伐不言帥師此其言帥師何四卿並出各自為帥也自文之季年而無使介至是而無將佐魯三家之勢成矣於是衛未有大夫將書孫良夫曹無大夫書公子首而賞鞌之功晉於是有六卿征伐在大夫不獨魯也以四國之臣戰齊君甚矣鞌戰之忿也齊桓合九國之師以臨楚屈完來盟於師桓不欲以臨楚盟屈完也退而盟召陵齊侯使國佐如師進師于袁婁而後盟國佐且夫屈完不言使而國佐言使屈完不言使而退盟之於召陵以禮於楚子國佐言使而進盟之於袁婁以偪齊君桓公之所不敢而四國之臣敢為之甚矣鞌戰之忿也八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田冬楚師鄭師侵衛十有一月公㑹楚公子嬰齊于蜀凡吾君㑹諸侯則有大夫得稱其大夫僖二十五年莒慶二十六年衛甯速苟無諸侯則不以大夫敵吾君是故莒無大夫則曰莒人浮來齊有大夫則曰齊大夫蔇及高徯盟及晉處父盟始以大夫敵吾君矣皆不言公以是為齊晉之譏則諱公焉耳此其曰公㑹楚公子嬰齊是公自與嬰齊夷也於楚之㑹盂公後諸侯至於楚之㑹宋公亦後諸侯至魯猶重從楚也公與嬰齊夷楚何譏焉不足為公諱焉爾是故自屈完以來楚大夫皆無氏族也而書公子自嬰齊始丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀此楚公子嬰齊蔡侯許男宋華元陳公孫寧衛孫良夫鄭公子去疾也曷為貶稱人楚大夫初㑹盟也是故諸侯之大夫復不序晉大夫初㑹盟則不言公楚大夫初㑹盟則其言公何公固與嬰齊夷矣無足諱焉爾三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭公羊有傳乙亥葬宋文公夏公如晉鄭公子去疾帥師伐許鄭初書大夫將也公至自晉秋叔孫僑如帥師圍棘公羊有傳不言叛内言圍皆叛也大雩晉郤克衛孫良夫伐廧咎如有傳冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟聘而遂盟之於是始丁未及孫良夫盟鄭伐許外鄭也其外之何楚之伯鄭人為之也由齊桓以來爭鄭於楚桓公卒鄭始朝楚諸夏之服於楚鄭為亂階也至辰陵鄭帥諸夏而事楚矣敗晉于邲盟十四國之君大夫於蜀皆鄭為之是故外秦而後外鄭微秦鄭中國無荆禍矣四年春宋公使華元來聘三月壬申鄭伯堅卒把伯來朝夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉冬城鄆鄭伯伐許稱鄭伯説見桓十三年五年春王正月把叔姬來歸仲孫蔑如宋夏叔孫僑如㑹晉荀首于榖梁山崩秋大水冬十有一月己酉天王崩十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢六年春王正月公至自㑹二月辛巳立武宫公羊有傳取鄟衛孫良夫帥師侵宋夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭楚初書大夫將也自是必圍滅也而後貶人之冬季孫行父如晉晉欒書帥師救鄭晉嘗救鄭矣不書宣十年士㑹救鄭於是書救何鄭不服也鄭自辰陵無役不從楚敗晉于邲盟諸侯之大夫于蜀再伐許春秋於是狄鄭蟲牢之盟鄭始服而楚人爭鄭未巳也今年救鄭明年合九國之衆以復救鄭而鄭伯㑹楚公子成於鄧於是執鄭伯殺行人伯蠲而鄭不急君晉於是歸鄭伯使鍾儀合晉楚之成矣七年春王正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛吴伐郯有傳吴初入伐中國也夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵公至自㑹吴入州來吴楚之交兵不書據傳伐楚伐巢伐徐子重七奔命至是始書之傳曰是以始大通吴于上國晉人為之也盟于蒲景公將始㑹吴吴不至於鐘離而後至盟於雞澤悼公又逆吴子吴不至於戚而後至吴之為蠻久矣其不敢自列於諸夏而晉求之急將以罷楚也楚罷晉亦不復伯矣入州來不可以不錄其始也冬大雩衛孫林父出奔晉八年春晉侯使韓穿來言汶陽之田歸之于齊晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元來聘夏宋公使公孫壽來納幣晉殺其大夫趙同趙括秋七月天子使召伯來賜公命冬十月癸卯把叔姬卒内女為夫人恒書卒其不言卒者出也把叔姬嘗出矣則曷為書卒以把伯之來逆喪則不可以不卒也晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯衛人來媵媵何以書公親與為禮也媵細故也人微者也以微者行細故而公親受之則不可不書也是故苟不親雖改葬惠公隱弗臨不書苟親之雖衛人晉人齊人來媵書然則媵者無譏與媵必以同姓齊人悖矣九年春王正月把伯來逆叔姬之喪以歸公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子把伯同盟于蒲公至自㑹二月伯姬歸于宋夏季孫行父如宋致女晉人來媵秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆此嬰齊也向也於㑹蜀稱嬰齊於盟稱人今也於伐莒稱嬰齊於入鄆稱人一人之身俄而進退焉春秋之於楚無所不盡其辭也莊王之篇圍滅無貶辭莊王卒春秋志楚強而已矣是故於柏舉戰稱人奔稱囊瓦秦人白狄伐晉鄭人圍許城中城十年春衛侯之弟黒背帥師侵鄭夏四月五卜郊不從乃不郊五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭齊人來媵丙午晉侯獳卒秋七月公如晉説在文二年冬十月十有一年春王三月公至自晉晉侯使郤犫來聘己丑及郤犫盟夏季孫行父如晉秋叔孫僑如如齊冬十月十有二年春周公出奔晉有傳周公楚也王卿士雖奔不名必王子也而後名王子奔必嘗與廢立者也王人奔不言出言出必嘗去位者也非王人也則不在其國而後不言出據公孫敖公孫歸父晉先蔑夏公㑹晉侯衛侯于𤨏澤秋晉人敗狄于交剛中國敗外域皆不書唯晉特書之特書晉者病晉也楚方聘魯平宋合諸侯之大夫于蜀討陳夏徴舒觀兵于雒矣而晉區區爭地於羣狄是故宣成之春秋晉有事於秦楚或略不書而甚詳於滅狄以是為晉衰也晉之衰諸夏之憂也冬十月十有三年春晉侯使郤錡來乞師外乞師不書必盟主也而後書乞卑詞也見晉之無以令與國也三月公如京師公羊有傳注非是夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦於是戰于麻隧秦師敗績則其但書伐何畧之也自外秦以來秦晉之相加兵皆略之是故戰于麻隧秦師敗績但書伐秦戰于櫟晉師敗績但書伐晉以為不足詳焉爾曹伯盧卒于師秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊夫人婦姜氏有姑之恒稱也若妾姑也則不書氏是故有成風則出姜不氏有敬嬴則穆姜不氏所以别嫡姑也冬十月庚寅衛侯臧卒秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒公羊有傳癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師凡例非是説在章指執未有稱爵者此其稱晉侯何討有罪也曹伯之罪不著于春秋曷為以討辭書之曹伯殺太子而自立者也然則負芻之罪曷不著於春秋曹伯盧卒未有即位者公子與太子爭立猶兩下相殺而已矣書殺太子是有二尊也猶兩下相殺而已矣則其討之何不討之則嫡庶之亂將接迹于天下矣是故特書晉侯公至自㑹夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸於宋洞林本不復出宋華元宋殺其大夫山有傳於是華元使華喜公孫師帥國人攻蕩氏殺子山則何以稱國稱國殺無罪之辭也蕩澤弱公室則曷為例之以無罪不氏所以别其非無罪也不氏所以别其非無罪也則稱國有司法守之辭也宋魚石出奔楚於是魚石向為人鱗朱向帶魚府出奔楚則其但書魚石何凡奔必有罪也衆不可以勝罪則罪此甚焉魚石以楚師伐宗國入彭城為宋患之日久是以甚魚石也冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吴于鍾離晉初以諸侯之大夫㑹吴也傳曰始通吴也於是大夫自為㑹矣殊㑹齊桓公所以尊王世子也齊桓公以殊㑹㑹王世子厲公以殊㑹㑹吴吴之為蠻久矣而與王世子同文甚矣厲公之為中國患也許遷于葉於是楚公子申遷許于葉則其曰許遷于葉何以其從夷狄雖遷之猶自遷也是故遷于夷以公子棄疾遷于白羽以王子勝皆以自遷之文書之十有六年春王正月雨木冰榖梁有傳夏四月辛未滕子卒鄭公子喜帥師侵宋六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績二傳同楚不言師從公榖楚殺其大夫公子側秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公榖梁有傳公至自㑹公㑹尹子晉侯齊國佐邾人伐鄭㑹伐未有書王人者此其書尹子何初以王卿士與伐也春秋不以諸侯用王師雖齊桓不得與單伯序也陽處父之救江也王叔桓公不書雖前年伐秦之役劉子成子猶不書也於是厲公恣矣初以尹子與齊國佐邾人序甚矣厲公之無道也曹伯歸自京師執君不名歸然後名之此其不名何以京師釋之也負芻有罪矣而京師釋之則異於他歸者矣不名之可也九月晉人執季孫行父舍之于苕邱冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自㑹乙酉刺公子偃刺公子偃殺有罪之辭也從啖氏公子買戍衛不卒戍刺之殺無罪之辭也春秋序事而不言故言故皆譏也十有七年春衛北宫括帥師侵鄭夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭王人未有書二卿者書二卿皆與伐也六月乙酉同盟于柯陵其不指言諸侯何二子與盟也言諸侯則疑於葵邱狄泉之盟諱王子虎於是不諱曷為不諱㑹伐未有書王人者唯晉厲公特書之㑹盟不足諱焉爾是故書同盟其尹子之盟與抑厲公之盟與莫適為主之辭也秋公至自㑹齊髙無咎出奔莒九月辛丑用郊晉侯使荀罃來乞師冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犫郤至楚人滅舒庸此公子橐師也十有八年春王正月晉殺其大夫胥童庚申晉弑其君州蒲晉侯孰弑欒書中行偃也晉侯一日而尸三卿又執書偃將殺之而以自禍是故稱國楚商臣殺鬭勃而後弑君晉欒書中行偃殺胥童而後弑君春秋不列於孔父以是為不能與其君存亡者也然則書晉殺胥童不書楚殺鬭勃何也書殺胥童以累州蒲也不書殺鬬勃不以累頵也州蒲稱國以弑而弑頵斥商臣二君之所以異也是故弑不言故弑而言故有自來者矣晉殺其大夫郤錡郤犫郤至晉殺其大夫胥童晉弑其君州蒲蔡殺其大夫公子駟蔡放其大夫公孫獵盜殺蔡侯申春秋書弑未有詳於此者也齊殺其大夫國佐公如晉夏楚子鄭伯伐宋宋魚石復入于彭城奔大夫復不書據文十一年宋蕩意諸昭五年秦后子之類莊閔而上有書歸若入者矣則皆不書奔者也鄭突曹赤齊小白蔡季許叔魯季子之類奔而言歸自衛元咺始元咺訟其君者也雖然歸猶言自也若宋魚石晉欒盈是賊而已矣是故魚石不言自楚欒盈不言自齊公至自晉晉侯使士匄來聘秋把伯來朝八月邾子來朝築鹿囿己丑公薨于路寢冬楚人鄭人侵宋此楚公子嬰齊也晉侯使士魴來乞師十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虚朾崔杼嘗奔衛不言歸其再見何齊納以為大夫也向也曰崔氏今曰崔杼則已為大夫也齊之禍靈公為之也前年逐髙無咎今年殺國佐而杼當國已而殺髙厚齊無世臣矣於是伐莒伐魯皆杼帥師焉而后弑齊之禍靈公為之也丁未葬我君成公春秋後傳卷八
