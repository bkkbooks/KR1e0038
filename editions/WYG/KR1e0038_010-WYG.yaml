body:
  text: 春秋後傳卷十宋陳傅良撰昭公元年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢三月取鄆於是季孫宿伐莒取鄆則書法何以異于公孫歸父事在宣十年歸父伐邾猶公命也専取邑而已夏秦伯之弟鍼出奔晉六月丁巳邾子華卒晉荀吴帥師敗狄于大鹵晉自悼公以來狄師不出敗狄至是而再見其再見何晉彌衰也悼公之伯也魏絳諫曰勞師于戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華毋乃不可乎悼公卒復有事于戎狄至伐鮮虞春秋遂狄晉矣秋莒去疾自齊入于莒前言齊無知弑其君後言小白入于齊前言莒人弑其君後言去疾入于莒則不與弑之辭也前言衛侯入于夷儀後言衛甯喜弑其君前言齊陽生入於齊後言齊陳乞弑其君與弑之辭也辭有先後罪有小大故曰屬辭比事春秋教也莒展輿出奔吴展輿嘗弑君矣其君稱國以弑則展輿無罪歟以陳佗之罪不著於春秋有殺之者則子之以討賊之辭則展輿罪不容誅矣其再見猶荀偃焉爾是故雖踰年不成君書名叔弓帥師疆鄆田葬邾悼公冬十有一月己酉楚子麇卒此公子圍弑其君則其書卒何以君薨赴也君弑矣晏然赴於他國之君如恒辭猶鄭騑也而其臣子聽焉相與設應為後之辭甚矣無人紀也從而書卒所以誅楚之臣子聽賊之所為也圍之未弑也魯蔡鄭之大夫固知之矣㑹于申以齊慶封徇於諸侯曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如共王之庶子圍弑其君兄之子麇而代之以盟諸侯軍人粲然皆笑史見其事春秋著其心則後世有考矣楚公子比出奔晉二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黒冬公如晉至河乃復季孫宿如晉三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝八月大雩冬大雨雹北燕伯欵出奔齊四年春王正月大雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚初専合諸侯也齊桓卒楚宋嘗争長矣敗于城濮楚師不出者八年晉志不在諸侯而後楚莊盟于辰陵以莊王之賢從之者陳鄭焉耳申之㑹合十有二國楚之得志於中國未有盛於此時者也楚人執徐子凡外域交相執不書據文十二年楚執舒子平昭三十年吴執鍾吾子書執徐子危㑹申之諸侯也自宋之盟中國無大㑹越九年而十二國之君皆受命於楚楚於是不殊淮夷執徐子不殊淮夷執徐子將以威中國也是故其交相執不志為中國危之故志之也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吴執齊慶封殺之遂滅賴執齊慶封何以伐吴慶封再奔吴吴予之朱方此執有罪也則曷為不再言楚子據㑹于戚晉侯執曹伯再言晉侯不予楚以討齊慶封之辭也從榖梁猶曰諸侯執之云爾申之㑹夷夏之大變也宋虢之事猶曰二伯至是而楚始専合諸侯范甯靈王始會諸侯訖於厥憗諸夏無㑹同者十年而楚執齊慶封放陳招殺蔡般假討賊之義以號于天下由是而滅頼滅陳滅蔡矣九月取鄫傳例非是冬十有二月乙卯叔孫豹卒五年春王正月舍中軍傳曰卑公室也公榖非舍中軍從祀先公皆善辭也㣲國史無以知舍中軍為季氏専魯從祀先公為陽虎専季氏也然則春秋固不可以無史歟豈惟春秋孔氏之述六經也則以萬世之史筆削之焉爾於書錄康誥不錄唐誥於詩錄鵲巢騶虞不錄貍首其甚彰彰者也史行于天下六經修于聖人萬世之後史與經並衡焉有以考吾之所去取者矣是孔子之意也春秋固東遷之史也史曰晉侯召王以諸侯見吾曰天王狩史曰衛甯殖孫林父出其君吾曰衛侯奔向微國史亦無以見修春秋之辭也舍中軍從祀先公是季孫宿陽虎之事魯史云然我何加損焉不没其實焉爾矣苟其文不可以不是正則有筆削苟不必是正雖無筆削可也楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防兹來奔有傳秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吴初書越而常壽過得稱人越驟強也通吴以疲楚者晉謀之失也通越以困吴者楚謀之失也六年春王正月杞伯益姑卒葬秦景公夏季孫宿如晉葬把文公宋華合比出奔衛秋九月大雩楚薳罷帥師伐吴冬叔弓如楚齊侯伐北燕七年春王正月暨齊平平不書必關於天下之大故而後書於是燕大夫比以殺公之外嬖公懼奔齊齊侯伐燕納簡公庶幾乎天下之大義也而取燕姬與其寳賂而還不書平是子齊以定燕也靈公以來齊首敗伯主之約納晉欒盈叛人也納北燕伯猶庶幾乎天下之大義而卒與之平是黨亂臣逆子也是故昭定而下春秋多罪齊書伐衛遂伐晉同圍齊襲莒暨齊平盟于鹹次于五氏皆特筆也夫子曰齊景公有馬千駟死之日民無得而稱焉葢不予齊也三月公如楚叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師兩下相殺雖世子不書據陳佗曹負芻此何以書斥君之辭也陳侯鮑卒佗殺太子而自立曹伯廬卒負芻殺太子而自立猶兩下相殺也初哀公元妃生偃師而嬖二妃屬其子留於公子招公子過哀有廢疾招殺其世子偃師而立留哀公經而死哀有世子矣又屬其嬖子於二公子為是殺世子則譏不但其人也書曰陳侯之弟招殺陳世子偃師陳侯溺卒斥君之辭也夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人干徴師殺之陳公子留出奔鄭秋蒐于紅蒐狩不書必違禮而後書於是舍中軍四分公室季氏擇二二子各一皆盡征之而貢于公蒐于紅也自根牟至於商衛革車千乗皆三家之師也自是而屢蒐三家所以耀武焉爾是故桓莊之狩必言公昭定之蒐不言公矣十一年大蒐于比蒲晉叔向曰君有大喪國不廢蒐不忌君也陳人殺其大夫公子過大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公九年春叔弓㑹楚子于陳於是叔弓及宋華亥鄭游吉衛趙黶㑹楚子于陳諸夏之大夫旅見於楚於是始舉魯以見其餘也外㑹不志有異焉則志之是故書仲孫蔑衛孫林父㑹吴于善道可以書仲孫蔑衛孫林父㑹吴于善道曷為不書叔弓宋華亥鄭游吉衛趙黶㑹楚子于陳凡舉魯以見其餘者則天下之辭也許遷于夷夏四月陳災榖梁有傳秋仲孫貜如齊冬築郎囿十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒舍中軍矣曷為書三卿帥師四分公室叔弓為意如貳也成二年鞌之戰書季孫行父臧孫許叔孫僑如公孫嬰齊葢二軍之將佐襄十年作三軍而三分公室三家各將其一昭五年舍中軍而四分公室季氏擇二二子各一於是伐莒叔弓佐意如序於仲孫貜之上而叔孫婼守自是訖春秋魯有四卿而權歸三家内取邑悉書也於是取郠不書取邑不足詳也由是取鄭匡不書定六年取晉蒲棘不書哀元年戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申諸侯之罪非滅同姓不名據邾文公用鄫子楚䖍何以名以夷狄殺中國甚矣蔡般夫人之所得討也則曷為謂之夷狄殺中國楚子假大義以號于天下放陳公子殺蔡侯於是滅陳蔡是謂之討賊歟殺中國之君大夫歟國君見殺恒不名據戎蠻子鄫子蔡侯何以名自楚商臣而下弑父無討者必若蔡般殺以他故而後見焉爾是故宜不名名之雖若蔡般殺以他故而後見則猶曰蔡侯而已矣楚公子棄疾帥師圍蔡滅不言圍此其言圍何以病晉也韓起合九國之大夫于厥憖以謀救蔡而蔡卒滅於楚言圍所以病晉也前年棄疾奉孫吴圍陳已而滅陳則曷為不於此焉病晉合九國于厥憖而不能師甚矣五月甲申夫人歸氏薨大蒐于比蒲仲孫貜㑹邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人把人于厥憖九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之滅而以歸未有言執者言執弗臣之之辭也是故均之為滅國也嘗臣之矣書曰以沈子嘉歸殺之未嘗臣之也書曰執蔡世子有以歸用之十有二年春齊髙偃帥師納北燕伯于陽于陽内弗受也衛侯朔入衛不言納納頓子不言奔奔且言納者北燕伯欵衛世子蒯聵也是内弗受之辭也三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月葬鄭簡公楚殺其大夫成熊秋七月冬十月公子憖出奔齊奔辭有三公孫敖如京師不至而復丙戌奔莒未將命之辭也公孫歸父如晉歸父還自晉至笙遂奔齊復命之辭也憖與南蒯謀季氏告公而退從公如晉南蒯以費叛憖還及郊未復命聞亂遂奔齊季氏之出其君有以也則憖有奔焉爾楚子伐徐晉伐鮮虞從榖梁外晉也晉主諸夏之盟春秋之外秦以晉故也外鄭亦以晉故也則其外晉何晉之君卿無中國之志也楚䖍弑君之賊也而執齊慶封放陳招殺蔡侯般假討賊之名以盟諸夏而晉連年有事于狄鮮虞吴入郢於越入吴晉猶圍鮮虞也詳於狄事而不詳于楚則晉無中國之志也於是外晉是故自成襄之春秋晉雖或競於楚略之不書也而敗狄于交剛于大鹵滅赤狄潞氏滅赤狄甲氏及留吁則詳志之而滅肥不書滅鼓不書莫重於外晉苟外晉矣餘不足書也十有三年春叔弓帥師圍費内不言叛言圍皆叛也夏四月楚公子比自晉歸于楚弑其君䖍于乾谿楚公子棄疾殺公子比公子比何以言歸自晉比亡公子爾靈王之弑棄疾為之也比立而君弑則比䝉首惡之名凡討賊恒稱人比䝉首惡之名則殺之宜稱人則曰楚公子棄疾殺公子比何靈王之弑棄疾為之也則是以公子殺公子耳非討賊也書弑其君比則比疑于齊舍書楚人殺比則棄疾疑于石碏雍廩不然是兩下之獄勿書可也春秋之修辭謹矣秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平邱晉復合諸侯也晉之合諸侯由是止鄟陵之後參盟復作晉非盟主矣八月甲戌同盟于平邱公不與盟㑹於沙隨不見公則譏不在魯也於是邾子莒子愬魯于晉晉侯不見公書曰公不與盟譏魯之辭也向也黒壤公不與盟則諱不書盟今也不諱則譏魯之辭也於溴梁於祝柯嘗為魯執邾莒矣而魯亟出師又納其叛人於是邾莒愬於晉晉為有辭於魯也而公遂不盟晉之不自強於主盟由重邱而後皆大夫爾以晉之不自強於主盟而復合諸侯於是劉子臨之叔向請之諸夏猶有屬焉而齊人不可鄭人爭承魯人不與盟而列國之君大夫旅見於楚則晉之合諸侯由是止鄟陵之後參盟復作則魯誠與有譏焉爾譏魯所以徧刺天下之諸侯也晉人執季孫意如以歸公至自㑹蔡侯廬歸于蔡陳侯吴歸于陳於是楚平王封陳蔡而復之隱太子之子廬歸于蔡悼太子之子吴歸于陳則其書曰陳侯蔡侯歸何不予楚専封也歸辭有三突歸于鄭篡公子之辭也蔡季自陳歸于蔡宜得國公子之辭也衛侯鄭歸于衛嘗失國之君之辭也此未嘗有國也使之如失國辭然者不與楚専封也從榖梁冬十月葬蔡靈公公如晉至河乃復吴滅州來十有四年春意如至自晉大夫不致榖梁例必見執也而後至亦危之也二月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢莒子卒郊公不慼國人欲立莒子之弟庚輿蒲餘侯惡意恢而善於庚輿殺意恢逆庚輿於齊莒無大夫書殺意恢以非其罪也於是郊公奔齊庚輿虐而好劔立十年國人逐之齊人納郊公而郊公出入皆不書則亦非其罪也以不罪莒郊公知鄭忽衛蒯瞶之所以書也十有五年春王正月吴子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事夏蔡朝吴出奔鄭六月丁巳朔日有食之秋晉荀吴帥師伐鮮虞嘗外晉矣則荀吴何以無貶於初伐貶餘實錄而已爾冬公如晉十有六年春齊侯伐徐楚子誘戎蠻子殺之公羊有傳戎蠻子嘉也不名名之則疑於蔡侯般范甯楚子不名非中國故夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吴帥師滅陸渾之戎自是凡滅不復稱人矣滅不書大夫者吴也吴無大夫也冬有星孛于大辰楚人及吴戰于長岸此楚令尹陽匄也書人吴公子光也書國略之也楚之君大夫不見於春秋者十八年而吴入郢矣昭公之春秋莫辨於吴楚也五年吴嘗敗楚于鵲岸不書六年敗楚于房鍾不書書伐吴而已於是始書戰則以吴楚敵言之也十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災公羊有傳六月邾人入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾夏五月戊辰許世子止弑其君買榖梁有傳弑君天下之大惡也許悼公瘧飲太子止之藥而卒太子奔晉則其曰弑其君何春秋嘗斷斯獄矣于魯曰公薨夫人姜氏孫於邾於莒曰莒弑其君宻州莒展輿出奔吴則二君之罪人得矣止不嘗藥悼公飲焉而卒則世子何罪弑君天下之大惡也而加諸無罪之子曰將為後人戒何以為春秋然則世子果何罪悼公瘧飲世子止之藥而卒世子奔晉世子誠不嘗藥爾何罪而奔晉春秋有以斷斯獄矣止不書奔舉重也公薨莒弑其君宻州二君之罪人未知其為誰也夫人孫于邾展輿出奔吴則罪人斯得曰世子止弑其君不言奔可也己卯地震秋齊髙發帥師伐莒冬葬許悼公凡異邦人殺吾君書葬據魯桓公盜殺其君書葬據蔡昭公此世子弑君也而亦書葬世子貴之至而與盜同文親之至而與異邦人同文春秋之惡惡未有甚於此者也二十年春王正月夏曹公孫㑹自鄸出奔宋榖梁有傳秋盜殺衛侯之兄縶此齊豹也則曷為以賤辭書之奪之司寇則非大夫也盜賤者也以賤者而殺其君兄於是衛侯如死鳥則衛之失政甚矣冬十月宋華亥向寧華定出奔陳於是公子城公孫忌八子奔鄭華亥向寧華定奔陳則其但書三子何凡奔罪也衆不可以勝罪則罪其甚焉者爾入南里以叛乞師於楚為宋患之日久是以甚三子也十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛於是晉荀吴齊苑何忌衛公子朝救宋圍華氏於南里而華氏乞師於楚諸侯之戍出之不書圍宋南里不以討叛予晉也秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚公如晉至河乃復二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚再奔不書據齊慶封來奔齊人來讓奔吳定十四年衛公孟彄奔鄭自鄭奔齊之類必嘗入叛也而後書晉欒盈鄭良霄猶及殺之矣書奔言佚賊也書奔猶可也書歸據定十三年晉趙鞅甚矣大蒐于昌間夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂周亂不書據子頽子帶書王室亂則天下無人紀矣昔者惠襄之世子頽亂鄭虢討之子帶亂晉討之春秋不書猶有臣子焉耳於是景王崩悼王即位既葬矣子朝欲簒子猛而立凡歴悼敬五年而後定而訖於佚賊則天下無人紀矣劉子單子以王猛居于皇以武氏子毛伯不稱使則王在喪雖踰年猶未稱王也本公羊文九年傳此争立也則其遂稱王何成猛之為王也景王崩太子夀早卒猛匄其母弟也而王愛庶子朝欲立之於是單劉奉猛尹召奉朝未知其誰宜立也成猛之為王則猛宜立者也是故春秋之誼苟宜立也則糾雖未得國成之為子糾猛雖未得京師成之為王猛秋劉子單子以王猛入于王城居于皇言失京師也入于王城言始得京師也凡以非順辭也以虢公鄭伯晉侯不書以則非子二子也非予二子是單旗劉蚠以大夫専廢置君也以大夫専廢置君則曷為無貶前言王室亂後言二子以王猛居于皇入于王城則二子有不得已焉者爾而非其罪也然則以單劉為功不逮鄭虢則可以為罪則溢罰矣是故殺子朝於楚儋翩率子朝之徒以作亂敬王嘗處於姑蕕逾年卒克之子朝不書殺天王不書出是予單劉以復辟之誼也子朝事在定六年冬十月王子猛卒有傳猛諡曰悼王則其曰王子猛卒何未逾年也未逾年之君雖嘗有諡猶不列于廟次是故衛侯申據詩歸唁衛侯雖諡曰戴公猛雖諡曰悼王均之為不成君也王猛矣其列曰王子猛何於其卒從其恒稱爾春秋之誼苟廢立也足以亂名實則不可弗辨苟非廢立也無亂於名實則弗辨也是故成之為君則稱王猛於其卒也從其恒稱為王子猛不成之為君則稱鄭忽於其歸也從其恒稱為世子忽義不在焉則不没其實而已矣十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼有傳晉人圍郊郊天子之邑也向者子帶之亂晉文公嘗圍温矣不書以其討亂也圍郊以伐子朝之黨也則何以書討亂非晉志也於是王師敗于郊王猛卒敬王即位矣而籍談荀躒之師軍于隂于侯氏于谿泉次于杜逾年子朝立焉而後圍郊則討亂非晉志也是圍天子之邑而已矣是故晉自交剛之役凡師書君大夫復貶人之夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔戊辰吴敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧外域交相敗不書必敗中國而後書吴敗頓胡沈蔡陳許自入春秋未之有也是故吴子貶稱國天王居于狄泉于狄泉言未得京師也於是王猛卒敬王即位母弟匄也館于子旅氏謂之東王子朝謂之西王書曰天王居于狄泉黜子朝也尹氏立王子朝此尹圉也尹文公曷為稱尹氏亦非見大夫也於是敬王即位矣子朝入于尹尹圉為之殺劉佗召伯奐南宫極以成周人戍尹子朝入于王城則曷為但言尹氏猶曰獨尹氏所欲立也將以王天下獨尹氏立之則莫之與矣王子不名據王季子唯卒名之非卒也而名之者貶之也是故救衛名子突奔名子瑕立名子朝王札子闕據傳王子捷也八月乙未地震冬公如晉至河有疾乃復二十有四年春王二月丙戌仲孫貜卒婼至自晉有傳夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吴滅巢葬把平公二十有五年春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭㳺吉曹人邾人滕人薛人小邾人于黄父傳曰謀王室也於是天王謂之東王子朝謂之西王晉侯使涖問周故期以明年而後為黄父之㑹又明年而荀躒趙鞅之師出是故天王書出入而晉師克鞏不書書克鞏是討子朝也有鸜鵒來巢有傳秋七月上辛大雩季辛又雩九月己亥公孫于齊次于陽州公行書次自莊以來未之有也于是再見其再見何以昭公之失國不可不詳其所如徃也齊侯唁公于野井冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘十有二月齊侯􅂑鄆外取邑不書雖取諸我不書取鄆將以居公也則何以書病齊侯也昭公孫於齊齊侯將納公以梁邱據一言而遂不果鄟陵之盟將以合諸侯云爾而徒曰納公三年而無成則是取鄆而已矣是故取鄆則書齊圍成則書公二十有六年春王正月葬宋元公三月公至自齊居于鄆夏公圍成秋公㑹齊侯莒子邾子把伯盟于鄟陵此參盟也參盟自齊桓以來未之有也於是再見其再見何晉不復主盟矣齊徐郯莒嘗盟於蒲隧事在十六年宋邾郳徐嘗盟於蟲事在十九年傳則諸侯有不待伯主而自盟㑹久矣于是始書以晉之不復主盟也晉不復主盟而後齊専盟矣公至自會居于鄆九月庚申楚子居卒冬十月天王入于成周言始得京師也昔者惠王出入皆不書襄王雖書出猶不書入也於是悼王自皇敬王自狄泉則曷為皆書入幸之也王室亂矣入無足諱焉爾于成周猶未得王都也尹氏召伯毛伯以王子朝奔楚尹氏獨欲立子朝耳則其奔楚曷為兼言召伯毛伯敬王在外四年而後入則二子為之也然則曷為不以二子者首惡以二子首惡是有奉子朝者矣皆卿士也單劉奉猛毛召奉朝將又莫知其誰宜立也是故終始于尹氏以二卿序尹氏之下則從之者而已據傳二十三年子朝入于王城二十十四年召簡公以甘桓公見子朝二十有七年春公如齊公至自齊居于鄆夏四月吴弑其君僚吴子孰弑吴公子光也夫稱國以弑必貴戚也則嘗有廢立者也庶其絀長密州絀少光徒以篡焉爾則何以稱國於是夀夢有四子而季子賢謁也餘祭也夷昧也不以國與子而與弟凡為季子也季子不受則國宜之光者僚越光而代札是自禍也父子兄弟苟焉以其位為利至于相戕賊也天理絶矣是故賊不書主名以是為有國者大戒彼又何誅焉楚殺其大夫郤宛秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈外大夫自為㑹冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公公如晉次于乾侯夏四月庚子叔詣卒秋七月冬十月鄆潰三十年春王正月公在乾侯有傳夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吴滅徐徐子章羽奔楚奔非其罪莫甚于被兵者也雖不死社稷猶不名也則其名徐子何臣吴而後奔也滅國有三辭以歸臣之之辭也奔猶弗臣之之辭也不言歸若奔死之之辭也是故奔者不必名以歸也而後名之於是吴滅徐徐子斷其髪擕其夫人以逆吴子吴子唁而送之遂奔楚徐子而不名則疑于譚子弦子温子矣三十有一年春王正月公在乾侯有傳季孫意如㑹晉荀躒于適歴季氏出其君而納邾快又納黒肱卒大夫會葬晉宋滕薛晏然如二君矣君在外雖卿有事不書必有諸侯之事而後書是故文公在晉公孫敖㑹于垂隴襄公在晉季孫宿㑹于邢邱皆伯令也昭公在乾侯季孫意如㑹晉荀躒于適歴非諸侯之事也則何以書以晉之釋君而助臣也晉士鞅㑹諸侯之大夫于扈將以納公取貨于季孫而遂不果荀躒復為此㑹昭公所以死於外也襄昭之際大夫無君之禍晉人為之也公㑹晉侯於夷儀衛侯入于夷儀衛甯喜弑其君剽公如晉次于乾侯公在乾侯季孫意如㑹晉荀躒于適歴公薨于乾侯皆罪晉之辭也夏四月丁巳薛伯榖卒有傳晉侯使荀躒唁公于乾侯秋葬薛獻公冬黒肱以濫來奔有傳傳曰邾黒肱也其不繫之邾濫嘗自别二君也圍戚不曰圍衛戚取鄆不曰取我鄆皆如于邾之辭也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯有傳取闞夏吴伐越秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周諸侯有事于京師皆不書隱六年僖二十八年獻捷之類戍之不書據僖十三年十四年傳城之不書二十四年城郊以是為常事也書城成周則請而後城之是非常也是役也晉魏舒南靣韓不信専執于京師宋仲幾不受功齊髙張後大夫之無王甚矣然則大夫何以無貶於澶淵貶亦實録而已矣十有二月己未公薨于乾侯有傳春秋後傳卷十
