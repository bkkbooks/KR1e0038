  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0038_WYG_012-1a, image: WYG0151/WYG0151-0716a.png}
body:
  text: 春秋後傳卷十二宋陳傅良撰哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡鄭滅許矣其再見何復正也復正有三辭莫善於自尅復者也是故襄王嘗書出已而書王事在僖二十八年則愈於敬王書入矣許嘗書滅已而書許男則愈于陳蔡書歸矣春秋善復正襄王許男則善之善者也何休自復無惡文鼷䑕食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉伐夷儀不書書次五氏伐河内不書書次垂葭公㑹齊衛于牽帥狄師襲晉戰于絳中猶不書也諸夏之無君春秋誠有不忍書也必於是而後書春秋葢將終焉是故春秋之初諸侯無王者齊鄭宋魯衛為之也春秋之季諸侯無伯者亦齊鄭宋魯衛為之也冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹自是内外盟皆不書不足書也是故鄫衍盟吴不書七年萊門盟吴不書八年甚者㑹于鄖雖三國盟亦不書十二年杜氏二説皆非是夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯瞶于戚于戚内弗受也輒拒父也後十二年而蒯瞶自戚入于衛衛侯輒來奔則是輒拒父也世子正也屬辭比事則輒萬世不可掩矣秋八月甲戌晉趙鞅帥師及鄭罕逹帥師戰于鐡鄭師敗績冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟三年春齊國夏衛石曼姑帥師圍戚榖梁有傳夏四月甲午地震五月辛卯桓宫僖宫災季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吴冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申此公孫翩也書曰盜則䟽且賤焉者也公孫也苟不在其位則䟽且賤者也盜殺其君則貴近無人矣春秋書殺大夫莫甚於宋昭晉厲也而二君或稱人以弑人衆辭也甚者稱國焉則凡有官者無人也有稱盜焉則凡在官者無人也蔡殺其大夫公子駟蔡放其大夫公孫獵于吴蕞爾蔡也連年誅放其大夫是貴近無人也是故殺翩不書以為不足討也葬昭公以為不必不葬也蔡公孫辰出奔吴書公薨夫人姜氏孫于邾公子慶父出奔莒則夫人慶父與聞乎弑矣書盜殺蔡侯申蔡公孫辰出奔吴則辰與聞乎殺矣葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚城西郛六月辛丑亳社災秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公六年春城邾瑕晉趙鞅帥師伐鮮虞吴伐陳夏齊國夏及髙張來奔齊殺其大夫髙厚齊崔杼弑其君光齊國夏及髙張來奔齊陳乞弑其君荼聖人之垂戒深矣叔還㑹吴于柤秋七月庚寅楚子軫卒齊陽生入于齊衛侯入于夷儀衛甯喜弑其君剽則喜為衛侯弑也齊陽生入于齊齊陳乞弑其君荼則乞為陽生弑也齊陳乞弑其君荼荼之弑得國者陽生也曷為不以罪齊無知者罪陽生於是齊政由陳氏矣政由陳氏彼陽生者亡公子而已乞不有無君之心則陽生為僇矣陽生也以下從榖梁冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公㑹吴于鄫秋公伐邾八月己酉入邾以邾子益來宋人圍曹冬鄭駟𢎞帥師救曹書救曹何曹卒滅於宋也自魯救晉凡晉楚之救皆不書六十年矣其再見以中國無伯而諸侯自相救也諸侯自相救猶可也吴救陳諸夏亦幾於亡矣八年春王正月宋公入曹以曹伯陽歸檜亡東周之始也曹亡春秋之終也夫子之刪詩也繫曹檜於國風之後於檜之卒篇曰思周道也傷天下之無王也於曹之卒篇曰思治也傷天下之無伯也春秋作於定哀之際文武之所褒大諸侯亡國多矣莫強於齊晉晉趙鞅歸于晉則晉亡之漸也齊陳乞弑其君荼則齊亡之漸也夫子嘗喟然于此矣興滅國繼絶世修廢官舉逸民葢嘗有此言也於是曹不言滅吴伐我夏齊人取讙及闡歸邾子益于邾秋七月冬十有二月癸亥把伯過卒齊人歸讙及闡九年春王二月葬把僖公宋皇瑗帥師取鄭師于雍邱夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔此吴人討邾奉太子革為政而後奔則其但書奔何以是為自失國也春秋之治苟其道足以失國雖有敵國猶以自致之文書之公㑹吴伐齊三月戊戌齊侯陽生卒夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吴救陳延州來季子也但書吴不以救陳錄季子也自魯救晉凡救皆不書矣鄭救曹則中國無伯諸侯自相救也中國無伯諸侯自相救春秋憫焉而特書之吴救陳諸夏幾于亡矣春秋之所甚懼也書吴而已譏不在季子也十有一年春齊國書帥師伐我夏陳轅頗出奔鄭五月公㑹吴伐齊甲戌齊國書帥師及吴戰于艾陵齊師敗績獲齊國書秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋十有二年春用田賦以邱賦一乗為未足又以田賦之也故曰歛從其薄以邱亦足矣田賦之也者家一人也家一人管子内政之法也諸侯之益兵自齊始晉次之事在僖十五年春秋之季魯亦行之矣是故作邱甲用田賦不書初夏五月甲辰孟子卒三傳同公㑹吴于槖臯秋公㑹衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有一月螽十有三年春鄭罕逹帥師取宋師于嵒夏許男成卒公㑹晉侯及吴子于黄池公羊有傳於是盟不書吴晉之盟春秋終諱之不以吴晉同主盟也公㑹晉侯及吴子雖兩伯之辭也而春秋終不以吴晉同主盟也單平公不書不忍書也春秋公萬世之是非亦有所不忍書歟交質子事在隱二年僖十七年成二年以兵向京師事在莊十九年僖二十四年魯用人于亳社事在昭十年皆不忍書者也楚公子申帥師伐陳於越入吴秋公至自㑹晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫十有二月螽十有四年春西狩獲麟春秋後傳卷十二
