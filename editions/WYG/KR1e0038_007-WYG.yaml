  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0038_WYG_007-1a, image: WYG0151/WYG0151-0664c.png}
body:
  text: 春秋後傳卷七宋陳傅良撰宣公元年春王正月公即位公子遂如齊逆女三月遂以夫人婦姜至自齊有傳說在章指夏季孫行父如齊晉放其大夫胥甲父于衞公㑹齊侯于平州公子遂如齊六月齊人取濟西田外取邑不書雖取諸我不書據傳襄二十六年齊取我髙魚必有歸之者也然後書是故濟西田書取讙闡書取秋邾子來朝楚子鄭人侵陳遂侵宋書遂伐楚言志不在蔡也書遂侵宋言志不在陳也説在僖四年南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈建同盟于宋諸夏之君分為晉楚之從矣南北之勢於是始故謹書之也自是訖春秋師再有事無言遂者矣言遂者非與國伐盟主齊侯伐衞遂伐晉事在襄二十三年則盟主伐與國也晉士鞅侵鄭遂侵衞傳曰衞叛晉也事在定八年晉趙盾帥師救陳書救陳何楚由是始伯也於是楚救皆不書據傳蒍賈救鄭鬬椒救鄭之類宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭此晉趙盾以諸侯之師伐鄭則其曰宋公陳侯衞侯曹伯㑹伐鄭何大夫初用諸侯也靈公之世兵車之㑹自參以上貶人之於是黜趙盾以其用諸侯也春秋不以大夫用諸侯故書曰晉趙盾帥師救陳宋公陳侯衞侯曹伯㑹晉帥于棐林伐鄭則不以大夫用諸侯之辭也公羊曷為不言趙盾之師君不㑹大夫之辭也冬晉趙穿帥師侵崇晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績戰未有書大夫者於是書宋華元鄭公子歸生大夫初主戰也自此戰皆書大夫戰不書大夫者吳也吳無大夫也獲宋華元說在獲晉侯秦師伐晉夏晉人宋人衞人陳人侵鄭此晉趙盾用諸侯之師曷為貶稱人以晉為甚不競也楚方圖伯而晉以大夫用諸侯由是兵車之㑹自參以上皆貶之而自柳棼之役楚皆稱子矣九年秋九月乙丑晉趙盾弑其君夷臯三傳同冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望葬匡王楚子伐陸渾之戎窺周室也夏楚人侵鄭秋赤狄侵齊宋師圍曹冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向有榖梁傳秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷傳例說在章指首弑君者公子宋也則其蔽罪於歸生何歸生為正卿而宋有無君之心非歸生孰禁之於歸生乎謀先然而弗禁則賊由歸生而已矣是故歸生之弑公子宋啓之不以罪宋而罪歸生寗喜之弑公子鱄啓之不以罪鱄而罪寗喜董史書趙盾孔子取焉蓋有合於春秋赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊髙固來逆叔姬有傳公自主之也於是公如齊髙固使齊侯止公請叔姬焉則髙固伉也從榖梁傳叔孫得臣卒冬齊髙固及子叔姬來凡來譏也非歸寧之辭楚人伐鄭六年春晉趙盾衞孫免侵陳趙盾之罪嘗著於春秋其再見曷為無貶自宋萬而下無討賊者則九人而已矣夏四月秋八月螽冬十月七年春衞侯使孫良夫來盟夏公㑹齊侯伐萊秋公至自伐萊傳例說在章指大旱冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤有傳晉靈公之㑹同皆不序自黒壤而下復序諸侯何也垂隴之役初以大夫㑹盟自以大夫㑹盟而後不序諸侯不序諸侯猶責伯者也終靈公之篇則諸侯無貶矣以其不勝貶序之可也是故春秋自隱而下君恒稱君貶人之故諸侯多貶辭焉自文而下大夫恒稱大夫貶人之故大夫多貶辭焉諸侯不勝貶則政在大夫矣大夫不勝貶則陪臣執國命矣八年春公至自㑹夏六月公子遂如齊至黃乃復有公羊傳辛巳有事于太廟仲遂卒于垂大夫卒恒稱名則其兼字之何自是仲氏世為卿故譏之也本劉氏其不言公子仲遂蒙上文也大夫卒竟内不地據定五年季孫意如卒于房竟外地據成十七年公孫嬰齊卒于貍脤壬午猶繹萬入去籥有公羊傳戊子夫人嬴氏薨晉師白狄伐秦楚人滅舒蓼秋七月甲子日有食之旣冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬榖梁有傳城平陽楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師齊侯伐萊秋取根牟取言公據四年伐莒取向以前皆言公取不言公非公命也自宣而下征伐在大夫矣此年取根牟成六年取鄟襄十三年取邿皆微國也八月滕子卒九月晉侯宋公衞侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳辛酉晉侯黒臀卒于扈諸侯卒雖不出竟地之冬十月癸酉衞侯鄭卒宋人圍滕楚子伐鄭晉郤缺帥師救鄭書救鄭何楚伯也元年救陳今年救鄭而辰陵之盟序陳鄭於楚子之下遂以諸侯予楚矣陳殺其大夫洩冶榖梁有傳十年春公如齊公至自齊齊人歸我濟西田夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衞傳例說在章指公羊世卿非是公如齊五月公至自齊癸巳陳夏徴舒弑其君平國六月宋師伐滕公孫歸父如齊葬齊惠公晉人宋人衞人曹人伐鄭秋天王使王季子來聘自頃王而下王室無聘魯者於是再聘而王季子實來則已尊矣公孫歸父帥師伐邾取繹取根牟不書師此其書歸父何伐邾猶公命也取繹非公命也宣公而下征伐在大夫故自取繹凡取皆不書其人據昭元年傳季武子伐莒取鄆但書取自伐把凡伐皆不書公大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘饑楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵序楚子於陳侯鄭伯之上初予楚以伯也公孫歸父㑹齊人伐莒秋晉侯㑹狄于櫕函此外㑹也曷為書之如吾君内之也楚方倡義於天下而晉孜孜於羣狄至往㑹焉晉卑甚矣是故楚莊王之春秋晉有諸侯之事不悉書也於宣三年晉侯伐鄭不書五年荀林父伐陳不書冬十月楚人殺陳夏徴舒楚亟稱子矣自宋萬而下無討賊者雖討之不以其罪且百年於此則楚之討夏徴舒其不曰楚子何春秋之法惟討賊不以内外貴賤恒稱人是故殺大夫恒稱國或稱人殺他國之大夫恒稱人或稱君據昭四年殺慶封惟討賊訖春秋稱人以是為國人殺之也丁亥楚子入陳於是楚子為陳夏氏故伐陳謂陳人無動将討於少西氏遂入陳殺夏徴舒則曷為不書入而后殺據晉文先書入曹後書執曹伯予之以討賊之義也書入而后殺是以利陳累莊王也不以利陳累莊王則討賊一事也入一事也入雖君将貶人之於是稱楚子楚强甚矣終荘王一篇雖圍滅無貶辭固進楚也亦憂楚也納公孫寧儀行父于陳凡奔非其罪納之者罪也則但書納公孫寧儀行父與君淫者也則其不書奔何微二子則楚師不出徴舒不討靈公不葬然則宜納者也則其書納何二子足以免於奔而已矣而納之者楚子之過也十有二年春葬陳靈公楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績大夫嘗主戰矣猶未敵君也以大夫敵君於是始甚矣大夫强也鞌之戰不惟敵君且盟齊於師矣秋七月冬十有二月戊寅楚子滅蕭晉人宋人衛人曹人同盟于清丘有傳此晉先縠宋華椒衞孔逹也曷為貶稱人猶曰人自為盟也人自為盟自鹿上以來未之有也於是再見其再見何中國久無伯也由救鄭之後大夫㑹伐自參以上皆不書至是㑹盟亦不書矣宋師伐陳衞人救陳十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠十有四年春衞殺其大夫孔達清丘之盟晉以衞之救陳晉討焉孔達曰苟利社稷請以我説於是自殺衞人以說於晉而告於諸侯稱國以殺其君意也是故苟其君意雖孔達書殺苟非君意雖公子遂為宣公殺惠伯不書也夏五月壬申曹伯壽卒晉侯伐鄭秋九月楚子圍宋葬曹文公冬公孫歸父㑹齊侯于榖十有五年春公孫歸父㑹楚子于宋吾大夫始特㑹楚也夏五月宋人及楚人平凡平不書必關於天下之故也而後書有與楚平者矣於陳不書文九年於鄭不書宣十年至宋始書之宋嘗及楚平矣僖二十四年宋及楚平至荘王始書之必宋從楚必荘王得宋天下将有南北之勢春秋特致意焉六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸楚滅國書君将矣此其稱師何滅國之大夫猶貶也是故荀林父滅潞氏不書隨㑹滅甲氏不書滅國以其君歸皆稱爵如楚人滅弦弦子奔黃楚人滅頓以頓子牂歸楚人滅胡以胡子豹歸苐言奔者不名之以歸者名之秦人伐晉此秦伯也桓公王札子殺召伯毛伯榖梁有傳兩下相殺雖王卿士不書據傳昭十二年劉獻公殺甘悼公十八年毛得殺毛伯過之類此何以書斥王之辭也於是王孫蘇與召氏毛氏爭政使王子殺召戴公及毛伯衞王孫家人也而爭政王子一日而殺二卿則譏不但在其人也是故終春秋纔一再書之王札子殺召伯毛伯陳侯之弟招殺陳世子偃師皆斥君之辭也傳云王子捷秋螽仲孫蔑㑹齊髙固于無婁初稅􅅿三傳同從公羊冬蝝生饑有傳十有六年春王正月晉人滅赤狄甲氏及留吁此士㑹也於是獻狄俘晉侯請於王王以黻冕命士㑹将中軍且為太傅則何以亦書人滅終不可以無貶也夏成周宣榭火有傳榖梁周災不志非是秋郯伯姬來歸冬大有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公㑹晉侯衞侯曹伯邾子同盟于斷道同盟至新城而再見斷道之後不曰同盟者寡矣秋公至自㑹冬十有一月壬午公弟叔肸卒公榖左氏母弟稱弟例不取公弟者何非見大夫也本何休非大夫不卒而卒叔􅆄賢之也本榖梁賢之所以惡宣公也凡先君之子稱公子有謂稱弟是故宋地辰兄弟也一篇之間譏稱宋公之弟辰無譏則從其恒稱為公子地陳公子招一人也譏稱陳侯之弟招無譏則從其恒稱為公子招故不弟稱弟不友稱弟不弟稱弟傳曰陳侯之弟招殺陳世子偃師罪在招也不友稱弟傳曰秦伯之弟鍼出奔晉罪秦伯也叔􅆄稱弟惡宣公也十有八年春晉侯衞世子臧伐齊公伐把自是内不言君将征伐在大夫矣夏四月秋七月邾人戕鄫子于鄫甲戌楚子旅卒有公羊傳公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉有傳至笙遂奔齊三傳同陳氏春秋後傳
