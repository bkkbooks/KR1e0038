body:
  text: 春秋後傳卷五宋陳傅良撰僖公元年春王正月齊師宋師曹師次于聶北救邢有公羊傳救不言次言次無志於救也狄伐邢於是三歳矣桓公足以攘狄而宿師於聶北玩宼以待其弊邢潰奔師而後遷之是故凡救譏也言次甚譏之也夏六月邢遷于夷儀自遷不書據文十三年邾遷于繹成六年晉遷于新田之類有遷之者而後書由莊公而下以中國遷中國書曰某人遷某罪遷之者也由僖公而下以外域遷中國書曰某遷于某罪遷者也以齊晉之伯也而狄伐邢邢遷於夷儀狄圍衞衞遷於帝丘雖外域之暴横而桓文亦受其咎矣齊師宋師曹師城邢有公羊傳此救邢之師也使之若再有事然志桓慢也狄伐邢於是三歳桓公足以攘狄而宿師於聶北玩宼以待其弊邢潰而後遷之桓公見義不勇矣秋七月戊辰夫人姜氏薨于夷齊人以歸有傳楚人伐鄭荆始書楚自是楚有事於諸侯皆稱人八月公㑹齊侯宋公鄭伯曹伯邾人于檉九月公敗邾師于偃冬十月壬午公子友帥師敗莒師于酈獲莒挐有公羊傳獲非卿帥不書據囚宋華元獲樂呂但書華元獲齊國書公孫夏但書國書之類莒挐非卿也則何以書嘉季子也慶父弑君之賊也莒人納焉賂而後歸之魯於是敗其師獲挐而魯之内難始定十有二月丁巳夫人氏之喪至自齊有公羊傳二年春王正月城楚丘有公羊榖梁傳於是諸侯城楚丘而封衞則其以魯辭書之但曰城楚丘何不以累桓公也諸侯之義不得專封不以專封衞累桓公也以魯辭書之使之若諸侯同欲然上無明天子下無方伯諸侯有滅亡者夫人而欲救存之則先王之澤天下之公義也序績莫如公齊桓存三亡國必若救衞庶幾於公矣是故衞不言滅廬於曹也不言遷齊侯使公子無虧帥車三百乗甲士三千人戍曹不言救春秋之辭約而不廹者善辭也夏五月辛巳𦵏我小君哀姜虞師晉師滅下陽有傳并公羊穀梁傳晉里克荀息也稱師何滅未嘗書大夫將也下陽虢邑也滅下陽而後滅虢則其但書滅下陽何以為晉人之罪徒滅其邑焉爾而虢自亡也秋九月齊侯宋公江人黄人盟于貫冬十月不雨楚人侵鄭三年春王正月不雨夏四月不雨有傳徐人取舒六月雨秋齊侯宋公江人黄人㑹于陽榖冬公子友如齊涖盟有公羊傳楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰但言潰自潰也昭二十九年鄆潰伐潰伐者潰之也成九年楚師伐莒莒潰苟亡矣自潰不足道也僖十九年梁潰苟滅之矣潰之不足道也宣十二年蕭潰襄二十九年舒鳩潰晉伐廧咎如廧咎如潰不書傳曰上失民也言不徒罪晉也此桓公侵蔡也則其書潰何侵淺事也侵蔡而蔡潰焉爾薄齊之罪也遂伐楚春秋舉重凡師再有事不悉書據成六年晉欒書救鄭遂侵蔡但書救鄭八年晉欒書侵蔡遂侵楚侵沈但書侵蔡之類苟悉書也則以遂言之兵事言遂必闗天下之大故也自入春秋楚浸强矣而不見於經敗蔡師以蔡侯獻舞歸聖人懼焉而諸夏之交兵非以定簒弑則修怨而已矣問不及楚也桓公始有志於夷夏之分於是伐楚而以侵蔡召諸侯書曰遂伐楚言志不在蔡也侵蔡遂伐楚以志齊桓之伯侵陳遂侵宋以志楚莊之伯足以見夷夏之盛衰矣次于陘夏許男新臣卒楚屈完來盟于師盟于召陵書屈完有榖梁傳凡次譏也此齊桓之師則其書次何用見桓之不戰而詘楚也桓公合九國之衆以討楚兵未有盛於此者也楚雖强足以一戰矣而臨楚不戰楚人為之詘使其大夫即盟於師桓公不欲臨楚盟屈完退而盟召陵不阻隘不以君違臣不以軍容亂國容一動而三善得桓公不但以力服人矣春秋之襃貶辭不足以盡意而後見於文書曰次于陘楚屈完來盟于師盟于召陵斯其為文也美矣則從其恒辭書次可也齊人執陳轅濤塗有公羊傳此齊侯也其稱齊人何貶也東遷之後諸侯始放春秋之治在諸侯而大夫不與北杏之後盟主始專春秋之治在盟主而諸侯不與治在諸侯貶人之是故於中丘㑹稱君伐宋稱人於郎戰稱君盟惡曹稱人治在盟主貶人之是故於陘伐稱君於執濤塗稱人於温㑹稱君於執衞侯稱人秋及江人黄人伐陳八月公至自伐楚𦵏許穆公凡諸侯卒於他國稱國昭二十二年蔡侯襄二十六年許男非國也則但稱地晉侯于扈宋公于曲棘有諸侯之事焉則以其事卒之曹伯于師把伯于會此其不言卒于師何以其在桓師猶在國也於是葬之以侯禮加二等榖梁内桓師也冬十有二月公孫兹帥師㑹齊人宋人衞人鄭人許人曹人侵陳㑹侵未有書帥師者而公孫兹書帥師㑹救未有書帥師者而公孫敖書帥師公子牙與弑子般公子慶父謀弑閔公而兹與敖皆世為將是故謹志之曰子友帥師敗莒師於酈公孫兹帥師㑹侵陳公孫敖帥師及諸侯之大夫救徐見三家之所從始也五年春晉侯殺其世子申生三傳同公羊榖梁直稱君例於是太子縊於新城則其斥殺何春秋之法苟有讒而不見則其君之罪也是故申生以驪姬之譛自殺宋世子痤以伊戾之譛自殺直稱君殺而已矣把伯姬來朝其子榖梁有傳夏公孫兹如牟公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止有傳諸侯何以㑹王世子定世子也於是子帶有寵於惠后世子危不得立桓公率天下之諸侯以㑹之世子危不得立而為㑹以定之禮之變者也然則如之何而可殊㑹世子而不以世子夷於諸侯不以世子夷於諸侯所以定世子也桓公可謂善處父子之閒矣秋八月諸侯盟于首止公羊前目後凡例㑹而後盟閒有事書諸侯盟於某事在襄十九年祝柯二十五年重丘非閒有事也亦書諸侯盟于某則有不盟者也此其言諸侯則王世子不與盟也桓有諸侯之事三於洮序王人於諸侯之上而同盟焉王人微者也雖同盟而無嫌於葵丘亦序周公於諸侯之上而不敢同盟焉天子之宰異於微者也盟於首止不但不同盟也而帥諸侯以殊㑹世子以世子之尊非特天子之宰比也桓公於是知節矣是故㑹有周人盟無周人書㑹於某某日諸侯盟則齊桓之遜也㑹有周人盟有周人書㑹於某但曰某日盟則晉厲之伉也春秋於是予桓也事在成十七年柯陵鄭伯逃歸不盟國君而曰逃賤之也何賤乎鄭伯以其背夏盟也厥貉之㑹麇子逃歸不書事在文十年厲之役鄭伯逃歸不書事在宣十一年蓋逃楚也必若鄭文公逃齊陳哀公逃晉而後書所以示夷夏之辨嚴矣楚人滅弦弦子奔黄楚嘗有大夫屈完此鬭榖於莵也則其稱人何楚大夫將恒稱人也九月戊申朔日有食之冬晉人執虞公有傳公羊曰不與滅也晉滅虞矣則其但書執何以為晉人之罪徒執其君焉耳而虞自亡也是故滅者亡國之善辭也上下同力也苟同力致滅自其君世子必詳所以滅之之罪書曰楚子虔誘蔡侯般殺之于申楚公子弃疾帥師圍蔡楚師滅蔡執蔡世子有以歸用之苟不同力執其君而國從之矣則不詳所以滅之之罪書曰晉人執虞公以為晉人徒執其君焉耳而虞自亡也六年春王正月夏公㑹齊侯宋公陳侯衞侯曹伯伐鄭圍新城伐國不言圍邑本榖梁例此其言圍何以桓公合六國之衆徒圍其邑焉耳自僖而下必圍國而後書邑不足書也秋楚人圍許此楚子也其稱人何楚君將恒稱人也諸侯遂救許於是蔡穆侯將許僖公以見楚子於武城許男面縛銜璧大夫衰絰士輿櫬此所以書救許也冬公至自伐鄭七年春齊人伐鄭夏小邾子來朝鄭殺其大夫申侯秋七月公㑹齊侯宋公陳世子款鄭世子華盟于寗母曹伯班卒公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衞侯許男曹伯陳世子款盟于洮王人者何微者也序微者於諸侯之上雖同盟無譏焉耳鄭伯乞盟夏狄伐晉秋七月禘于太廟用致夫人有傳此哀姜也曷不稱姜氏絶之也哀姜得罪於吾君而猶致於廟絶哀姜所以惡僖公也向曰夫人氏而不言姜見絶於其國之辭也今曰夫人而不言氏見絶於宗廟之辭也是故魯禘非禮也雖用之羣公之廟不書據禘于襄公禘于僖公之類有用之羣公之廟書者矣但曰有事譏不在用禘也事在昭十五年必禘於太廟致哀姜也而後書譏在用禘也冬十有二月丁未天王崩九年春王正月丁丑宋公御說卒傳例非是說在章指夏公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘天子之三公也桓嘗殊㑹王世子則其不殊㑹三公何春秋是以予桓也春秋之予桓奈何桓之㑹有天子之事三於洮序王人於諸侯之上而同盟焉於葵丘亦序周公於諸侯之上而不敢同盟焉盟于首止不但不同盟也而帥諸侯以㑹世子桓知節矣春秋是以予桓也秋七月乙酉伯姬卒九月戊辰諸侯盟于葵丘此其言諸侯則宰周公不盟也甲子晉侯佹諸卒冬晉里克殺其君之子奚齊有傳遇弑雖未逾年稱君據齊舍此其稱君之子何獻公殺申生絀重耳夷吾而立其嬖子晉之亂獻公為之也是故奚齊不稱君而稱君之子十年春王正月公如齊狄滅温温子奔衞晉里克弑其君卓及其大夫荀息有公羊傳夏齊侯許男伐北戎晉殺其大夫里克公羊惠公之大夫也討賊不言大夫其曰晉殺大夫里克何克猶在位也克猶在位則是殺大夫耳在位獨里克乎督相宋莊翬相魯桓前乎此矣於是里克殺以他故而後見焉耳自宋萬而下弑君無討者凡賊再見猶夫人也雖若晉里克衞寗喜殺以他故而後見書曰大夫則猶夫人而已矣是故自里克迄春秋賊皆書氏族亂臣賊子無以異於夫人矣通國以為賊吾從而志之以為賊通國以為夫人我從而志之以為夫人我何加損焉實録而已是經之大變也雖然有荀息在焉則猶有臣子也杜自莊以上諸弑君者皆不書氏自閔以下諸弑君者皆書氏明時史之異同非仲尼所成也非是秋七月冬大雨雪十有一年春晉殺其大夫㔻鄭父夏公及夫人姜氏㑹齊侯于陽榖秋八月大雩冬楚人伐黄十有二年春王三月庚午日有食之夏楚人滅黃滅不言伐此其書伐何病桓公也以陽榖之㑹貫之盟徒以亡其國焉耳秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衞夏四月𦵏陳宣公公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹秋九月大雩冬公子友如齊十有四年春諸侯城縁陵有傳并榖梁傳諸侯不序必前目而後凡也非前目而後凡也而不序者散辭也本榖梁及范寗是故但曰諸侯者不繫之伯者之辭也但曰大夫者不繫之君之辭也溴梁夏六月季姬及鄫子遇于防使鄫子來朝朝未有言使者則其曰季姬使鄫子來朝何惡魯而賤鄫子也於是季姬來寧公以鄫子之不來朝也怒止之遂遇於防使朝焉魯為已汰鄫為已卑矣於婦人乎何譏惡魯而賤鄫子也秋八月辛卯沙鹿崩有公羊傳狄侵鄭冬蔡侯􅆄卒十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡救不言次言次無志於救也楚伐徐桓公合七國之衆以救之而使大夫將有諸侯在而大夫將於是始桓公為之也則桓志荒矣而卒不競於楚是故凡救譏也言次甚譏之也有諸侯在而使大夫將始於牡丘桓公為之也有諸侯在而使大夫盟始於雞澤悼公為之也公孫敖帥師及諸侯之大夫救徐書救徐何徐卒敗於楚也㑹救未有書帥師者其稱帥師何公子慶父弑閔者也而敖世為將是故謹志之曰公孫帥師見三家之所從始也夏五月日有食之有傳秋七月齊師曹師伐厲八月螽九月公至自㑹季姬歸于鄫内女嫁恒書歸不書歸必有故也季姬來寧公怒而止之故不書歸至是而後言歸也己夘晦震夷伯之廟穀梁有傳冬宋人伐曹諸夏之相加兵自荘公之十九年始前此未之有也於是再見宋襄公為之也楚人敗徐于婁林外域交相敗不書據傳襄十三年楚人敗吳師獲公子黨十四年楚伐吳吳人敗之獲公子宜榖之類必敗中國而後書徐戎也何以書病齊也齊帥天下之諸侯以攘荆楚存中國也楚伐徐桓公合七國之衆盟於牡丘次于匡以救徐為之伐厲而徐卒敗於楚人不數年宋楚爭盟執宋公以是為盟主病矣十有一月壬戌晉侯及秦伯戰于韓獲晉侯於是秦獲晉侯以歸則其不曰以歸何罪晉侯也獲匹夫之辭也言獲則以歸不足言也是故獲夷狄不書據傳郤缺獲白狄子叔孫得臣獲長狄夷狄交相獲不書據傳楚獲吳公子黨吳獲楚公子宜榖皆不足書也必大國也將尊而師衆若宋華元齊國書斯可以言獲也宋大國也將尊而師衆獲之若匹夫然猶曰宋齊之恥晉甸侯也而言獲是夷晉侯於大夫也十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都有公羊傳三月壬申公子季友卒大夫卒恒稱名則其兼字之何見三桓之所自始也自是季氏世為卿也故譏之本劉氏夏四月丙申鄫季姬卒秋七月甲子公孫兹卒冬十有二月公㑹齊侯宋公陳侯衞侯鄭伯許男邢侯曹伯于淮十有七年春齊人徐人伐英氏夏滅項於是公猶在齊非公命也向也費伯帥師城郎非公命不書此何以書城郎常事滅項非常也是故必常事也譏不及公則不書苟非常則謹書之書滅項失兵權之漸也襄公在晉書邾庶其來奔昭公在晉書莒牟夷來奔雖非公命皆非常也春秋之季大夫不稟命於諸侯非但魯也鄭伯㑹于夷儀鄭公孫舍之帥師入陳事在襄二十五年蔡侯㑹于召陵蔡公孫姓帥師滅沈春秋必謹而志之也秋夫人姜氏㑹齊侯于卞九月公至自㑹有傳冬十有二月乙亥齊侯小白卒十有八年春王正月宋公曹伯衞人邾人伐齊夏師救齊書救齊何齊卒敗於宋也五月戊寅宋師及齊師戰于甗齊師敗績此宋公也其稱師何於是齊桓公與管仲屬孝公於宋襄公以為太子而桓公卒寺人貂立公子無虧孝公奔宋襄公以諸侯之師伐齊立孝公而還春秋貴義不貴惠尚治不尚功託人之孤而動天下之兵至於交戰是伐喪而已矣雖然孝公不言納孝公言納則疑於齊糾邾捷菑宋襄之義僅異於魯荘晉趙盾而已狄救齊秋八月丁亥𦵏齊桓公冬邢人狄人伐衞狄始稱人本榖梁十有九年春王三月宋人執滕子嬰齊執不言歸未失國之辭也據成九年鄭伯襄十六年莒子邾子十九年邾子哀四年小邾子言歸危不得歸也是故執君不名歸然後名之執稱曹伯歸稱曹伯襄執稱衞侯歸稱衞侯鄭此執也則其名何遂失國也舍滕子嬰齊戎蠻子赤則皆未失國者也虞公失國則其不名何也虞自亡矣晉人之罪徒執其君焉爾不於執焉加以遂失國之辭所以見虞之自亡也嬰齊遂失國本孫氏夏六月宋公曹人邾人盟于曹南邾文公在焉則其稱人何人曹邾以貶宋也屬辭疑於北杏曷為謂之貶以明年鹿上之盟亦人宋則未嘗予宋以伯也襄公欲合諸侯而執滕宣公使邾文公用鄫子一㑹而虐二國之君而亟與楚盟是喪師亡身之道也鄫子㑹盟于邾己酉邾人執鄫子用之說見齊殺子糾秋宋人圍曹此宋公也其稱人何凡圍國雖君將貶人之前年齊桓卒宋公欲合諸侯而亟修怨於曹諸夏之書圍國自此始衞人伐邢冬㑹陳人蔡人楚人鄭人盟于齊楚初與諸夏盟也内不言公諱之也齊桓卒陳非盟主也則曷為㑹陳人春秋不以外域㑹中國則推而屬之陳也楚稱人猶未有君也以其人楚不可不人陳蔡以其人陳蔡不可不沒公也據傳陳穆公梁亡有傳及榖梁傳二十年春新作南門有傳例夏郜子來朝五月乙巳西宮災鄭人入滑此鄭公子士洩也不書大夫將恒稱人也秋齊人狄人盟于邢冬楚人伐隨二十有一年春狄侵衞宋人齊人楚人盟于鹿上人自為盟於惡曹見之於是再見其再見何中國無伯也齊故伯也桓卒宋襄公欲繼之伯而求諸侯於楚楚於是爭長於宋則是盟也莫適為主人自為盟而已矣夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋宋楚初爭長也是故楚稱子而序於陳蔡鄭許曹之上不知諸侯之從楚與從宋與不予宋以伯也凡執恒稱人執之於伐則伐稱君執稱人據齊人執陳轅濤塗之類於㑹則㑹稱君執稱人據晉執衞侯之類雖大夫也則亦㑹稱大夫執稱人據韓不信執宋仲幾執不稱人執有罪也此楚子執宋公則曷為不再言楚人不以荆楚執諸夏之辭也是故執宋公不申言楚人執齊慶封亦不申言楚人猶曰諸侯執之焉爾冬公伐邾楚人使宜申來獻捷君使大夫何以特稱人貶之也盂㑹稱子矣獻捷於魯何以貶人之盂㑹不稱子無以見楚宋之爭長獻捷於魯不人之則是遂予楚也自是至椒之聘而後始有君大夫於以見春秋之許夷狄也十有二月癸丑公㑹諸侯盟于薄釋宋公外釋不志本榖梁傳例據傳僖二十八年以専釋衞侯但書歸此何以志以宋公為無歸道也是故執不言歸者善辭也言歸危辭也不言歸言釋直釋之爾無歸道也向也楚初與盟不書公於是書公不予楚以專釋之辭也本榖梁二十有二年春公伐邾取須句春秋嚴義利之辨苟以為利一以取書之是故雖邾人滅須句須句子來奔伐邾取須句反其君焉書取須句雖莒著丘公立而不撫鄫鄫叛而來書取鄫夏宋公衞侯許男滕子伐鄭秋八月丁未及邾人戰于升陘冬十有一月己巳朔宋公及楚人戰于泓宋師敗績有榖梁傳楚嘗有君矣此楚子也其稱人何楚君将猶稱人也二十有三年春齊侯伐宋圍緡夏五月庚寅宋公兹父卒秋楚人伐陳此成得臣也不書楚大夫将猶稱人也冬十有一月把子卒有傳凡例非是說在章指二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭有傳王出不書為尊尊諱也據荘二十年惠王處擽定六年敬王處姑蕕其言出居于鄭何以為無足諱焉耳子頽之難惠王未有過也鄭虢圖之執燕仲父殺子頽逾年而復辟故諱之也襄王以狄伐鄭富辰諌弗聽又德狄以狄女為后諌弗聽子帶以狄師攻王王御士将禦之又弗聽於是適鄭書曰天王出居于鄭以為無足諱焉耳雖然猶未書入也春秋善復正言入未足以言復正也襄王書出矣已而書王許書滅矣事在定六年已而書許男事在哀元年必如是而後可以言復正也晉侯夷吾卒二十有五年春王正月丙午衞侯燬滅邢三傳同夏四月癸酉衞侯燬卒宋蕩伯姬來逆婦本劉氏公自主之也宋殺其大夫無傳缺秋楚人圍陳納頓子于頓出罪也納之者亦罪也則悉書之據北燕伯款衞世子蒯瞆出非其罪納之者罪也則但書納齊桓公卒楚始與諸夏盟于齊盟于鹿上執宋公納頓子侈然欲廢置諸侯矣春秋之所懼也葬衞文公冬十有二月癸亥公㑹衞子莒慶盟于洮有榖梁傳二十有六年春王正月己未公㑹莒子衞寗速盟于向齊人侵我西鄙公追齊師至酅弗及此齊侯也其稱人何自隱以來以兵加我君大夫将皆書人君将書君自文十五年齊懿公始大夫将書大夫自襄十七年齊髙厚始訖春秋惟莒邾書人夏齊人伐我北鄙衞人伐齊公子遂如楚乞師乞師不書據成二年臧宣叔如晉乞師乞諸荆蠻然後書外乞師亦不書必盟主也而後書乞卑辭也乞諸荆蠻然後書志中國之詘於荆蠻也秋楚人滅夔以夔子歸滅同姓名此楚子頵也則其不名何楚子之名未登於春秋也楚自武王始見於傳文王始見於經猶以州舉也至成王而後書楚人盂之㑹嘗書楚子矣而復人之頵之名非遇弑未登於春秋則滅夔固不名也滅虁名之則疑於衞侯燬不名楚子則不名夔子也冬楚人伐宋圍緡公以楚師伐齊取榖傳例說在章指公至自伐齊二十有七年春把子來朝有傳夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入把冬楚人陳侯蔡侯鄭伯許男圍宋有榖梁傳楚嘗有君矣據㑹于盂此楚子也據傳則其稱人何嫌予楚以伯也盟于齊楚猶序陳蔡之下於鹿上猶不先齊宋也盂之㑹宋楚始並為諸侯長矣楚之稱子而長於諸侯宋襄公為之也魯僖衞文夫子之刪詩有取焉桓公卒而衞從楚魯又從楚楚敗宋于泓納頓子滅夔取齊之榖且合四國之君以圍宋春秋以是為夷狄之强而已矣雖序於諸侯之上而特人之不稱人則疑於莊王十有二月甲戌公㑹諸侯盟于宋二十有八年春晉侯侵曹晉侯伐衞公子買戍衞不卒戍刺之楚人救衞楚嘗救鄭矣不書見傳僖六年二十二年於是始書以為晉文之伯楚欲救而不能也三月丙午晉侯入曹執曹伯畀宋人入雖君将貶人之此其稱晉侯何必若晉文入曹而後可以無貶也夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績此宋公齊國歸父秦小子憗也宋公也則何以但稱師尊晉侯也尊晉者予晉以伯也楚得臣何以稱人楚未有大夫将也楚殺其大夫得臣於是楚子使止子玉曰母死不及則其斥殺何春秋之法苟有誅意於其臣雖自殺也書殺是故楚得臣公子側皆書殺而已矣衞侯出奔楚五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土序晉侯於齊侯宋公之上予晉以伯也於是王子虎實盟諸侯則其不書何凡王人涖盟不書據宣七年王叔桓公涖伐不書據文三年王叔桓公成十三年劉康公成肅公陳侯如㑹公朝于王所有榖梁傳此踐土之諸侯也外朝王不書據隱六年鄭伯八年齊鄭荘十八年晉虢書魯以見其餘也於是晉侯将盟于踐土而王即命為方伯諸侯朝焉則先朝而後盟曷為先書盟後書朝書朝而後盟是以天子與斯盟也書盟而後朝春秋不以天子與斯盟之辭也榖梁諱㑹天王也六月衞侯鄭自楚復歸于衞君歸不言自必大夫也而後言自人臣無專歸之道也君而言自者危不得歸也是故晉文實復衞侯而曰自楚危自楚也晉厲實歸曹伯而曰自京師危自京師也衞元咺出奔晉陳侯款卒秋把伯姬來義見莊二十七年公子遂如齊冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温天王狩于河陽有傳王狩不書本公羊傳據莊二十一年王廵守虢此何以書非狩也於是晉侯将㑹於温召王以諸侯見而以狩書也王有事譏不在諸侯則以自致之文書之此晉侯之罪爾則曷為以自狩為文為尊尊諱也晉侯将㑹于温召王以諸侯見則先狩而後㑹曷為先書㑹後書狩書狩而後㑹是以天子與斯㑹也先書㑹後書狩春秋不以天子與斯㑹之辭也榖梁諱㑹天王也壬申公朝于王所有榖梁傳朝踐土不繫日此繫日何見先狩而後朝也王嘗至踐土而不言狩則王意也至温非王意也至踐土王意也則可以但言朝至温非王意也則不可以但言朝故書曰天王狩于河陽壬申公朝于王所朝而繫日雖諱而諸侯致天子之實見矣齊桓公盟王人不盟宰周公殊㑹世子晉文公實致天子而朝之故曰齊桓公正而不譎晉文公譎而不正晉人執衞侯歸之于京師於是命晉侯為伯矣執衞侯是伯討也則其稱人何非王命也樊皮叛王王命虢公討之虢公入樊執樊仲皮歸于京師不書是故凡執譏也春秋猶以當乎罪不當乎罪為襃貶苟當乎罪雖晉厲公執曹伯得為伯討苟不當乎罪雖齊桓執陳轅濤塗稱人而已矣衞元咺自晉復歸于衞歸大夫不言復必諸侯也而後言復君有歸道也大夫言復者伉也是故元咺復歸宋魚石晉欒盈復入皆伉辭也諸侯遂圍許曹伯襄復歸于曹執君不言歸言歸危不得歸也遂㑹諸侯圍許二十有九年春介葛盧來介東夷也宜書來者也昔者衞侯來㑹惠公葬隱公不見不書今公猶在㑹亦不見介人則何以書介東夷也未通於上國一歲再至其意将安在乎故亟書之介人侵蕭譏有以來之也公至自圍許夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉有傳此晉狐偃宋公孫固齊國歸父陳轅濤塗也曷為不序晉初以大夫盟王子也向也踐土之役王子虎不書涖盟也今以大夫盟王子文公之志荒矣大夫之交政於是始文公為之也不斥言王子虎為尊尊諱也以其人王子虎不可不徧人諸侯之大夫以其徧人諸侯之大夫不可不没公也是故齊初主盟不言公荘十六年盟齊楚向與盟不言公僖十九年盟齊晉大夫初㑹盟不言公皆譏不在魯也秋大雨雹冬介葛盧來春秋以一字為襃貶於介乎何費辭也春秋雖以一字為襃貶而或費辭者詳始以著末也三月癸酉大雨震電庚辰大雨雪正月己卯烝夏五月丁丑烝将著其末不可不詳其始也三十年春王正月夏狄侵齊秋衞殺其大夫元咺及公子瑕衞侯鄭歸于衞向也言復歸今歸不言復何奔失國之辭也執未失國之辭也凡執不言歸成九年鄭伯襄十六年莒子邾子十九年邾子執而言歸危不得歸也是故執君不名歸然後名之執書衞侯歸書衞侯鄭執書曹伯歸書曹伯襄名之者亦失國之辭也晉人秦人圍鄭此晉侯秦伯也曷為貶稱人晉帥天下之諸侯以攘戎狄存中國也而圍鄭鄭未有罪焉爾於是秦伯私與鄭盟戍鄭而去之子犯請擊秦晉侯曰微夫人之力不及此吾其還也蓋秦晉之怨自此始介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉自桓王以下王室無聘魯者於是再聘而宰周公實來則已尊矣公子遂如京師遂如晉以其如京師不敢不如晉是夷周於晉也吾大夫如京師不書據魯頌季孫行父於是始書之聘周非常事矣三十有一年春取濟西田公子遂如晉夏四月四卜郊不從乃免牲猶三望有傳公羊傳諸侯之有郊禘東遷之僭禮也故曰秦襄公始列於諸侯作西畤祠白帝僭端見矣位在藩臣而臚於郊祀君子懼焉則平王以前未有也魯之郊禘惠公請之也據邵氏經世書恵公止於秦襄公祠白帝之年齊桓公欲封禪而晉亦郊鯀皆僭禮也然則春秋何以始見於僖公向者荘公之觀齊社也曹劌諫曰天子祀上帝諸侯㑹之受命焉諸侯祀先王先公卿大夫佐之受事焉用見惠公雖請之而魯郊猶未率為常也僖公始作頌以郊為夸焉於是四卜不從猶三望是故特書之以其不勝譏譏其甚焉者爾記禮者以為魯禮皆成王賜之以康周公案衞祝鮀之言曰周公相王室以尹天下於周為睦分魯以大路大旂夏后氏之璜封父之繁弱殷民六族以昭周公之德分之土田陪敦祝宗卜史備物典策官司彛器則成王命魯不過如此隱公考仲子之宫問羽數於衆仲周公閱來聘饗有昌歜白黑形鹽周公以為備物辭不敢受䘙寗武子來聘宴之賦湛露及彤弓武子不荅賦曰諸侯朝正於王於是乎賦湛露諸侯敵王所愾而獻其功於是乎賜之彤弓陪臣其敢干大禮以自取戾假如明堂位之言得用郊禘兼四代服器官祝鮀不應不及況魯行天子之禮久矣則羽數何以始問於隱公昌歜形鹽以之饗天子之上公安用固辭湛露彤弓寗武子何以不荅且致譏焉於以見魯僭未久上自天子之宰至於兄弟之國之卿苟有識者皆云魯遜謝而魯人並無一語及於成王之賜以自解用郊禘之說當從劉恕太史公博極羣書定以為僭郊禮始於秦襄而恕亦該洽儻自史角之事之外有傳記與明堂位之禮合則外紀豈獨遺佚乎秋七月冬把伯姬來求婦狄圍衞十有二月衞遷于帝丘三十有二年春王正月夏四月己丑鄭伯捷卒衞人侵狄秋衞人及狄盟冬十有二月己卯晉侯重耳卒三十有三年春王二月秦人入滑齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽外相敗不書據成三年諸侯伐鄭鄭敗諸丘輿四年鄭疆許田許敗之展陂之類此何以書惡晉也晉之伯秦有力焉自城濮以來無役不從也文公未葬襄公墨衰及姜戎氏要秦師於殽敗之夫晉帥天下之諸侯以攘外㓂存中國也秦有力焉而及姜戎敗之秦晉之搆怨自是始更三君交兵無虛歲曽不十年晉遂不競而楚伯是故外㑹師而不及據隱五年邾鄭伐宋成九年秦人白狄伐晉之類特書及而晉侯貶稱人本榖梁然則善秦與自韓原秦師無君大夫則非善秦也晉遂不競而楚伯秦亦與有力焉耳癸巳葬晉文公狄侵齊公伐邾取訾婁秋公子遂帥師伐邾晉人敗狄于箕中國敗外域不書據隱九年鄭人大敗戎師閔二年虢公敗犬戎之類唯晉特書之特書晉者皆病晉也故晉侯貶稱人晉帥天下諸侯以攘外㓂存中國也前年狄侵齊去年狄侵衞衞為之遷帝丘而晉不能救於是伐晉蓋僅而後勝之也晉侯稱人以是為盟主病矣冬十月公如齊十有二月公至自齊乙巳公薨于小寢左氏榖梁傳同隕霜不殺草李梅實晉人陳人鄭人伐許春秋後傳卷五
