  - {type: variant, offset: 684, length: 2, content: 聞欲, WYG: 大夫也而後從外辭言戰言敗績桓十三年公會紀侯鄭伯成二年季孫行父臧孫許叔孫子首僑如公孫嬰齊會晉卻克衛孫良父曹公辛未取郜辛巳取防於是鄭師入郜辛未歸於我鄭師入防辛巳歸於我則曷為以内取書之蔽罪於魯也春秋嚴義利之辨苟以為利書吾取而已是故郜防書取譏不在鄭也濟西田書取汶陽田書取邾田書取譏不在晉也必若鄭伯以泰山之祊易許田而後可以言来歸焉爾秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之冬十月壬午齊人鄭人入郕此齊侯鄭伯也入國雖君}
