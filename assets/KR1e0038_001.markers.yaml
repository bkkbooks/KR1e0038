  - {type: variant, offset: 416, length: 204, content: 肯進青笄為驂乘襄子曰進視梁下前類有人青笄進視梁下豫讓郤寢佯為死人青笄云長有大事並初孚記吳越合魏武侯厲眾五年秦人興師而臨西河魏士聞之甲冑不待令而奮擊殺秦人者萬數梁以張儀為齊相楚怒約而攻梁雍睢曰請令解攻雍睢謂齊楚之王曰王亦聞張儀之約秦王乎曰王老相儀於梁齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得梁矣若不勝梁必事秦以持其國必割地以賂王王若欲復攻其弊不足以應秦此儀之所以與秦王陰相約也齊楚之王曰善乃遽解兵並御覽周赧王, WYG: 書據傳僖二十}
