  - {type: variant, offset: 59, length: 0, content: '', WYG: 春王正月有傳魯謂之春秋者其書法以四時冠月也以夏時冠周月非周之舊典也西周之史言時皆夏時也言月皆周月也言時皆夏時於周官見之季春出火非周三月季秋納火非周九月仲夏斬隂木非周五月仲冬斬陽木非周十一月之類言月皆周月於書見之康誥三月召誥二月不言夏洛誥十二月不言春多方五月畢命六月不言秋伊訓十有二月不言冬之類泰誓十有一年一月戊午盖追改舊序十三年春之訛説見章指未有以夏時冠周月者也惟詩以夏正數月至豳風於周正月則變文謂之一之日以夏時冠周月則魯史也}
