  - {type: variant, offset: 676, length: 0, content: '', WYG: 用備樂焉禮未之有也是故特書初邾人鄭人伐宋先邾主兵也唯主兵雖小國叙大國之上據桓十三年及齊侯宋公僖二年虞師晉師之類非主兵也而小國叙大國之上則伯者為之也據荘十六年許男滑伯文十四年許男曹伯文十五年邾子把伯之類世子長於小國之君甚矣據襄十年齊世子光滕子薛伯把伯小邾子傳曰光先至故長於滕螟冬十有二月辛巳公子彄卒宋人伐鄭圍長葛宋鄭交怨也伐國不言圍邑}
