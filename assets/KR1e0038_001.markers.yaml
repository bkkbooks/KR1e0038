  - {type: variant, offset: 649, length: 1, content: 秦, WYG: 晉侯齊侯盟于斂盂之類唯内悉書之夏五月鄭伯克段于鄢有傳曰鄭伯克段譏不在其臣子也本榖梁目君例克之為言勝也以千乗之國勝其弟云爾于鄢言在外也然則段無罪與先君之子稱公子有謂稱弟必篡若争國也而後但名之據衛州吁陳佗之類段不得列於子弟之稱則段有罪矣段稱弟則疑於佞夫段稱公子則疑於禦㓂秋七月天王使宰咺来歸恵公仲子之􅈖有傳疑非是說在章指周大夫不名據傳宰周公孔毛伯衛之類爵從其爵據單伯劉子之類未爵稱字據南季家父榮叔之類必微者而後名之據内史叔服官師劉夏之類卒名之據王子虎劉卷舍是無名道矣而名之者貶也何貶乎宰咺命妾母也王人未有書官者於是特書宰有賵妾母者矣據榮叔必宰自為使而後貶貶其甚者也古者諸侯不再娶再娶亦妾也或疑再娶非妾少姜卒公如晉及河晉使士文伯来辭曰非伉儷也請君母辱於是隠將讓桓以夫人之禮喪其母而赴於京師歸賵盖命之也其曰恵公之仲子者修春秋之辭也九月及宋人盟于宿魯宋合也及宋人皆微者也本榖梁微者雖接我不書據傳隐四年宋使来乞師之類内微者亦不書據傳宣十八年公使如楚乞師昭二十七年公使子家子如晉之類此何以書參盟之端見矣憂參盟故録其所從}
