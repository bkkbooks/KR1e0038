  - {type: variant, offset: 21, length: 0, content: '', WYG: 是故魯自周公至真公九世齊自太公至武公七世晉自唐叔至靖侯五世蔡自蔡仲至夷侯六世宋自微子至釐公八世陳自胡公至幽公六世皆大國也但有世而無年世家魯真公十四年齊武公九年宋釐公十七年晉靖侯十七年楚熊勇六年陳幽公十三年始記厲王奔彘則紀年所由起也則作史改元皆共和之際晉竹書紀年終宣王起殤叔盖宣王中興諸侯復禀命至幽王而遂叛他如吳至夀夢十九世越至勾踐二十餘世而後始有年燕自召公至昭王而後始有名秦自秦仲至文公而後始有史皆僻逺晚興者也至於史法亦不盡循周制}
