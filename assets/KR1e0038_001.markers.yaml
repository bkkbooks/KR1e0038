  - {type: variant, offset: 678, length: 0, content: '', WYG: 曷為自僖以前則書之春秋之初猶以圍邑為重也據傳自僖十八年邢狄圍衛莵圃不書至二十六年書楚人伐宋圍緡之後皆不書矣六年春鄭人来渝平有傳渝平釋憾而為平也平不書據傳明年宋及鄭平宣七年鄭及晉平之類榖梁外平不道非獨外也文十六年及齊平襄二十年及莒平哀八年及齊平皆不書必關於天下之故而後書書鄭渝平以志諸侯之合書及鄭平以志諸侯之散是春秋之所終始也夏五月辛酉公㑹齊侯盟于艾春秋之初宋魯衛陳蔡一黨也齊鄭一黨也於是鄭始平魯鄭方交惡於王而亟平齊魯將以合諸侯焉爾秋七月冬宋人取長葛七年春王三月叔姬歸于紀娣不書書紀叔姬吾女遭人倫之變者也紀侯失國叔姬託於紀季魯問不及焉故詳之也滕侯卒夏城中丘齊侯使其弟年来聘秋公伐邾冬天王使凡伯来聘戎伐凡伯于楚丘以歸八年春宋公衛侯遇于垂特相遇不書書宋衛將以為參盟也三月鄭伯使宛来歸祊有公羊傳田邑皆書取據防郜此鄭邑也則曷為謂之來歸於是桓王即位四年矣而莊公始朝王不禮焉鄭有志于叛王而合諸侯渝平歸祊皆遜辭也糾合之道也庚寅我入祊入未有言我者言我交譏之辭也夏六月己亥蔡侯考父卒辛亥宿男卒秋七月庚午宋公齊侯衛侯盟于瓦屋諸侯初參盟也傳曰諸侯之參盟於是始有參盟然後有主盟矣春秋之初宋魯衛陳蔡一黨也齊鄭一黨也鄭有志於叛王而合諸侯於是渝平於魯齊亦為艾之盟以平魯為瓦屋之盟以平宋衛所謂成三國也東諸侯之交盛矣八月𦵏蔡宣公九月辛夘公及莒人盟于浮来公及大夫盟則不以大夫敵公據齊大夫晉大夫之類非大夫也則但稱人螟冬十有二月無駭卒九年春天王使南季来聘三月癸酉大雨震電庚辰大雨雪有傳例説在章指記異也本公羊太史公曰孔子論六經記異而說不書得春秋之指矣挟卒有公羊傳夏城郎秋七月冬公㑹齊侯于防十年春王二月公㑹齊侯鄭伯于中丘王師不書據傳隠元年伐衛五年伐曲沃桓四年圍}
