  - {type: variant, offset: 651, length: 3, content: 作浮橋, WYG: 也冬十有二月祭伯来有傳来未有無辭者無辭以為稱則但書来但書来所以外介狄也據介葛盧白狄祭伯寰内諸侯無天子之命而私交魯左氏榖梁同祭伯内諸侯也而與介狄同文苟無辭雖王人一以是書之公子益師卒二年春公㑹戎于潛榖梁有傳㑹戎于潛春秋之始㑹吳黄池春秋之終此春秋之所以終始也夏五月莒人入向入君大夫將皆稱人君將則書君自楚莊王入陳始大夫將則書大夫自晉郤缺入蔡始惟内大夫則書之無駭帥師入極入恒稱人唯内書大夫帥師司空無駭也其曰無駭未命大夫也傳在八年春秋之初魯有無駭挾鄭有宛詹紀有裂繻則猶有未命大夫也秋八月庚辰公及戎盟于唐九月紀裂繻来逆女春秋之初大夫恒稱人必有好事}
