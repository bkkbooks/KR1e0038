  - {type: variant, offset: 669, length: 0, content: '', krp: 問不及焉故詳之也榖梁氏國例今不取冬十月伯姬歸于紀内女為夫人恒書歸不書歸者必有故也是故齊子叔姬不書歸文十五年出郯伯姬不書歸宣十六年出把叔姬不書歸成五年出以為嘗失位也非有故也而不書歸者非君夫人也據宋蕩伯姬紀子帛莒子盟于宻紀子帛闕杜預子帛裂繻字盖意之也不取外特相盟也特相盟不書書紀莒志諸侯之合也十有二月乙夘夫人子氏薨無傳榖梁氏隠之妻也夫人薨未有不𦵏者其不𦵏隠不以夫人之禮喪其妻也隠不以夫人喪其妻其曰夫人者修春秋之辭也鄭人伐衛鄭衛交怨也侵伐君將稱君大夫稱人據詩衛州吁使公孫子仲將文元年衛孔達之類用衆焉稱師大夫將則書其大夫自晉陽處父始三年春王二月己巳日有食之三月庚戌天王崩夏四月辛夘尹氏卒有傳聲子則曷為稱君氏隠不以夫人之禮喪其母也於是隠將讓桓不以聲子伉仲子也隠不以夫人之禮喪其母其曰君氏者亦修春秋之辭也是故不曰子氏且不言𦵏曰子氏卒且言𦵏則疑於定姒夫奉桓為太子穀傳謂探先君之邪志以與桓非是本東莱吕氏而謂已攝主隠之志也而卒遇弑終隠之篇春秋盖三致意焉隠桓之母俱不得為夫人而隠之妻得為夫人隠桓之母俱不得為夫人則嫡庶之義明隠妻得為夫人則君臣之分定嫡庶之義明則桓非太子君臣之分定則隠非攝主也吾魯史也何敢斥言之致意於三辭斯可矣秋武氏子来求賻有傳周大夫有爵稱爵未爵稱字但曰武氏子則見非大夫也微者雖王人不書據傳隠六年京師來告饑宣九年王使来徵聘之類此何以書天王崩魯賻不入来求不可以不錄也書来求賻故不書𦵏八月庚辰宋公和卒冬十有二月齊侯鄭伯盟于石門齊鄭合也外特相盟不書必關於天下之大故也而後書莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟於石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散事在定七年是春秋之終始也何氏所傳聞之世外離會不書非是夫子之作春秋於隠桓荘之際唯鄭多特筆焉於襄昭定哀之際唯齊多特筆焉癸未𦵏宋穆公四年春王二月莒人伐把取牟婁外取邑不書從公榖例自隠以前則書之曷為自隠以前則書之春秋之初猶以取邑為重也據傳自桓十四年宋以諸侯伐鄭取牛首而後皆不書戊申衛州吁弑其君完有傳公子州吁則曷為但稱州吁隠桓荘之春秋凡賊皆名之於是公子初弑君衛人為之變終風日月之詩作於宫中擊鼓作於國中也不踰年卒討之是故州吁不稱公子而石碏得書人東遷之初國猶有臣子矣合五國之衆不能定州吁而殺于濮于濮言未得國也見衛之有臣子也夏公及宋公遇於清宋公陳侯蔡人衛人伐鄭於是諸侯初㑹伐君將稱君大夫稱人先宋序爵也是定州吁之師也曷為君大夫各從其恒稱春秋之達例三有同號者焉有同辭者焉有同文者焉號不足以盡意而後見於辭辭不足以盡意而後見於文以同文為猶未也而至於變文則特書也於是公子初弑君衛人為之變不踰年能討之衛猶有臣子也而五國之君大夫伐鄭以定州吁弑君天下之元惡也五國之君大夫有人心焉不若是甚矣書曰宋公陳侯蔡人衛人伐鄭秋翬帥師㑹宋公陳侯蔡人衛人伐鄭書之復書之終春秋纔一再見焉特書之法嚴矣則君大夫各從其恒稱是達例而已爾後衛不以衛主兵也秋翬帥師㑹宋公陳侯蔡人衛人伐鄭有傳公子翬則曷為但稱翬以大夫而㑹伐於諸侯於是始故名之也外大夫則稱人會伐未有言帥師者據文三年叔孫得臣成八年叔孫僑如之類特言帥師翬弑隠者也諸侯專征而後千乗之國有弑其君者矣大夫専將而後百乗之家有弑其君者矣九月衛人殺州吁于濮石碏非大夫則何以得書討賊天下之大義也苟能討雖微者得書異邦人得書據蔡人殺陳佗}
  - {type: variant, offset: 670, length: 1, content: 維, WYG: 狄得書據楚子殺陳夏徴舒書人苟不能討雖以四國之大夫伐宋不書其大夫事見文十七年疑於討也而非討則雖以十二國之君伐齊不書伐矣事在襄二十五年討賊天下之大義春秋重以予人也冬十有二月衛人立晉有傳公子晉也公子不稱公子必嘗爭國者也衛人立晉則曷為以爭國之辭書之衛之臣子可以討賊不可以置君州吁為僇而晉受之上無天子下無君父是亦爭國而已矣繼故未有書立者賊不討君不𦵏譏不在立也是故宋殤之弑也馮立閔之弑也御說立晉靈之弑也黑臀立厲之弑也周立皆不書也必若衛人賊討君𦵏而後可以書立矣五年春公矢魚于棠有傳夏四月𦵏衛桓公秋衛師入郕九月考仲子之官初獻六羽有傳并公羊傳仲子之宫别廟也古者妾祔於妾祖姑無妾祖姑則易牲而祔於女君别廟非禮也隠將讓桓嘗以夫人之禮喪仲}
