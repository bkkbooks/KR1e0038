  - {type: variant, offset: 4, length: 0, content: '', WYG: 卷一宋陳傅良撰隠公春秋非始於平王始於桓王也平王東遷衛鄭二武入相於周衛武公十二年鄭武公二十七年詩人為之賦洪澳緇衣凡伯仍叔家父皆大雅舊人也故五十餘年東諸侯無他故而秦亦列於國風當是時魯隠之奉其弟軌宋穆之舎其子馮諸侯猶有讓千乗之國者也衛石碏之討州吁晉九宗五正嘉父之納鄂侯宋孔父之死於殤公臣子猶知尊君親上也魯衆仲之論族晉師服之述封建衛鄭齊秦之詩則據經守古之士為多也鄭莊公為卿士王貳于虢於是周鄭交惡隐之三年平王崩桓王即位四年而鄭始朝身為卿士而有志於叛王糾合諸侯於是入郕又入許釋泰山之祀首為参盟成宋亂矣桓不勝忿自將以伐鄭繻葛之敗彛倫攸斁春秋所以作也是故克段于鄢盟于石門来歸祊来渝平鄭伯伐取之以璧假許田齊侯鄭伯如紀終莊公之萹皆特筆也春秋數致意焉則是作經之始也夫子論六經系文侯之命於西周之末託春秋之始於隠公著其世次以傷周之不競故曰如有用我者吾其為東周乎撥亂世反之正則其志誠在春秋也元年}
