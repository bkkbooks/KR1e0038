  - {type: variant, offset: 655, length: 7, content: 河初學記魯仲連, WYG: 諸侯則書其大夫已命字之未命名之各從其稱無譏焉爾内女為夫人凡八見於經未有来逆者本公羊傳例逆女不書書逆紀伯姬吾女遭人倫之變者也禮娶夫人之辭}
