  - {type: variant, offset: 679, length: 2, content: 加問, WYG: 之類於是宋不王鄭伯復為左卿士以王命討之㑹於中丘為師期也則何以書墮天子之令於是始也東遷之後諸侯專征矣小者修怨大者定簒弑雖然猶未衡行於天下也鄭伯受命伐宋爾何為乎中丘之㑹鄭有志於叛王而合諸侯故無王命而私㑹齊魯齊魯亦無王命而私㑹於鄭而後諸侯之師始衡行於天下夏翬帥師㑹齊人鄭人伐宋翬何以再不稱公子隠桓莊之世吾大夫㑹伐恒名之此中丘諸侯也曷為㑹稱君伐稱人畧之也}
