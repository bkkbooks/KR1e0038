  - {type: variant, offset: 682, length: 1, content: 申, WYG: 秋舉重一役而再有事不悉書據襄十八年㑹于魯濟同圍齊不書會昭三十二年盟于狄泉城成周不書盟之類苟再見必前目而後凡也一役而再見但人之者畧之也鄭伯卿也而首墮天子之令故畧之也六月壬戌公敗宋師于菅外書伐不書敗伐而敗焉不足書也據傳宣九年楚伐鄭鄭敗之栁棼成三年諸侯伐鄭鄭敗之邱輿之類不言敗必交戰也而後言戰言敗績惟内師悉書之勝焉則書敗某師敗則但書戰必㑹他國之}
